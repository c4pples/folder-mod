l_english:
 AOTA_BOOKMARK_1936:0 "Ashes of the Armistice"
 AOTA_BOOKMARK_1936_DESC:0 "The Great War ended not in triumph but in exhaustion. The old order survived just long enough to rot in public view. In 1936 every great power seeks a final answer: reform, empire, revolution, or collapse."
 AOTA_CONCERT_OF_STABILITY:0 "Concert of Stability"
 AOTA_CONTINENTAL_RECONCILIATION:0 "Continental Reconciliation"
 AOTA_FREE_COMMUNES:0 "League of Free Communes"
 AOTA_LEAGUE_OF_FREE_MARKETS:0 "League of Free Markets"
 AOTA_REVOLUTIONARY_BALANCE_ANARCHIST:0 "The black banner leads the revolutionary camp."
 AOTA_REVOLUTIONARY_BALANCE_SOCIALIST:0 "The red state-socialists dominate the revolutionary camp."
 AOTA_REVOLUTIONARY_BALANCE_CONTESTED:0 "The red and black camps are still locked in a struggle for the soul of the revolution."
 AOTA_USA_BREAKUP_STAGE_TOTAL:0 "Seven Banners"
 AOTA_USA_BREAKUP_STAGE_FOUR:0 "Four-Way Collapse"
 AOTA_USA_BREAKUP_STAGE_LATENT:0 "Unsteady Union"
 aota_anarchist_agitation:0 "Anarchist Agitation"
 aota_anarchist_agitation_desc:0 "Dockside committees, veterans' circles and rural communes are knitting together a movement that rejects both parliament and the disciplined party-state."
 aota_commune_momentum:0 "Commune Momentum"
 aota_commune_momentum_desc:0 "The socialist movement is centralizing rapidly, building committees capable of transforming agitation into a state project."
 AOTA_back_the_communes:0 "Back the Communes"
 AOTA_back_the_party:0 "Back the Party"
 AOTA_measure_revolutionary_balance:0 "Measure the Revolutionary Balance"
 AOTA_measure_revolutionary_balance_desc:0 "Current balance: [AOTA_GET_REVOLUTIONARY_BALANCE]"
 aota.700.t:0 "Red and Black"
 aota.700.d:0 "The revolutionary camp has split cleanly. The socialists promise steel, planning and command. The anarchists promise federations, militias and the end of the prison-state."
 aota.700.a:0 "The communes must remain free."
 aota.700.b:0 "The revolution needs a center."
