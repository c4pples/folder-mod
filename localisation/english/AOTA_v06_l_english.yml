 aota.210.t:0 "The Constitutional Remnant"
 aota.210.d:0 "The Atlantic seaboard elites and surviving federal jurists rally around a stripped-down constitutional union. Their cause is defensive, procedural and desperate."
 aota.210.a:0 "Guard what remains."
 aota.211.t:0 "The Workers Arm for the Republic of Labor"
 aota.211.d:0 "Union halls, rail depots and industrial wards erupt into councils. The Workers' Union claims that only organized labor can save America from oligarchs and generals alike."
 aota.211.a:0 "Every mill a fortress."
 aota.212.t:0 "The National Authority Proclaims Emergency Rule"
 aota.212.d:0 "Veteran cadres and nationalist officers seize depots inland and broadcast a doctrine of unity through iron discipline."
 aota.212.a:0 "Order through force."
 aota.213.t:0 "The Pacific Federation Secedes"
 aota.213.d:0 "The western coast closes its harbors to eastern command and proclaims a provisional federation dedicated to trade, autonomy and survival."
 aota.213.a:0 "Turn westward."
 aota.214.t:0 "Corporate Commonwealth in the Boardrooms"
 aota.214.d:0 "Financiers, private security firms and anti-union governors carve out a hyper-capitalist state that treats the civil war as a brutal market correction."
 aota.214.a:0 "Contracts, guns and rails."
 aota.215.t:0 "The Southern Agrarian League Mobilizes"
 aota.215.d:0 "County courts and rural militias revive an agrarian republican myth, blending local autonomy with bitter revanchism against the industrial north."
 aota.215.a:0 "The fields will march."
 aota.216.t:0 "The Christian Commonwealth"
 aota.216.d:0 "Pastors, commune organizers and pacifist radicals declare that America fell because Mammon and the machine replaced the Gospel."
 aota.216.a:0 "Build the parishes into bastions."
 aota.310.t:0 "The Veterans Demand Meaning"
 aota.310.d:0 "The men who survived the trenches want the empire to answer a simple question: what was all that suffering for?"
 aota.310.a:0 "Reconcile them to the state."
 aota.310.b:0 "Turn their anger outward."
 aota.320.t:0 "The Chamber Fractures"
 aota.320.d:0 "France survived the armistice, but not the peace. Republicans, clericals and radicals now each claim to be the only force fit to redeem the nation."
 aota.320.a:0 "Steady the republic."
 aota.320.b:0 "Summon the patriotic right."
 aota.320.c:0 "Let the communes speak."
 aota.330.t:0 "The Crownlands Petition Vienna"
 aota.330.d:0 "From Prague to Zagreb, the old empire is drowning in petitions, memoranda and mutinous whispers. The Habsburg state must bargain or command."
 aota.330.a:0 "Offer a federal bargain."
 aota.330.b:0 "The army will keep the peace."
