l_english:
 aota_ger_reichsverband_cartels:0 "Reichsverband Cartels"
 aota_ger_reichsverband_cartels_desc:0 "Heavy industry, banking houses, and armaments planners have built a disciplined negotiation machine that translates economic panic into coordinated state policy."
 aota_eng_imperial_general_staff_committees:0 "Imperial General Staff Committees"
 aota_eng_imperial_general_staff_committees_desc:0 "Britain governs crisis through committees: Admiralty circles, colonial liaisons, and Treasury strategists who turn imperial drift into manageable doctrine."
 aota_ita_state_corporative_blocs:0 "State-Corporative Blocs"
 aota_ita_state_corporative_blocs_desc:0 "Roman ministries, syndicates, and industrial notables increasingly govern through corporative bargains that prioritize order over representation."
 aota_sov_reconstruction_compacts:0 "Reconstruction Compacts"
 aota_sov_reconstruction_compacts_desc:0 "The Russian state survives by stitching together regional pacts between engineers, rail bureaucrats, and security directorates willing to trade autonomy for resources."
 aota_fra_metropole_colony_bargain:0 "Metropole-Colony Bargain"
 aota_fra_metropole_colony_bargain_desc:0 "French recovery still depends on overseas circuits of manpower, capital, and coercion. Every colonial compromise buys time in Paris while deepening structural strain."
 aota_jap_zaibatsu_mobilization_council:0 "Zaibatsu Mobilization Council"
 aota_jap_zaibatsu_mobilization_council_desc:0 "Commercial conglomerates and naval planners increasingly speak a common language: managed scarcity, controlled expansion, and preemptive strategic industry."

 AOTA_GER_hjalmar_schacht_name:0 "Hjalmar Schacht"
 AOTA_GER_hjalmar_schacht_advisor:0 "Credit-State Architect"
 AOTA_GER_hjalmar_schacht_advisor_desc:0 "Schacht treats finance as a strategic weapon, tying industrial confidence to national revision without open fiscal collapse."
 AOTA_GER_hans_von_seeckt_name:0 "Hans von Seeckt"
 AOTA_GER_hans_von_seeckt_advisor:0 "Professional Army Restorer"
 AOTA_GER_hans_von_seeckt_advisor_desc:0 "Seeckt advocates a technically superior officer corps able to impose order even when parliamentary authority wavers."
 AOTA_GER_carl_goerdeler_name:0 "Carl Goerdeler"
 AOTA_GER_carl_goerdeler_advisor:0 "Constitutional Conservative Broker"
 AOTA_GER_carl_goerdeler_advisor_desc:0 "Goerdeler seeks a disciplined conservative constitutionalism that can outmaneuver both reactionary adventurism and revolutionary panic."

 AOTA_ENG_ernest_bevin_name:0 "Ernest Bevin"
 AOTA_ENG_ernest_bevin_advisor:0 "Labor-Imperial Negotiator"
 AOTA_ENG_ernest_bevin_advisor_desc:0 "Bevin binds labor discipline to imperial logistics, insisting social compromise at home is a prerequisite for strategic reach abroad."
 AOTA_ENG_hugh_dowding_name:0 "Hugh Dowding"
 AOTA_ENG_hugh_dowding_advisor:0 "Air Defence Systems Planner"
 AOTA_ENG_hugh_dowding_advisor_desc:0 "Dowding prioritizes integrated warning, command coordination, and attritional doctrine over symbolic offensives."
 AOTA_ENG_oswald_mosley_name:0 "Oswald Mosley"
 AOTA_ENG_oswald_mosley_advisor:0 "Authoritarian National Mobilizer"
 AOTA_ENG_oswald_mosley_advisor_desc:0 "Mosley offers national regeneration through spectacle, discipline, and executive authority unconstrained by parliamentary caution."

 AOTA_ITA_alcide_de_gasperi_name:0 "Alcide De Gasperi"
 AOTA_ITA_alcide_de_gasperi_advisor:0 "Catholic Constitutional Reformer"
 AOTA_ITA_alcide_de_gasperi_advisor_desc:0 "De Gasperi argues that social peace requires a constitutional settlement broad enough to absorb Italy's ideological camps."
 AOTA_ITA_rodolfo_graziani_name:0 "Rodolfo Graziani"
 AOTA_ITA_rodolfo_graziani_advisor:0 "Colonial War Theorist"
 AOTA_ITA_rodolfo_graziani_advisor_desc:0 "Graziani's doctrine favors rapid punitive operations and coercive frontier warfare to preserve imperial prestige."
 AOTA_ITA_alberto_pirelli_name:0 "Alberto Pirelli"
 AOTA_ITA_alberto_pirelli_advisor:0 "Industrial Syndicate Magnate"
 AOTA_ITA_alberto_pirelli_advisor_desc:0 "Pirelli represents the industrial bloc that views national rearmament as both geopolitical necessity and market opportunity."

 AOTA_SOV_viktor_chernov_name:0 "Viktor Chernov"
 AOTA_SOV_viktor_chernov_advisor:0 "Agrarian Republican Strategist"
 AOTA_SOV_viktor_chernov_advisor_desc:0 "Chernov seeks to rebuild state legitimacy through peasant representation, controlled land policy, and anti-authoritarian republicanism."
 AOTA_SOV_tukhachevsky_name:0 "Mikhail Tukhachevsky"
 AOTA_SOV_tukhachevsky_worldbuild_advisor:0 "Operational Modernization Advocate"
 AOTA_SOV_tukhachevsky_worldbuild_advisor_desc:0 "Tukhachevsky insists Russia's next war will be won by doctrine, mobility, and staff coordination rather than sheer mass."
 AOTA_SOV_alexandra_kollontai_name:0 "Alexandra Kollontai"
 AOTA_SOV_alexandra_kollontai_advisor:0 "Revolutionary Social Organizer"
 AOTA_SOV_alexandra_kollontai_advisor_desc:0 "Kollontai channels labor, women's committees, and urban radicals into a durable left opposition to military-bureaucratic centralism."

 AOTA_FRA_pierre_mendes_name:0 "Pierre Mendès France"
 AOTA_FRA_pierre_mendes_advisor:0 "Republican Technocratic Critic"
 AOTA_FRA_pierre_mendes_advisor_desc:0 "Mendès France attacks complacent elites and argues that administrative clarity is the only antidote to strategic decline."
 AOTA_FRA_maurice_gamelin_name:0 "Maurice Gamelin"
 AOTA_FRA_maurice_gamelin_advisor:0 "Methodical Defensive Planner"
 AOTA_FRA_maurice_gamelin_advisor_desc:0 "Gamelin's school favors preparation, layered defence, and coalition timing over impulsive escalation."
 AOTA_FRA_eugene_schneider_name:0 "Eugène Schneider"
 AOTA_FRA_eugene_schneider_advisor:0 "Armaments Trust Director"
 AOTA_FRA_eugene_schneider_advisor_desc:0 "Schneider links political influence and heavy industry, ensuring rearmament policy remains tied to private industrial capacity."

 AOTA_JAP_kijuro_shidehara_name:0 "Kijūrō Shidehara"
 AOTA_JAP_kijuro_shidehara_advisor:0 "Commercial Diplomacy Advocate"
 AOTA_JAP_kijuro_shidehara_advisor_desc:0 "Shidehara prefers influence through markets and treaties, warning that overextension could fracture Japan's strategic position."
 AOTA_JAP_sadao_araki_name:0 "Sadao Araki"
 AOTA_JAP_sadao_araki_advisor:0 "Expansionist Officer Bloc"
 AOTA_JAP_sadao_araki_advisor_desc:0 "Araki embodies the faction that treats permanent mobilization as both moral discipline and strategic destiny."
 AOTA_JAP_yoshisuke_ayukawa_name:0 "Yoshisuke Ayukawa"
 AOTA_JAP_yoshisuke_ayukawa_advisor:0 "Manchurian Industrial Fixer"
 AOTA_JAP_yoshisuke_ayukawa_advisor_desc:0 "Ayukawa coordinates resource extraction, transport, and heavy industry across empire-linked corporate networks."

 aota_1330_title:0 "Germany's Managed Recovery"
 aota_1330_desc:0 "Industrial combines, veterans' leagues, and constitutional conservatives are converging around a hard doctrine: Germany will revise the postwar order through disciplined economic mobilization before it risks open war."
 aota_1330_a:0 "Stabilize the recovery blocs."
 aota_1330_b:0 "Prioritize military leverage."
 aota_1331_title:0 "Britain's Committee Empire"
 aota_1331_desc:0 "Cabinet subcommittees now govern most imperial emergencies. This system preserves flexibility, but critics warn it has replaced strategy with perpetual administrative improvisation."
 aota_1331_a:0 "Back imperial coordination."
 aota_1331_b:0 "Consolidate authority in London."
 aota_1332_title:0 "Italy's Corporative Equation"
 aota_1332_desc:0 "Industrial syndicates, army lobbies, and royal ministers bargain over who will pay for Italy's ambitions. The regime survives by balancing prestige politics against fiscal reality."
 aota_1332_a:0 "Court the industrial bloc."
 aota_1332_b:0 "Empower the officer corps."
 aota_1333_title:0 "Russia's Reconstruction Front"
 aota_1333_desc:0 "Rail engineers, provincial governors, and party organizers are drafting regional compacts to keep the republic functioning. Every compact restored brings capacity—and new centers of power."
 aota_1333_a:0 "Formalize the compacts."
 aota_1333_b:0 "Reassert central authority."
 aota_1334_title:0 "France and the Imperial Burden"
 aota_1334_desc:0 "Paris depends on colonial revenue and manpower, yet each year the cost of coercion rises. Ministries now debate whether reform can preserve empire or merely delay its fracture."
 aota_1334_a:0 "Double down on the imperial bargain."
 aota_1334_b:0 "Pursue controlled reform."
 aota_1335_title:0 "Japan's Mobilization Consensus"
 aota_1335_desc:0 "Navy planners and zaibatsu executives have agreed on a strategic program of industrial acceleration. Civilian ministers fear this consensus may outpace political control."
 aota_1335_a:0 "Accelerate strategic industry."
 aota_1335_b:0 "Protect civilian oversight."
