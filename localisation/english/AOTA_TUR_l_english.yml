 OTT_arab_federation_DEF:0 "the Ottoman-Arab Federation"
 TUR_sacred_open_the_book_of_ashes:0 "Open the Book of Ashes"
 TUR_sacred_open_the_book_of_ashes_desc:0 "Court preachers, embittered officers, and syndicates of dispossessed veterans compile a single canon of grievance: the empire was humiliated because it tolerated weakness, plurality, and compromise."
 TUR_sacred_night_of_the_minarets:0 "The Night of the Minarets"
 TUR_sacred_night_of_the_minarets_desc:0 "Under curfew and loudspeaker sermons, the movement strikes unions, provincial assemblies, and rival religious networks in one synchronized purge."
 TUR_sacred_party_militias_of_the_crescent:0 "Party Militias of the Crescent"
 TUR_sacred_party_militias_of_the_crescent_desc:0 "The regime arms loyalist leagues as a parallel force to the army and police, binding neighborhoods to the party through fear, patronage, and blood oaths."
 TUR_sacred_the_tithe_of_steel:0 "The Tithe of Steel"
 TUR_sacred_the_tithe_of_steel_desc:0 "Industrial magnates receive guaranteed contracts in exchange for quota obedience, forced overtime, and direct collaboration with the security organs."
 TUR_sacred_the_registry_of_traitors:0 "The Registry of Traitors"
 TUR_sacred_the_registry_of_traitors_desc:0 "A single state ledger categorizes dissenters, minorities, and suspect communities as internal enemies to be relocated, surveilled, or erased from civic life."
 TUR_sacred_the_march_of_reclamation:0 "The March of Reclamation"
 TUR_sacred_the_march_of_reclamation_desc:0 "The ruling myth hardens into geopolitical doctrine: every frontier dispute becomes proof of civilizational siege and every neighbor a temporary obstacle."
 TUR_sacred_proclaim_the_iron_crescent:0 "Proclaim the Iron Crescent"
 TUR_sacred_proclaim_the_iron_crescent_desc:0 "The old imperial façade is dropped. A total state of party, barracks, police, and industry is declared as the only path to national rebirth."
 TUR_sacred_crusade_against_the_broken_world:0 "Crusade Against the Broken World"
 TUR_sacred_crusade_against_the_broken_world_desc:0 "The Directorate frames expansion as salvation and exterminatory necessity, preparing the realm for permanent mobilization and ideological war."

 aota_ottoman_book_of_ashes:0 "Book of Ashes Doctrine"
 aota_ottoman_book_of_ashes_desc:0 "A canon of revenge politics recasts compromise as treason and violence as historical correction."
 aota_ottoman_night_of_the_minarets:0 "Night of the Minarets"
 aota_ottoman_night_of_the_minarets_desc:0 "Mass arrests, disappearances, and emergency decrees have shattered independent civic life."
 aota_ottoman_crescent_legions:0 "Crescent Legionary Corps"
 aota_ottoman_crescent_legions_desc:0 "Militarized party formations now dominate recruitment, training, and street enforcement."
 aota_ottoman_tithe_of_steel:0 "Tithe of Steel"
 aota_ottoman_tithe_of_steel_desc:0 "Industrial output rises through coercion, rationing, and punitive labor discipline."
 aota_ottoman_registry_of_traitors:0 "Registry of Traitors"
 aota_ottoman_registry_of_traitors_desc:0 "The terror bureaucracy systematically categorizes and represses entire populations as enemies within."
 aota_ottoman_iron_crescent_regime:0 "Iron Crescent Directorate"
 aota_ottoman_iron_crescent_regime_desc:0 "The regime fuses fascist myth, militarized governance, and expansionist statecraft into a permanent war order."

 AOTA_TUR_nazim_arslan_name:0 "Nazım Arslan"
 AOTA_TUR_nazim_arslan_desc:0 "Arslan fashioned himself as the sword of national resurrection, welding clerical myth, officer resentments, and mass terror into a single fascist state project."
 AOTA_TUR_sabiha_kandemir_name:0 "Sabiha Kandemir"
 AOTA_TUR_sabiha_kandemir_desc:0 "Architect of the Special Tribunals and internal deportation grids, Kandemir personifies the regime's bureaucratic cruelty."
 AOTA_TUR_cevdet_inal_name:0 "Cevdet İnal"
 AOTA_TUR_cevdet_inal_desc:0 "A theorist of total frontier war, İnal argues that society itself must be reorganized as a barracks."
 AOTA_TUR_hulusi_demirkan_name:0 "Hulusi Demirkan"
 AOTA_TUR_hulusi_demirkan_desc:0 "Industrialist magnate and quartermaster of coercive mobilization, Demirkan profits from fear and forced quotas."
 AOTA_TUR_selim_erguven_name:0 "Selim Erguven"
 AOTA_TUR_selim_erguven_desc:0 "A ruthless operational commander, Erguven trains the legionary columns for punitive campaigns beyond the frontier."

 AOTA_iron_crescent_directorate:0 "Iron Crescent Directives"
 AOTA_iron_crescent_directorate_desc:0 "The fascist state issues recurrent emergency directives that deepen repression, militarization, and foreign brinkmanship."
 TUR_iron_crescent_expand_the_special_tribunals:0 "Expand the Special Tribunals"
 TUR_iron_crescent_expand_the_special_tribunals_desc:0 "Widen extraordinary courts and security commissions to accelerate political cleansing."
 TUR_iron_crescent_raise_legionary_columns:0 "Raise Legionary Columns"
 TUR_iron_crescent_raise_legionary_columns_desc:0 "Channel youth leagues and veterans into armed party formations for frontier and internal operations."
 TUR_iron_crescent_forced_industrial_quotas:0 "Enforce Forced Industrial Quotas"
 TUR_iron_crescent_forced_industrial_quotas_desc:0 "Compel strategic industries to meet war allocations under security supervision."
 TUR_iron_crescent_frontier_incidents:0 "Engineer Frontier Incidents"
 TUR_iron_crescent_frontier_incidents_desc:0 "Manufacture crises along contested borders to normalize escalation."

 aota.2116.t:0 "The Book of Ashes"
 aota.2116.d:0 "In smoke-heavy halls, regime jurists and preachers unveil a new state catechism. It names the empire's defeats as sacred humiliations inflicted by internal rot and foreign plots, then promises rebirth through disciplined violence."
 aota.2116.a:0 "Let the catechism become law."
 aota.2117.t:0 "Night of the Minarets"
 aota.2117.d:0 "At midnight the loudspeakers call for vigilance while security battalions seal districts marked in advance. Party militias and police raid presses, unions, and neighborhood councils in a coordinated wave of terror."
 aota.2117.a:0 "No sanctuary for the impure."
 aota.2117.b:0 "The apparatus is overreaching."
 aota.2118.t:0 "The Tithe of Steel"
 aota.2118.d:0 "The Directorate signs emergency compacts with armaments cartels: quotas are mandatory, labor discipline militarized, and strikes treated as sabotage. Production surges as civic life buckles."
 aota.2118.a:0 "Steel before bread."
 aota.2119.t:0 "The Registry Expands"
 aota.2119.d:0 "Names, neighborhoods, professions, and confessions are folded into a single security index. The purpose is explicit: to distinguish the reborn nation from populations marked for expulsion, incarceration, or exemplary punishment."
 aota.2119.a:0 "File every suspect."
 aota.2119.b:0 "Make examples of the organizers."
 aota.2120.t:0 "The March of Reclamation"
 aota.2120.d:0 "State radio declares that old frontiers are provisional scars and that history authorizes restoration by force. The doctrine is no longer regional opportunism; it is a program for permanent expansion."
 aota.2120.a:0 "The world will answer."
 aota.2121.t:0 "The Iron Crescent Proclaimed"
 aota.2121.d:0 "Nazım Arslan appears before massed legions and swears an oath of purification, vengeance, and imperial rebirth. Civil authority is subordinated to party-security command; loyalty becomes the only law."
 aota.2121.a:0 "One Leader, One War Order."
 aota.2122.t:0 "Crusade Against the Broken World"
 aota.2122.d:0 "The Directorate frames coming wars as a civilizational trial in which compromise equals extinction. Border states, minorities, and rival blocs are all designated obstacles to be crushed in sequence."
 aota.2122.a:0 "Prepare for a long darkness."
 aota.2123.t:0 "Britain Assesses the Iron Crescent"
 aota.2123.d:0 "Reports from Istanbul describe a fascist terror state now oriented toward expansion. The Cabinet debates containment, rearmament, and support for exposed regional partners."
 aota.2123.a:0 "Increase strategic vigilance."
 aota.2124.t:0 "France and the Levantine Threat"
 aota.2124.d:0 "French planners conclude that the new Ottoman order is not a bargaining partner but an ideological revisionist project willing to destabilize the entire eastern basin."
 aota.2124.a:0 "Fortify the eastern approaches."
 aota.2125.t:0 "Berlin Watches the Directorate"
 aota.2125.d:0 "German analysts note that the Iron Crescent mixes opportunistic diplomacy with genocidal rhetoric and rapid military buildup, creating both openings and grave risks."
 aota.2125.a:0 "Monitor and prepare contingencies."
 aota.2126.t:0 "Moscow Reads the Frontier Doctrine"
 aota.2126.d:0 "The Soviet command interprets Ottoman frontier propaganda as preparation for prolonged conflict zones and ideological encirclement across the Black Sea and Caucasus corridors."
 aota.2126.a:0 "Reinforce the southern districts."
 aota.2128.t:0 "Directive from the Special Tribunals"
 aota.2128.d:0 "The tribunals demand broader detention powers and faster sentencing cycles. Governors are instructed to meet repression targets under military supervision."
 aota.2128.a:0 "The quotas must be met."

