l_english:
 AOTA_american_reunification:0 "American Reunification"
 AOTA_american_reunification_desc:0 "The old Union has shattered, but every successor claims to embody the legitimate future of the continent. Whether by treaty, agitation, crusade, or conquest, each splinter now tries to make its own America the only America."

 aota_acc_remnant_bureaucracy:0 "Remnant Bureaucracy"
 aota_acc_remnant_bureaucracy_desc:0 "The Coalition inherited the shell of a federal state, but not its confidence. Clerks, judges, and officers still report for duty, though nobody can say how long that habit will endure."
 aota_acc_bill_of_salvation:0 "Bill of National Salvation"
 aota_acc_bill_of_salvation_desc:0 "Emergency law has become the legal bridge between collapse and reconstruction."
 aota_acc_war_production:0 "War Production Board"
 aota_acc_war_production_desc:0 "The remnant state has imposed order on its surviving arsenals and machine works."
 aota_acc_union_must_endure:0 "The Union Must Endure"
 aota_acc_union_must_endure_desc:0 "The Coalition no longer pretends this is a temporary emergency. It is now committed to restoring the United States by force if necessary."

 aota_awu_workers_congress:0 "Workers' Congress"
 aota_awu_workers_congress_desc:0 "Trade union delegates, radical caucuses, and local defense committees have improvised a national revolutionary center."
 aota_awu_planning_bureau:0 "Central Planning Bureau"
 aota_awu_planning_bureau_desc:0 "The revolution will survive only if steel, rail, and bread are directed from one center."
 aota_awu_federation_of_communes:0 "Federation of Communes"
 aota_awu_federation_of_communes_desc:0 "Some within the Workers' Union argue that any revolution worth saving must remain decentralized."
 aota_awu_militias:0 "Workers' Militias"
 aota_awu_militias_desc:0 "Factory guards and neighborhood companies have become the backbone of the revolutionary war effort."

 aota_ana_command_state:0 "Command State"
 aota_ana_command_state_desc:0 "The National Authority treats hesitation as treason and politics as a luxury of peacetime."
 aota_ana_reunification_army:0 "Army of Reunification"
 aota_ana_reunification_army_desc:0 "The officer corps has been reorganized around the single goal of crushing every rival banner."
 aota_ana_national_crusade:0 "National Crusade"
 aota_ana_national_crusade_desc:0 "The war is framed not as civil conflict but as a campaign to rescue the nation from dismemberment and decadence."

 aota_apf_harbor_republic:0 "Harbor Republic"
 aota_apf_harbor_republic_desc:0 "The Pacific survives through ports, shipping, and a stubborn regional confidence."
 aota_apf_setting_sun:0 "Republic of the Setting Sun"
 aota_apf_setting_sun_desc:0 "A new western patriotism has emerged, maritime in outlook and self-consciously distinct from the old eastern Union."

 aota_acg_boardroom_state:0 "Boardroom State"
 aota_acg_boardroom_state_desc:0 "The Corporate Commonwealth is run by contracts, syndicates, and men who believe solvency is legitimacy."
 aota_acg_private_security:0 "Private Security Contracts"
 aota_acg_private_security_desc:0 "Instead of a national army, the Commonwealth trusts shareholders, insurers, and hired force."

 aota_asl_county_levies:0 "County Levies"
 aota_asl_county_levies_desc:0 "The Southern Agrarian League relies on sheriffs, church halls, and local elites to summon men to arms."
 aota_asl_distributist_compromise:0 "Distributist Compromise"
 aota_asl_distributist_compromise_desc:0 "To hold its coalition together, the League has mixed agrarian populism with a rhetoric of small property and local stewardship."

 aota_ccw_common_prayer:0 "The Common Prayer"
 aota_ccw_common_prayer_desc:0 "Shared ritual has become the closest thing the Commonwealth possesses to a national institution."
 aota_ccw_distributist_debate:0 "Distributist Debate"
 aota_ccw_distributist_debate_desc:0 "Some Christian communitarians want ordered smallholding and parish authority rather than a fully anti-state federation."
 aota_ccw_federation:0 "Christian Anarchist Federation"
 aota_ccw_federation_desc:0 "Parishes, kitchens, and communes have been bound into a loose religious federation skeptical of all crowns, capitals, and commissars."

 ACC_hold_the_capitol_line:0 "Hold the Capitol Line"
 ACC_hold_the_capitol_line_desc:0 "Before legitimacy can be restored, the remnant government must first survive."
 ACC_emergency_judiciary:0 "Emergency Judiciary"
 ACC_emergency_judiciary_desc:0 "Courts will justify the emergency so long as they can pretend to control it."
 ACC_rally_the_governors:0 "Rally the Governors"
 ACC_rally_the_governors_desc:0 "Federal survival depends on persuading enough statehouses that Washington still matters."
 ACC_secure_the_arsenals:0 "Secure the Arsenals"
 ACC_secure_the_arsenals_desc:0 "A republic without rifles is a debating society."
 ACC_bill_of_national_salvation:0 "Bill of National Salvation"
 ACC_bill_of_national_salvation_desc:0 "Emergency law will become the spine of the surviving constitutional order."
 ACC_restore_congressional_authority:0 "Restore Congressional Authority"
 ACC_restore_congressional_authority_desc:0 "Even in wartime, the Coalition must prove that civilian government still exists."
 ACC_federal_loyalist_officers:0 "Federal Loyalist Officers"
 ACC_federal_loyalist_officers_desc:0 "Not every general has abandoned the old oath."
 ACC_war_production_board:0 "War Production Board"
 ACC_war_production_board_desc:0 "The remnant state must convert the industries it still holds into instruments of national survival."
 ACC_continental_command:0 "Continental Command"
 ACC_continental_command_desc:0 "The Coalition must think beyond regional defense and prepare for a continental campaign."
 ACC_reach_to_the_pacific:0 "Reach to the Pacific"
 ACC_reach_to_the_pacific_desc:0 "Some in the Coalition still hope that not every western separatist must be fought to the last."
 ACC_demand_the_swearing_of_oaths:0 "Demand the Swearing of Oaths"
 ACC_demand_the_swearing_of_oaths_desc:0 "Every officer, mayor, and governor must choose."
 ACC_reunification_campaign:0 "Reunification Campaign"
 ACC_reunification_campaign_desc:0 "The time for provisional language has passed."
 ACC_a_second_founding:0 "A Second Founding"
 ACC_a_second_founding_desc:0 "If the republic survives this war, it cannot emerge unchanged."
 ACC_the_union_must_endure:0 "The Union Must Endure"
 ACC_the_union_must_endure_desc:0 "The Union is no longer a constitutional assumption but an existential creed."

 AWU_the_workers_congress:0 "The Workers' Congress"
 AWU_the_workers_congress_desc:0 "The industrial heartland must choose how its revolution will be governed."
 AWU_seize_the_rail_hubs:0 "Seize the Rail Hubs"
 AWU_seize_the_rail_hubs_desc:0 "Whoever controls the rails controls bread, coal, and reinforcements."
 AWU_arsenals_of_labour:0 "Arsenals of Labour"
 AWU_arsenals_of_labour_desc:0 "The machine shops of the Midwest will not remain neutral."
 AWU_red_vs_black_committees:0 "Red and Black Committees"
 AWU_red_vs_black_committees_desc:0 "Centralists and anti-statists alike claim to speak for the workers."
 AWU_central_planning_bureau:0 "Central Planning Bureau"
 AWU_central_planning_bureau_desc:0 "The revolution must be planned if it is to survive."
 AWU_federation_of_communes:0 "Federation of Communes"
 AWU_federation_of_communes_desc:0 "The workers did not rise simply to build a new hierarchy."
 AWU_workers_defense_corps:0 "Workers' Defense Corps"
 AWU_workers_defense_corps_desc:0 "The shop floor and the trench line now belong to the same class."
 AWU_revolutionary_food_commissariats:0 "Revolutionary Food Commissariats"
 AWU_revolutionary_food_commissariats_desc:0 "Steel alone will not feed an army."
 AWU_union_state_radio:0 "Union State Radio"
 AWU_union_state_radio_desc:0 "Every speech, slogan, and bulletin becomes a weapon."
 AWU_free_federations:0 "Free Federations"
 AWU_free_federations_desc:0 "Delegates come and go; the communes remain."
 AWU_the_black_rail_net:0 "The Black Rail Net"
 AWU_the_black_rail_net_desc:0 "Sabotage and solidarity travel the same tracks."
 AWU_export_the_revolution:0 "Export the Revolution"
 AWU_export_the_revolution_desc:0 "The Workers' Union must decide whether it is merely surviving or remaking America."
 AWU_hold_the_lakes:0 "Hold the Lakes"
 AWU_hold_the_lakes_desc:0 "The inland sea of industry must not be surrendered."
 AWU_settle_the_schism:0 "Settle the Schism"
 AWU_settle_the_schism_desc:0 "The red-black argument can no longer remain theoretical."

 ANA_order_through_command:0 "Order Through Command"
 ANA_order_through_command_desc:0 "The Authority offers one promise above all others: order."
 ANA_integrate_the_militias:0 "Integrate the Militias"
 ANA_integrate_the_militias_desc:0 "Irregular violence must be bent into disciplined hierarchy."
 ANA_march_on_the_industrial_belt:0 "March on the Industrial Belt"
 ANA_march_on_the_industrial_belt_desc:0 "Without steel, there will be no nation left to save."
 ANA_paramilitary_governors:0 "Paramilitary Governors"
 ANA_paramilitary_governors_desc:0 "Civil administration will answer to command."
 ANA_national_reconstruction_corps:0 "National Reconstruction Corps"
 ANA_national_reconstruction_corps_desc:0 "Roads, depots, and depopulated towns will be remade under military supervision."
 ANA_army_of_reunification:0 "Army of Reunification"
 ANA_army_of_reunification_desc:0 "One army, one command, one campaign."
 ANA_national_redoubt_iconography:0 "National Redoubt Iconography"
 ANA_national_redoubt_iconography_desc:0 "The nation is no longer an inheritance. It is a sacrament of force."
 ANA_war_industry_decrees:0 "War Industry Decrees"
 ANA_war_industry_decrees_desc:0 "The factories will obey as surely as the barracks."
 ANA_officer_state:0 "Officer State"
 ANA_officer_state_desc:0 "The military now governs not merely the battlefield but the republic's replacement."
 ANA_silence_the_dissidents:0 "Silence the Dissidents"
 ANA_silence_the_dissidents_desc:0 "America will be made whole, and the critics can speak from prison."
 ANA_take_the_capitol:0 "Take the Capitol"
 ANA_take_the_capitol_desc:0 "The old center must be seized if the new center is to be legitimate."
 ANA_a_national_crusade:0 "A National Crusade"
 ANA_a_national_crusade_desc:0 "The civil war becomes a sacred mission of national rebirth."
 ANA_the_flag_over_every_statehouse:0 "The Flag Over Every Statehouse"
 ANA_the_flag_over_every_statehouse_desc:0 "The Authority dreams not of compromise but of total submission."

 APF_keep_the_pacific_open:0 "Keep the Pacific Open"
 APF_keep_the_pacific_open_desc:0 "The Pacific Federation survives by refusing encirclement and stagnation."
 APF_sacramento_compromise:0 "The Sacramento Compromise"
 APF_sacramento_compromise_desc:0 "Regional democrats, businessmen, labor moderates, and secessionists must all be kept in one coalition."
 APF_western_emergency_fleet:0 "Western Emergency Fleet"
 APF_western_emergency_fleet_desc:0 "No Pacific republic can afford to neglect the sea."
 APF_cascadian_industrial_compacts:0 "Cascadian Industrial Compacts"
 APF_cascadian_industrial_compacts_desc:0 "The western workshops will be integrated into one regional economy."
 APF_regional_guard_commands:0 "Regional Guard Commands"
 APF_regional_guard_commands_desc:0 "California, Oregon, and Washington must coordinate their separate defenses."
 APF_shipping_credits:0 "Shipping Credits"
 APF_shipping_credits_desc:0 "Credit, tonnage, and fuel are now strategic assets."
 APF_pacific_air_yards:0 "Pacific Air Yards"
 APF_pacific_air_yards_desc:0 "The west will build its own skies."
 APF_the_coastal_compact:0 "The Coastal Compact"
 APF_the_coastal_compact_desc:0 "The coast can endure if it learns to think as one polity."
 APF_republic_of_the_setting_sun:0 "Republic of the Setting Sun"
 APF_republic_of_the_setting_sun_desc:0 "A new Pacific patriotism is taking shape."
 APF_open_channels_to_ottawa:0 "Open Channels to Ottawa"
 APF_open_channels_to_ottawa_desc:0 "Recognition abroad may buy time at home."
 APF_look_east_again:0 "Look East Again"
 APF_look_east_again_desc:0 "No western settlement can remain permanent while the old Union burns."
 APF_return_to_the_union_on_our_terms:0 "Return to the Union on Our Terms"
 APF_return_to_the_union_on_our_terms_desc:0 "The Pacific Federation does not reject America; it demands to redefine it."

 ACG_boardroom_cabinet:0 "Boardroom Cabinet"
 ACG_boardroom_cabinet_desc:0 "The Commonwealth treats insolvency as a greater danger than sedition."
 ACG_private_security_contracts:0 "Private Security Contracts"
 ACG_private_security_contracts_desc:0 "Protection is now another line item in the budget."
 ACG_creditor_republic:0 "Creditor Republic"
 ACG_creditor_republic_desc:0 "Bondholders and industrial managers have become the stewards of a new political order."
 ACG_mercantile_reconquest:0 "Mercantile Reconquest"
 ACG_mercantile_reconquest_desc:0 "Profit and power will advance together."
 ACG_corporate_rail_grid:0 "Corporate Rail Grid"
 ACG_corporate_rail_grid_desc:0 "Private logistics must replace shattered federal systems."
 ACG_munitions_trusts:0 "Munitions Trusts"
 ACG_munitions_trusts_desc:0 "War is a market, and the Commonwealth intends to dominate it."
 ACG_hire_foreign_specialists:0 "Hire Foreign Specialists"
 ACG_hire_foreign_specialists_desc:0 "Experts can be bought even when legitimacy cannot."
 ACG_dividends_before_dawn:0 "Dividends Before Dawn"
 ACG_dividends_before_dawn_desc:0 "Investors demand proof that the Commonwealth can out-produce its enemies."
 ACG_shareholder_legions:0 "Shareholder Legions"
 ACG_shareholder_legions_desc:0 "The new soldiery fights for company, contract, and personal advancement."
 ACG_the_market_conquers:0 "The Market Conquers"
 ACG_the_market_conquers_desc:0 "The Commonwealth claims that only private force can reunify a ruined nation."

 ASL_the_county_levies:0 "The County Levies"
 ASL_the_county_levies_desc:0 "The League's first strength lies in local loyalties and local rifles."
 ASL_cotton_and_corn_barter:0 "Cotton and Corn Barter"
 ASL_cotton_and_corn_barter_desc:0 "The southern war economy will begin with barter if it must."
 ASL_land_and_church:0 "Land and Church"
 ASL_land_and_church_desc:0 "The League binds rural notables, ministers, and smallholders into one camp."
 ASL_sheriffs_war_council:0 "Sheriffs' War Council"
 ASL_sheriffs_war_council_desc:0 "County power brokers must become something like a national command."
 ASL_rural_fortress_lines:0 "Rural Fortress Lines"
 ASL_rural_fortress_lines_desc:0 "Every bridge, field, and courthouse is a defensive asset."
 ASL_distributist_compromise:0 "Distributist Compromise"
 ASL_distributist_compromise_desc:0 "To keep populists and moral traditionalists together, the League adopts a language of small property and moral economy."
 ASL_the_black_march:0 "The Black March"
 ASL_the_black_march_desc:0 "Hardliners within the League dream of carrying southern vengeance northward."
 ASL_feed_the_armies:0 "Feed the Armies"
 ASL_feed_the_armies_desc:0 "A hungry levy is little better than a mob."
 ASL_southern_redemption:0 "Southern Redemption"
 ASL_southern_redemption_desc:0 "The League's leaders now speak as though they are called to redeem, rather than merely defend, the South."

 CCW_the_common_prayer:0 "The Common Prayer"
 CCW_the_common_prayer_desc:0 "The Commonwealth gathers not around a state, but around shared acts of faith."
 CCW_houses_of_hospitality:0 "Houses of Hospitality"
 CCW_houses_of_hospitality_desc:0 "Soup kitchens, shelters, and cooperatives have become the Commonwealth's infrastructure."
 CCW_gospel_and_commune:0 "Gospel and Commune"
 CCW_gospel_and_commune_desc:0 "The state forged the war; the parish and commune will outlive it."
 CCW_shield_the_small_parishes:0 "Shield the Small Parishes"
 CCW_shield_the_small_parishes_desc:0 "The Commonwealth is peaceful only until someone marches on its people."
 CCW_distributist_debate:0 "The Distributist Debate"
 CCW_distributist_debate_desc:0 "Some believers want a moral economy of small property, not a fully anti-state federation."
 CCW_christian_anarchist_federation:0 "Christian Anarchist Federation"
 CCW_christian_anarchist_federation_desc:0 "The Commonwealth can either become a moral republic, or go further and become a federation of free Christian communes."
 CCW_peoples_processions:0 "People's Processions"
 CCW_peoples_processions_desc:0 "Mass rituals have become instruments of morale, discipline, and witness."
 CCW_bread_before_bullets:0 "Bread Before Bullets"
 CCW_bread_before_bullets_desc:0 "The Commonwealth must prove it can feed and shelter before it can credibly preach peace."
 CCW_the_black_and_gold_banner:0 "The Black and Gold Banner"
 CCW_the_black_and_gold_banner_desc:0 "A radical Christian symbol now flies over a movement that denounces both Caesar and commissar."
 CCW_reconcile_or_crusade:0 "Reconcile or Crusade"
 CCW_reconcile_or_crusade_desc:0 "The Commonwealth must choose whether its faith will end the war or sanctify it."

 ACC_seek_pacific_compromise:0 "Seek a Pacific Compromise"
 ACC_seek_pacific_compromise_desc:0 "Not every rival regime must be crushed if some can be coaxed back into a constitutional settlement."
 ACC_issue_reunification_ultimatum:0 "Issue a Reunification Ultimatum"
 ACC_issue_reunification_ultimatum_desc:0 "The remnant government will demand obedience one last time."
 AWU_agitate_in_enemy_factories:0 "Agitate in Enemy Factories"
 AWU_agitate_in_enemy_factories_desc:0 "Strikes and sabotage can be as decisive as rifles."
 AWU_settle_red_black_compacts:0 "Settle Red-Black Compacts"
 AWU_settle_red_black_compacts_desc:0 "The revolutionary camp cannot survive if its internal factions keep preparing for the next civil war."
 ANA_mobilise_the_officer_schools:0 "Mobilise the Officer Schools"
 ANA_mobilise_the_officer_schools_desc:0 "Cadets and instructors alike will be sent directly to the front."
 APF_broker_the_coastal_ceasefire:0 "Broker the Coastal Ceasefire"
 APF_broker_the_coastal_ceasefire_desc:0 "The Pacific Federation would rather buy time than burn it."
 ACG_sell_rearmament_bonds:0 "Sell Rearmament Bonds"
 ACG_sell_rearmament_bonds_desc:0 "The market can be persuaded to underwrite victory."
 ASL_raise_new_county_columns:0 "Raise New County Columns"
 ASL_raise_new_county_columns_desc:0 "Every courthouse should become a barracks."
 CCW_call_a_peace_synod:0 "Call a Peace Synod"
 CCW_call_a_peace_synod_desc:0 "The bishops, workers, and commune delegates must decide whether peace is still possible."

 aota.820.t:0 "The Coalition Looks West"
 aota.820.d:0 "Within the American Constitutional Coalition, a debate has opened over the Pacific Federation. Is the western regime a traitorous breakaway to be crushed, or a constitutional cousin that might still be bargained with before the continent drowns in blood?"
 aota.820.a:0 "Offer terms before issuing threats."
 aota.820.b:0 "Only force will settle the question."

 aota.821.t:0 "The Red-Black Settlement"
 aota.821.d:0 "The Workers' Union can no longer postpone the deepest argument in its camp. Central planners insist that discipline will save the revolution. Communalists reply that a revolution governed like a barracks has already betrayed itself."
 aota.821.a:0 "The revolution needs one center."
 aota.821.b:0 "Let the communes breathe."

 aota.822.t:0 "Pacific Channels"
 aota.822.d:0 "Foreign representatives and coastal intermediaries have quietly opened channels to the Pacific Federation. Some in Sacramento believe recognition abroad could stabilize the west. Others think outside entanglements will only compromise the Federation's independence."
 aota.822.a:0 "Recognition buys time."
 aota.822.b:0 "We will stand alone if we must."

 aota.823.t:0 "Reconcile or Crusade"
 aota.823.d:0 "The Christian Commonwealth stands at a fork. One current urges reconciliation: feed the hungry, protect the parishes, and seek a merciful peace with any American faction willing to spare the innocent. Another claims the war has become a righteous trial, and that only a sanctified struggle can prevent corporate, statist, and atheistic tyrannies from swallowing the faithful."
 aota.823.a:0 "Mercy first."
 aota.823.b:0 "The just war is upon us."

 aota.830.t:0 "A Pacific Proposal"
 aota.830.d:0 "Envoys from the Coalition have brought a proposal: a ceasefire, mutual recognition, and a future convention to decide what America shall be. Some in the Pacific Federation see prudence. Others smell weakness and betrayal."
 aota.830.a:0 "Buy time."
 aota.830.b:0 "Prepare the fleet and the railroads."

