l_english:
 AOTA_NIGHT_PACT:0 "Night Pact"
 AOTA_CHARTER_OF_RESTORATION:0 "Charter of Restoration"

 GER_continental_directorate:0 "Continental Directorate"
 GER_continental_directorate_DEF:0 "the Continental Directorate"
 GER_continental_directorate_ADJ:0 "Directorate"
 CUB_ledger_republic:0 "Cuban Ledger Republic"
 CUB_ledger_republic_DEF:0 "the Cuban Ledger Republic"
 CUB_ledger_republic_ADJ:0 "Ledger Cuban"
 ENG_commonwealth_reconstruction_authority:0 "Commonwealth Reconstruction Authority"
 ENG_commonwealth_reconstruction_authority_DEF:0 "the Commonwealth Reconstruction Authority"
 ENG_commonwealth_reconstruction_authority_ADJ:0 "Commonwealth"

 GER_exception_decree_state:0 "Declare the Permanent Exception"
 GER_exception_decree_state_desc:0 "The ministries argue that crisis has become normal and law must now serve survival. Extraordinary decrees will bind industry, police, and provincial administration into a single command architecture."
 GER_security_directorate_cabinet:0 "Security Directorate Cabinet"
 GER_security_directorate_cabinet_desc:0 "A cabinet of police jurists, rail planners, and procurement marshals formalizes the emergency state."
 GER_tributary_industrial_zones:0 "Tributary Industrial Zones"
 GER_tributary_industrial_zones_desc:0 "Neighboring markets are to be integrated as appendages of German heavy industry."
 GER_frontier_loyalty_commands:0 "Frontier Loyalty Commands"
 GER_frontier_loyalty_commands_desc:0 "Occupation doctrine is rewritten around selective patronage, exemplary violence, and permanent surveillance."
 GER_black_dossier_diplomacy:0 "Black Dossier Diplomacy"
 GER_black_dossier_diplomacy_desc:0 "Trade concessions, debt papers, and intelligence files become one diplomatic weapon."
 GER_night_pact_architecture:0 "Night Pact Architecture"
 GER_night_pact_architecture_desc:0 "No empire rules alone. A deniable network of collaborators, clients, and profiteers must be assembled."
 GER_continental_night_order:0 "The Continental Night Order"
 GER_continental_night_order_desc:0 "The doctrine is complete: order through dependency, terror, and managed scarcity."

 ENG_ref_truth_and_reconstruction_congress:0 "Truth and Reconstruction Congress"
 ENG_ref_truth_and_reconstruction_congress_desc:0 "The reform bloc convenes unions, dominion delegates, veterans, and colonial reformers to draft a harder peace."
 ENG_ref_reparative_budgeting:0 "Reparative Budgeting"
 ENG_ref_reparative_budgeting_desc:0 "Reconstruction means accepting slower rearmament in exchange for social recovery and civic legitimacy."
 ENG_ref_citizens_relief_mission:0 "Citizens' Relief Mission"
 ENG_ref_citizens_relief_mission_desc:0 "Food corridors, hospital shipping, and refugee resettlement become instruments of strategy and conscience."
 ENG_ref_plural_oceanic_charter:0 "Plural Oceanic Charter"
 ENG_ref_plural_oceanic_charter_desc:0 "The old imperial sea-lanes are recast as reciprocal security commons."
 ENG_ref_solidarity_convoys:0 "Solidarity Convoys"
 ENG_ref_solidarity_convoys_desc:0 "Convoys carry not just fuel and steel but medicine, teachers, and reconstruction specialists."
 ENG_ref_the_charter_of_restoration:0 "The Charter of Restoration"
 ENG_ref_the_charter_of_restoration_desc:0 "States willing to trade predation for mutual guarantees are invited into a new pact."
 ENG_ref_last_best_argument:0 "The Last Best Argument"
 ENG_ref_last_best_argument_desc:0 "The hope path survives only if it can defend itself while refusing to become its enemy."

 CUB_midnight_compliance_ledger:0 "Midnight Compliance Ledger"
 CUB_midnight_compliance_ledger_desc:0 "Insurance tribunals, private auditors, and armed customs brokers merge into a machine state of debt enforcement."
 CUB_repossess_the_hemisphere:0 "Repossess the Hemisphere"
 CUB_repossess_the_hemisphere_desc:0 "The boardroom regime seeks to repossess ports, islands, and governments through debt leverage and leased force."

 AOTA_night_pact_category:0 "Night Pact Network"
 AOTA_night_pact_category_desc:0 "A soft villain coalition of security states, extraction partners, and opportunist regimes."
 AOTA_hope_front_category:0 "Restoration Front"
 AOTA_hope_front_category_desc:0 "A difficult coalition for reconstruction, pluralism, and strategic restraint."
 AOTA_hidden_ledger_category:0 "Ledger State Instruments"
 AOTA_hidden_ledger_category_desc:0 "The hidden mechanics of the Cuban corporate-security nightmare."

 AOTA_invite_to_night_pact:0 "Invite a Regime to the Night Pact"
 AOTA_invite_to_night_pact_desc:0 "Offer protection, contracts, and intelligence support to another threatened elite order."
 AOTA_night_pact_financial_protocol:0 "Implement Predatory Finance Protocols"
 AOTA_night_pact_financial_protocol_desc:0 "Tie domestic budgeting to coalition debt and procurement standards."
 AOTA_night_pact_security_protocol:0 "Adopt Shared Security Protocols"
 AOTA_night_pact_security_protocol_desc:0 "Standardize doctrine, surveillance exchange, and anti-labor emergency plans."
 AOTA_hope_issue_sanctions:0 "Issue Coordinated Sanctions"
 AOTA_hope_issue_sanctions_desc:0 "Target the coalition's insurers, shipping combines, and broker houses."
 AOTA_hope_ship_reconstruction_aid:0 "Ship Reconstruction Aid"
 AOTA_hope_ship_reconstruction_aid_desc:0 "Pay the domestic cost to keep devastated partners alive and aligned."
 AOTA_cub_export_compliance_battalions:0 "Export Compliance Battalions"
 AOTA_cub_export_compliance_battalions_desc:0 "Deploy contractual security battalions to guarantee debt servicing and concession rights."

 aota_ger_permanent_exception:0 "Permanent Exception State"
 aota_ger_permanent_exception_desc:0 "Emergency law has become the ordinary constitution of power."
 aota_ger_tributary_industry:0 "Tributary Industrial Structure"
 aota_ger_tributary_industry_desc:0 "Peripheral economies are reorganized around German military production needs."
 aota_ger_night_order:0 "Continental Night Order"
 aota_ger_night_order_desc:0 "A regime of coercive hierarchy sustained by fear and logistical domination."
 aota_cub_ledger_state:0 "Ledger State"
 aota_cub_ledger_state_desc:0 "The republic is now an accounting machine that prices rights and enforces contracts at gunpoint."
 aota_cub_debt_discipline:0 "Debt Discipline Battalions"
 aota_cub_debt_discipline_desc:0 "Default is treated as insurrection; collection as national defense."
 aota_eng_restoration_compact:0 "Restoration Compact"
 aota_eng_restoration_compact_desc:0 "A cross-class compromise to rebuild institutions before pursuing imperial revenge."
 aota_eng_solidarity_convoys:0 "Solidarity Convoys"
 aota_eng_solidarity_convoys_desc:0 "Humanitarian logistics become a pillar of naval statecraft."
 aota_eng_hard_peace_dividend:0 "Hard Peace Dividend"
 aota_eng_hard_peace_dividend_desc:0 "Civil resilience rises, but armament lobbies resent constrained military spending."
 aota_soft_villain_finance:0 "Night Pact Finance"
 aota_soft_villain_finance_desc:0 "State budgets are synchronized to extraction and coercive credit systems."
 aota_soft_villain_security_exchange:0 "Night Pact Security Exchange"
 aota_soft_villain_security_exchange_desc:0 "Police, officers, and private contractors share doctrine and personnel."
 aota_soft_villain_targeted_sanctions:0 "Targeted by Restoration Front"
 aota_soft_villain_targeted_sanctions_desc:0 "A hostile sanctions architecture is constraining imports, insurance, and diplomatic room."
 aota_hope_international_bastion:0 "International Bastion of Hope"
 aota_hope_international_bastion_desc:0 "A fragile but real coalition committed to reconstruction and mutual defense."

 AOTA_GER_reinhard_gehlen_name:0 "Reinhard Gehlen"
 AOTA_GER_reinhard_gehlen_advisor:0 "Directorate Intelligence Broker"
 AOTA_CUB_julio_lobo_name:0 "Julio Lobo"
 AOTA_CUB_julio_lobo_advisor:0 "Sugar-Finance Cartel Liaison"
 AOTA_ENG_ellen_wilkinson_name:0 "Ellen Wilkinson"
 AOTA_ENG_ellen_wilkinson_advisor:0 "Reconstruction Tribune"

 aota_5000_t:0 "Emergency Becomes Constitution"
 aota_5000_d:0 "Berlin announces that all ministries, labor offices, and provincial commands are now answerable to emergency directives. The armistice trauma is no longer treated as temporary."
 aota_5000_o1:0 "There will be no return to normal."
 aota_5001_t:0 "The Night Pact Proclaimed"
 aota_5001_d:0 "Germany's directorate invites regimes, combines, and security establishments into an informal order of mutual coercion: contracts for loyalty, intelligence for obedience, force for profit."
 aota_5001_o1:0 "The continent darkens."
 aota_5001_threat:0 "The Night Pact Expands"
 aota_5002_t:0 "Invitation to the Night Pact"
 aota_5002_d:0 "Berlin offers market access, security cooperation, and discreet intervention support in exchange for policy convergence."
 aota_5002_o1:0 "Accept the arrangement."
 aota_5002_o2:0 "Remain outside this machinery."
 aota_5003_t:0 "Congress of Repair"
 aota_5003_d:0 "Britain's reform coalition rejects both imperial nostalgia and cynical retrenchment, committing instead to costly reconstruction at home and abroad."
 aota_5003_o1:0 "A harder, better peace begins."
 aota_5004_t:0 "The Ledger Republic"
 aota_5004_d:0 "Cuba's boardroom regime finalizes its transformation: sovereignty is now measured by contract enforceability and debt extraction capacity."
 aota_5004_o1:0 "Everything has a price."
 aota_5005_t:0 "A New Global Faultline"
 aota_5005_d:0 "Observers increasingly describe world politics as a struggle between the Night Pact's coercive network and those attempting a democratic reconstruction order."
 aota_5005_o1:0 "History chooses no easy side."
 GER_reichskommissariat_compacts:0 "Reichskommissariat Compacts"
 GER_reichskommissariat_compacts_desc:0 "Provisional authorities are folded into a single supervised framework with clear extraction quotas and security obligations."
 GER_concessionary_police_zones:0 "Concessionary Police Zones"
 GER_concessionary_police_zones_desc:0 "Private combines and occupation gendarmeries are fused into district command circuits."
 GER_occupation_clearinghouse:0 "Occupation Clearinghouse"
 GER_occupation_clearinghouse_desc:0 "A Berlin clearinghouse allocates labor, rail access, and raw inputs from every dependent region."
 GER_market_of_hostages:0 "The Market of Hostages"
 GER_market_of_hostages_desc:0 "Credit guarantees, grain contracts, and family hostages become interchangeable leverage tools."
 GER_managed_famine_exports:0 "Managed Famine Exports"
 GER_managed_famine_exports_desc:0 "Food supply is converted into a strategic weapon and an industrial feedstock policy."
 GER_armored_customs_union:0 "Armored Customs Union"
 GER_armored_customs_union_desc:0 "Tariff policy is militarized and border stations become fortified toll gates of empire."
 GER_the_night_pact_secretariat:0 "Night Pact Secretariat"
 GER_the_night_pact_secretariat_desc:0 "A permanent secretariat standardizes debt terms, intelligence exchange, and emergency decrees across partner regimes."
 GER_black_sea_to_baltic_grid:0 "Black Sea to Baltic Grid"
 GER_black_sea_to_baltic_grid_desc:0 "The continental order is made physically durable through integrated rail, telegraph, and supply corridors."
 GER_the_second_armistice:0 "The Second Armistice"
 GER_the_second_armistice_desc:0 "Berlin presents a new peace: hierarchical, extractive, and enforced by permanent emergency institutions."

 ENG_ref_relief_over_revenge:0 "Relief Over Revenge"
 ENG_ref_relief_over_revenge_desc:0 "The government accepts immediate military criticism in order to prioritize social repair and de-escalation support."
 ENG_ref_commonwealth_labor_guarantees:0 "Commonwealth Labor Guarantees"
 ENG_ref_commonwealth_labor_guarantees_desc:0 "A transnational labor charter ties reconstruction funds to wage floors and safety protections."
 ENG_ref_reconstruction_credit_union:0 "Reconstruction Credit Union"
 ENG_ref_reconstruction_credit_union_desc:0 "Sterling finance is redirected from extractive leverage to long-horizon civic recovery programs."
 ENG_ref_minority_rights_protocols:0 "Minority Rights Protocols"
 ENG_ref_minority_rights_protocols_desc:0 "Constitutional protections are extended and monitored through joint commonwealth review bodies."
 ENG_ref_commonwealth_anti_oligarchy_act:0 "Commonwealth Anti-Oligarchy Act"
 ENG_ref_commonwealth_anti_oligarchy_act_desc:0 "Asset transparency, emergency anti-cartel courts, and political donation controls are adopted."
 ENG_ref_fleet_of_mercy:0 "Fleet of Mercy"
 ENG_ref_fleet_of_mercy_desc:0 "Hospital ships and protected logistics convoys become the strategic signature of the reconstruction bloc."
 ENG_ref_defensive_internationalism:0 "Defensive Internationalism"
 ENG_ref_defensive_internationalism_desc:0 "The restoration coalition commits to mutual defense without reviving coercive imperial hierarchy."
 ENG_ref_sanction_the_night_pact:0 "Sanction the Night Pact"
 ENG_ref_sanction_the_night_pact_desc:0 "Insurance syndicates, shipping brokers, and cartel banks tied to the Night Pact are blacklisted."
 ENG_ref_a_harder_better_world:0 "A Harder, Better World"
 ENG_ref_a_harder_better_world_desc:0 "Hope survives only as a disciplined political project that can outlast fear and opportunism."

 CUB_quantify_the_citizen:0 "Quantify the Citizen"
 CUB_quantify_the_citizen_desc:0 "Every resident is assigned risk categories, contract scores, and enforceable debt profiles."
 CUB_blackwater_customs_service:0 "Blackwater Customs Service"
 CUB_blackwater_customs_service_desc:0 "Customs and concession enforcement are outsourced to armed contractual authorities."
 CUB_seize_the_insurance_chokepoints:0 "Seize the Insurance Chokepoints"
 CUB_seize_the_insurance_chokepoints_desc:0 "Control of maritime insurance enables command over shipping without formal annexation."
 CUB_contractual_blockade_doctrine:0 "Contractual Blockade Doctrine"
 CUB_contractual_blockade_doctrine_desc:0 "Ports can be denied through debt default clauses as effectively as by naval interdiction."
 CUB_debtors_registry_of_the_antilles:0 "Debtors' Registry of the Antilles"
 CUB_debtors_registry_of_the_antilles_desc:0 "A hemispheric debt registry marks governments and firms for financial punishment and armed collection."
 CUB_the_auctioned_sea:0 "The Auctioned Sea"
 CUB_the_auctioned_sea_desc:0 "The Caribbean becomes a marketplace of licensed sovereignty, debt policing, and concession warfare."

 AOTA_night_pact_client_audits:0 "Conduct Client Regime Audits"
 AOTA_night_pact_client_audits_desc:0 "Dispatch auditors and security liaisons to ensure partners obey extraction and policing standards."
 AOTA_night_pact_proxy_credit:0 "Issue Proxy Credit Guarantees"
 AOTA_night_pact_proxy_credit_desc:0 "Expand influence through emergency loans tied to military procurement and concession rights."
 AOTA_hope_refugee_corridors:0 "Open Refugee Corridors"
 AOTA_hope_refugee_corridors_desc:0 "Fund reception infrastructure and evacuation shipping at considerable domestic political cost."
 AOTA_hope_counter_propoganda_bureaus:0 "Counter-Propaganda Bureaus"
 AOTA_hope_counter_propoganda_bureaus_desc:0 "Coordinate public-information services against cartel and security-state disinformation."

 aota_ger_reichskommissariat_machine:0 "Reichskommissariat Machine"
 aota_ger_reichskommissariat_machine_desc:0 "A transnational bureaucratic apparatus coordinates occupation governance and coerced compliance."
 aota_eng_reconstruction_levies:0 "Reconstruction Levies"
 aota_eng_reconstruction_levies_desc:0 "New social and reconstruction taxes stabilize recovery but increase budgetary strain."
 aota_cub_auctioned_sea:0 "Auctioned Sea Regime"
 aota_cub_auctioned_sea_desc:0 "Maritime movement is governed by debt contracts, insurance blacklists, and armed compliance."

 aota_5006_t:0 "Compacts of Subordination"
 aota_5006_d:0 "Berlin's new administrative compacts leave little doubt: allied governments are expected to operate as managed dependencies."
 aota_5006_o1:0 "The paperwork of domination is complete."
 aota_5007_t:0 "The Second Armistice Declared"
 aota_5007_d:0 "The Directorate's order is presented as peace, but built on extraction quotas, coercive policing, and emergency law."
 aota_5007_o1:0 "A settlement written in iron."
 aota_5008_t:0 "The Anti-Oligarchy Fight"
 aota_5008_d:0 "Britain's reform coalition moves against entrenched combines and imperial patronage circles, provoking fierce resistance."
 aota_5008_o1:0 "No reconstruction without reform."
 aota_5009_t:0 "A Harder, Better World"
 aota_5009_d:0 "The restoration bloc is no utopia. It is a disciplined attempt to build security without surrendering politics to fear."
 aota_5009_o1:0 "Hope must be administered, defended, and renewed."
 aota_5011_t:0 "The Antillean Debtors' Registry"
 aota_5011_d:0 "Havana's ledger-state publishes a transnational blacklist of debtors and defaulters, backed by contractual armed force."
 aota_5011_o1:0 "Default is rebellion."

 aota_5010_threat:0 "Restoration Front Escalates Sanctions"
 aota_5011_threat:0 "Ledger-State Coercion in the Caribbean"
