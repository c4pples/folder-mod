l_english:
 AOTA_base_after_the_armistice:0 "After the Armistice"
 AOTA_base_after_the_armistice_desc:0 "The old order is fractured. Our first task is to hold the state together long enough to govern with purpose."
 AOTA_base_local_power_compacts:0 "Local Power Compacts"
 AOTA_base_local_power_compacts_desc:0 "We must negotiate practical arrangements with regional authorities and brokers to prevent administrative collapse."
 AOTA_base_emergency_administration:0 "Emergency Administration"
 AOTA_base_emergency_administration_desc:0 "A centralized emergency structure can turn fragmented offices into a functioning national command network."
 AOTA_base_national_coordination_secretariat:0 "National Coordination Secretariat"
 AOTA_base_national_coordination_secretariat_desc:0 "A permanent secretariat will synchronize ministries, provinces, and security institutions during the crisis years."
 AOTA_base_civil_order_framework:0 "Civil Order Framework"
 AOTA_base_civil_order_framework_desc:0 "Codify emergency governance into a coherent framework that reduces internal friction and restores public confidence."

 AOTA_base_reopen_supply_routes:0 "Reopen Supply Routes"
 AOTA_base_reopen_supply_routes_desc:0 "Trade and transport corridors must move again if recovery is to become more than a slogan."
 AOTA_base_revenue_stabilization_board:0 "Revenue Stabilization Board"
 AOTA_base_revenue_stabilization_board_desc:0 "A disciplined fiscal board will prioritize scarce resources and enforce orderly budget controls."
 AOTA_base_priority_industry_program:0 "Priority Industry Program"
 AOTA_base_priority_industry_program_desc:0 "Concentrate limited capital and labor where it protects national resilience and strategic autonomy."
 AOTA_base_logistics_and_stockpiles:0 "Logistics and Stockpiles"
 AOTA_base_logistics_and_stockpiles_desc:0 "Recovery fails without secure inventories, transport timetables, and procurement discipline."
 AOTA_base_rationed_growth_model:0 "Rationed Growth Model"
 AOTA_base_rationed_growth_model_desc:0 "Balanced rationing and targeted investment can deliver stability without overextending the state."

 AOTA_base_general_staff_review:0 "General Staff Review"
 AOTA_base_general_staff_review_desc:0 "Reassess command doctrines and force structure against the realities of the post-armistice world."
 AOTA_base_border_readiness_command:0 "Border Readiness Command"
 AOTA_base_border_readiness_command_desc:0 "Create a standing command to secure vulnerable frontiers and key lines of communication."
 AOTA_base_reserve_mobilization_plans:0 "Reserve Mobilization Plans"
 AOTA_base_reserve_mobilization_plans_desc:0 "Prepared reserve systems provide deterrence and survival capacity without full wartime mobilization."
 AOTA_base_doctrine_adaptation:0 "Doctrine Adaptation"
 AOTA_base_doctrine_adaptation_desc:0 "Our military thought must adapt to hybrid threats, fragile supply chains, and uneven force quality."
 AOTA_base_joint_service_coordination:0 "Joint Service Coordination"
 AOTA_base_joint_service_coordination_desc:0 "Army, naval, and air elements must coordinate as one instrument rather than competing silos."

 AOTA_base_reopen_foreign_channels:0 "Reopen Foreign Channels"
 AOTA_base_reopen_foreign_channels_desc:0 "Even cautious states need diplomatic backchannels to avoid strategic isolation."
 AOTA_base_regional_security_dialogues:0 "Regional Security Dialogues"
 AOTA_base_regional_security_dialogues_desc:0 "Structured regional talks reduce miscalculation and buy time for national recovery."
 AOTA_base_nonbloc_survival_posture:0 "Non-Bloc Survival Posture"
 AOTA_base_nonbloc_survival_posture_desc:0 "Maintain maneuver space between rival blocs while preserving sovereignty and defensive flexibility."
 AOTA_base_seek_major_patronage:0 "Seek Major Patronage"
 AOTA_base_seek_major_patronage_desc:0 "Selective external sponsorship can accelerate recovery, but at the cost of strategic dependence."

 AOTA_base_civic_legitimacy_campaign:0 "Civic Legitimacy Campaign"
 AOTA_base_civic_legitimacy_campaign_desc:0 "Public legitimacy and civic participation can anchor long-term stability in uncertain times."
 AOTA_base_security_state_mandate:0 "Security State Mandate"
 AOTA_base_security_state_mandate_desc:0 "A stronger security mandate may impose order quickly, though it narrows political pluralism."

 AOTA_base_contingency_production_cells:0 "Contingency Production Cells"
 AOTA_base_contingency_production_cells_desc:0 "Dispersed emergency workshops and depots ensure wartime continuity under severe pressure."
 AOTA_base_national_resilience_act:0 "National Resilience Act"
 AOTA_base_national_resilience_act_desc:0 "Integrate civil defense, logistics, and wartime administration into a single survival statute."
 AOTA_base_limited_regional_initiatives:0 "Limited Regional Initiatives"
 AOTA_base_limited_regional_initiatives_desc:0 "Pursue bounded regional initiatives that improve leverage without overcommitting the nation."
 AOTA_base_state_survival_consensus:0 "State Survival Consensus"
 AOTA_base_state_survival_consensus_desc:0 "Forge a final cross-institutional consensus: whatever our politics, the state must endure."
