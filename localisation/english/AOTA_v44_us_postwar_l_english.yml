l_english:
 ACC_war_crimes_commission:0 "Create the National Accountability Commission"
 ACC_war_crimes_commission_desc:0 "Victory has left mass graves, scorched cities, and rival administrations. The ACC must decide who is criminal, who is redeemable, and who will be reintegrated by legal oath."
 ACC_federal_reintegration_administration:0 "Federal Reintegration Administration"
 ACC_federal_reintegration_administration_desc:0 "Rebuild statehouses, courts, and rail ministries under constitutional supervision rather than military fiat."
 ACC_emergency_relief_and_pensions:0 "Emergency Relief and Veterans' Pensions"
 ACC_emergency_relief_and_pensions_desc:0 "Without bread and pensions, the peace will collapse into militia politics."
 ACC_rewrite_the_union_compact:0 "Rewrite the Union Compact"
 ACC_rewrite_the_union_compact_desc:0 "A second constitutional moment will define whether this is restoration or refoundation."
 ACC_return_to_the_world_stage:0 "Return to the World Stage"
 ACC_return_to_the_world_stage_desc:0 "Foreign powers must be persuaded that America is governable again."

 AWU_peoples_tribunals:0 "People's Tribunals"
 AWU_peoples_tribunals_desc:0 "Factory guards, strike committees, and neighborhood communes demand justice on their own terms."
 AWU_workers_reconstruction_brigades:0 "Workers' Reconstruction Brigades"
 AWU_workers_reconstruction_brigades_desc:0 "Rail crews and steel unions will rebuild war zones as political schools of the new order."
 AWU_veterans_control_committees:0 "Veterans' Control Committees"
 AWU_veterans_control_committees_desc:0 "Armed veterans can become either the republic's social backbone or its future warlords."
 AWU_charter_of_common_labor:0 "Charter of Common Labor"
 AWU_charter_of_common_labor_desc:0 "Codify workplace democracy, communal rights, and labor obligations into a new social constitution."
 AWU_world_congress_of_the_dispossessed:0 "World Congress of the Dispossessed"
 AWU_world_congress_of_the_dispossessed_desc:0 "Invite unions and anti-colonial delegates to frame the AWU as a new revolutionary center."

 ANA_national_salvation_tribunals:0 "National Salvation Tribunals"
 ANA_national_salvation_tribunals_desc:0 "The ANA will classify enemies of order and determine who may remain in public life."
 ANA_internal_security_directorate:0 "Internal Security Directorate"
 ANA_internal_security_directorate_desc:0 "A permanent counter-subversion apparatus will police the postwar republic."
 ANA_reconstruction_under_martial_law:0 "Reconstruction Under Martial Law"
 ANA_reconstruction_under_martial_law_desc:0 "Infrastructure will be rebuilt through military districts and command decrees."
 ANA_the_permanent_command_republic:0 "The Permanent Command Republic"
 ANA_the_permanent_command_republic_desc:0 "The emergency will become constitutional principle."
 ANA_force_recognition_abroad:0 "Force Recognition Abroad"
 ANA_force_recognition_abroad_desc:0 "If diplomacy resists, strategic pressure will compel acknowledgment of ANA rule."

 APF_western_reconciliation_conference:0 "Western Reconciliation Conference"
 APF_western_reconciliation_conference_desc:0 "Governors, labor federations, and civic leagues negotiate reintegration terms for liberated regions."
 APF_federal_maritime_recovery_board:0 "Federal Maritime Recovery Board"
 APF_federal_maritime_recovery_board_desc:0 "Pacific shipping and naval logistics finance the broader reconstruction program."
 APF_regional_autonomy_guarantees:0 "Regional Autonomy Guarantees"
 APF_regional_autonomy_guarantees_desc:0 "A durable union requires formal protections for regional institutions and political cultures."
 APF_charter_of_the_two_oceans:0 "Charter of the Two Oceans"
 APF_charter_of_the_two_oceans_desc:0 "Define a continental republic anchored equally in Atlantic legality and Pacific pragmatism."
 APF_pacific_diplomatic_reentry:0 "Pacific Diplomatic Re-Entry"
 APF_pacific_diplomatic_reentry_desc:0 "Re-enter global affairs through Pacific and hemispheric institutions first."

 ACG_asset_seizure_tribunals:0 "Asset Seizure Tribunals"
 ACG_asset_seizure_tribunals_desc:0 "Defeated factions' industries will be audited, seized, and folded into chartered recovery blocs."
 ACG_chartered_reconstruction_zones:0 "Chartered Reconstruction Zones"
 ACG_chartered_reconstruction_zones_desc:0 "Postwar states are reorganized as concession territories governed by performance contracts."
 ACG_national_contract_police:0 "National Contract Police"
 ACG_national_contract_police_desc:0 "Private security is standardized into a national coercive architecture answerable to the Board."
 ACG_shareholder_constitution:0 "The Shareholder Constitution"
 ACG_shareholder_constitution_desc:0 "Property rights and investment covenants replace mass electoral legitimacy as founding doctrine."
 ACG_open_the_exchange_diplomacy:0 "Open the Exchange Diplomacy"
 ACG_open_the_exchange_diplomacy_desc:0 "Diplomacy becomes a portfolio of investment treaties, debt leverage, and strategic concessions."

 ASL_county_reconciliation_boards:0 "County Reconciliation Boards"
 ASL_county_reconciliation_boards_desc:0 "Sheriffs, pastors, and veterans arbitrate local settlement after the civil war."
 ASL_land_redistribution_courts:0 "Land Redistribution Courts"
 ASL_land_redistribution_courts_desc:0 "Settle wartime confiscations and tenant claims to prevent renewed countryside violence."
 ASL_rural_reconstruction_ministry:0 "Rural Reconstruction Ministry"
 ASL_rural_reconstruction_ministry_desc:0 "Roads, grain silos, and county credit banks become the core of southern recovery."
 ASL_confederal_covenant_of_states:0 "Confederal Covenant of States"
 ASL_confederal_covenant_of_states_desc:0 "The new America is conceived as a negotiated confederation of local polities."
 ASL_new_southern_diplomacy:0 "New Southern Diplomacy"
 ASL_new_southern_diplomacy_desc:0 "Project agrarian legitimacy abroad while avoiding subordination to old great-power blocs."

 aota_acc_reconstruction_commission:0 "National Accountability Commission"
 aota_acc_reconstruction_commission_desc:0 "A federal legal apparatus investigates atrocities and reintegration crimes from the civil war."
 aota_acc_second_union_compact:0 "Second Union Compact"
 aota_acc_second_union_compact_desc:0 "A reconstructed constitutional consensus ties civil rights, federal guarantees, and postwar legitimacy together."
 aota_awu_tribunal_politics:0 "Tribunal Politics"
 aota_awu_tribunal_politics_desc:0 "Mass tribunals energize revolutionary legitimacy but keep social tensions high."
 aota_awu_veteran_committees:0 "Veterans' Control Committees"
 aota_awu_veteran_committees_desc:0 "Veteran councils discipline local militias and stabilize the revolutionary hinterland."
 aota_awu_common_labor_charter:0 "Common Labor Charter"
 aota_awu_common_labor_charter_desc:0 "Labor law, social rights, and production quotas are fused into one governing compact."
 aota_ana_salvation_tribunals:0 "Salvation Tribunals"
 aota_ana_salvation_tribunals_desc:0 "Postwar justice is reframed as national purification under military supervision."
 aota_ana_internal_security:0 "Internal Security Directorate"
 aota_ana_internal_security_desc:0 "Domestic pacification and anti-subversion operations become permanent organs of state."
 aota_ana_permanent_command:0 "Permanent Command Doctrine"
 aota_ana_permanent_command_desc:0 "The ANA codifies emergency command as the final constitutional form of America."
 aota_apf_reconciliation_compact:0 "Western Reconciliation Compact"
 aota_apf_reconciliation_compact_desc:0 "A negotiated model of reintegration reduces coercive occupation burdens."
 aota_apf_two_ocean_charter:0 "Two-Ocean Charter"
 aota_apf_two_ocean_charter_desc:0 "Pacific maritime strategy and federal reconstruction are bound into a single state project."
 aota_acg_asset_tribunals:0 "Asset Tribunals"
 aota_acg_asset_tribunals_desc:0 "Economic winners and losers are decided in corporate courts rather than electoral assemblies."
 aota_acg_contract_police:0 "Contract Police"
 aota_acg_contract_police_desc:0 "Security is governed by charter and incentive structures, not civic accountability."
 aota_acg_shareholder_constitution:0 "Shareholder Constitution"
 aota_acg_shareholder_constitution_desc:0 "The state is reimagined as a guarantor of contract hierarchy and managed growth."
 aota_asl_county_reconciliation:0 "County Reconciliation"
 aota_asl_county_reconciliation_desc:0 "Postwar legitimacy is negotiated county by county through parishes, courts, and civic brokers."
 aota_asl_confederal_covenant:0 "Confederal Covenant"
 aota_asl_confederal_covenant_desc:0 "A decentralized American order prioritizes county sovereignty and agrarian social hierarchy."

 ACC_reintegrate_state_judiciaries:0 "Reintegrate State Judiciaries"
 ACC_oath_or_amnesty:0 "Oath or Amnesty"
 AWU_unionize_the_reconstruction_front:0 "Unionize the Reconstruction Front"
 AWU_commune_autonomy_statutes:0 "Commune Autonomy Statutes"
 ANA_garrison_the_recovered_states:0 "Garrison the Recovered States"
 ANA_purge_disloyal_officers:0 "Purge Disloyal Officers"
 APF_reopen_transcontinental_relief:0 "Reopen Transcontinental Relief"
 APF_harbor_citizenship_program:0 "Harbor Citizenship Program"
 ACG_issue_national_recovery_shares:0 "Issue National Recovery Shares"
 ACG_contractual_loyalty_oaths:0 "Contractual Loyalty Oaths"
 ASL_demobilize_county_columns:0 "Demobilize County Columns"
 ASL_parish_recovery_fairs:0 "Parish Recovery Fairs"
 AOTA_american_postwar_settlement:0 "American Postwar Settlement"
 AOTA_american_postwar_settlement_desc:0 "The war is over; what follows is a struggle over memory, institutions, and who gets to define America."

 aota.840.t:0 "The Constitutional Reckoning"
 aota.840.d:0 "The ACC opens federal inquiries into wartime atrocities and oath-breaking. Some demand expansive amnesty to speed reconciliation; others insist legality only survives if betrayal has consequences."
 aota.840.a:0 "Law must be seen to rule."
 aota.840.b:0 "Stability first, punishment second."
 aota.841.t:0 "Tribunals in the Factory Towns"
 aota.841.d:0 "Workers' tribunals begin hearing cases against strikebreakers, profiteers, and militia commanders. Their verdicts are popular in red strongholds and feared everywhere else."
 aota.841.a:0 "Let the councils judge."
 aota.841.b:0 "The revolution must stay armed."
 aota.842.t:0 "The Salvation Dockets"
 aota.842.d:0 "ANA security jurists classify political enemies for internment, exile, or supervised reintegration. The command state calls it necessity; critics call it permanent emergency."
 aota.842.a:0 "No mercy for disunion."
 aota.842.b:0 "Selective leniency, controlled by command."
 aota.843.t:0 "The Sacramento Formula"
 aota.843.d:0 "APF brokers a western settlement built on federal guarantees, regional autonomy, and maritime-led recovery. It is less triumphant than deliberate—and perhaps more durable for it."
 aota.843.a:0 "Rebuild through consent."
 aota.843.b:0 "Secure a broader governing coalition."
 aota.844.t:0 "Recovery by Contract"
 aota.844.d:0 "ACG administrators divide the reconquered states into charter zones with strict production and security benchmarks. Investors applaud efficiency; local communities fear dispossession."
 aota.844.a:0 "Performance is legitimacy."
 aota.844.b:0 "Pay for security and scale."
 aota.845.t:0 "Peace of the Counties"
 aota.845.d:0 "ASL reconciliation boards convene in county courthouses and church halls, blending pardon rituals with harsh local bargaining over land, debt, and militia demobilization."
 aota.845.a:0 "Let local society heal itself."
 aota.845.b:0 "Keep the militias close, for now."

 aota.846.t:0 "America Returns Under Constitutional Auspices"
 aota.846.d:0 "The ACC proclaims a reconstructed federal republic governed by a Second Union Compact. Foreign chancelleries cautiously welcome legal restoration, while exiles warn that reconciliation remains incomplete."
 aota.846.a:0 "A legalist America re-enters diplomacy."
 aota.847.t:0 "Workers' America Seeks International Vanguard Role"
 aota.847.d:0 "The AWU calls for a transnational congress of labor republics and anti-colonial movements. Conservative governments denounce the project as export revolution; unions worldwide celebrate it."
 aota.847.a:0 "A revolutionary America enters the world."
 aota.848.t:0 "Command America Demands Recognition"
 aota.848.d:0 "The ANA presents itself as the sole force capable of continental order, coupling diplomatic notes with military signaling. Neighbors prepare for a harder, security-first America."
 aota.848.a:0 "Recognition through strength."
 aota.849.t:0 "Pacific-Led Federal Reentry"
 aota.849.d:0 "APF diplomats frame the new American settlement around maritime commerce, regional autonomy, and negotiated federalism. Pacific states respond positively; continental rivals remain cautious."
 aota.849.a:0 "A federated maritime America emerges."
 aota.850.t:0 "The Shareholder Union"
 aota.850.d:0 "ACG's board-state enters international politics as a contract-power: trade corridors, debt instruments, and privatized security compacts lead its diplomacy."
 aota.850.a:0 "Capital has taken the flag."
 aota.851.t:0 "Confederal Agrarian America"
 aota.851.d:0 "ASL envoys present a decentralized confederal model rooted in county sovereignty, church mediation, and agrarian reconstruction. Many powers question its modern capacity; few ignore its resilience."
 aota.851.a:0 "A localist America seeks external room to breathe."

