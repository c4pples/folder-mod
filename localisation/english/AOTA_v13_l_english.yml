 aota_1300_title:0 "SUPER EVENT: The American Union Shatters"
 aota_1300_desc:0 "What began as paralysis has become catastrophe. Governors, militias, syndicates, corporate boards and revivalist leagues now claim the mantle of the Republic. The United States has ceased to be a single political fact."
 aota_1300_a:0 "The world holds its breath."
 aota_1301_title:0 "SUPER EVENT: The Rhine Crisis"
 aota_1301_desc:0 "The armistice order on the Rhine is breaking apart. Garrisons mobilise, newspapers scream for resolve, and every chancery in Europe knows that a border incident could now ignite a continental war."
 aota_1301_a:0 "Europe walks the edge."
 aota_1302_title:0 "SUPER EVENT: The Danubian Collapse"
 aota_1302_desc:0 "The old Habsburg bargain is failing. Crownlands defy Vienna, officers whisper of emergency powers, and neighboring states prepare to seize what the empire can no longer hold together."
 aota_1302_a:0 "The center cannot hold."
 aota_1303_title:0 "SUPER EVENT: The Second Russian Reunification War"
 aota_1303_desc:0 "The Russian question is once more being settled by force. Armies, commissars, communes and pretenders all claim to speak for the nation. The eastern balance will not survive unchanged."
 aota_1303_a:0 "The east awakens."
 aota_1304_title:0 "SUPER EVENT: The Ottoman Empire in Flames"
 aota_1304_desc:0 "The uneasy imperial peace in the Near East has given way to revolt, intervention and panic. Every power with a map and a fleet now sees opportunity amid the fire."
 aota_1304_a:0 "The provinces burn."
 aota_1305_title:0 "SUPER EVENT: The Peace Dies in Europe"
 aota_1305_desc:0 "The unfinished peace has finally collapsed under the weight of every grievance it failed to resolve. Europe is no longer negotiating the last war. It is entering the next one."
 aota_1305_a:0 "The reckoning begins."
 aota_1310_title:0 "Ireland at the Edge"
 aota_1310_desc:0 "Ireland stands in the shadow of larger powers, yet every faction in Dublin believes the island can still become the hinge of a new Atlantic order if it accepts enough danger."
 aota_1310_a:0 "Take the gamble."
 aota_1310_b:0 "Hold the line."
 aota_1311_title:0 "The Northern Redoubt"
 aota_1311_desc:0 "Finnish planners, officers and radicals all agree on only one point: the next war in the east will reach the forests and lakes, and survival will demand impossible discipline."
 aota_1311_a:0 "Fortify everything."
 aota_1311_b:0 "Trust in civic endurance."
 aota_1312_title:0 "Portugal and the Open Sea"
 aota_1312_desc:0 "Lisbon faces a brutal arithmetic. Portugal can stay marginal and safe, or gamble on becoming the broker of an Atlantic system larger powers are too distracted to manage."
 aota_1312_a:0 "Bet on the ports."
 aota_1312_b:0 "Bet on the fleet."
 aota_1313_title:0 "Ukraine Between Red and Black"
 aota_1313_desc:0 "In the borderlands, every ideology promises bread, rifles and freedom. What Ukraine lacks is certainty: whether liberation lies in party discipline or in the free territory."
 aota_1313_a:0 "Trust the communes."
 aota_1313_b:0 "Trust the cadres."
 aota_1320_title:0 "Britain Weighs the American Collapse"
 aota_1320_desc:0 "The Cabinet debates whether the collapse of American authority is a danger to global commerce, a chance to shape a friendly successor state, or a trap that could devour the Empire's remaining strength."
 aota_1320_a:0 "Protect the trade routes."
 aota_1320_b:0 "Prepare the fleet."
 aota_1321_title:0 "German Envoys Cross the Atlantic"
 aota_1321_desc:0 "Berlin sees opportunity in chaos. Credit, advisers and quiet promises may secure a future partner among the American fragments, provided Germany moves before London or Paris does."
 aota_1321_a:0 "Send the commercial mission."
 aota_1321_b:0 "Back only the strongest claimant."
 aota_1322_title:0 "French Eyes on the New World"
 aota_1322_desc:0 "To some in Paris, the American collapse is a warning. To others it is a revolutionary opening. French radicals now argue over whether the moment belongs to disciplined socialism or the black banner of commune federalism."
 aota_1322_a:0 "Aid the workers' front."
 aota_1322_b:0 "Aid the communes."
 aota_1323_title:0 "Europe Reacts to the Rhine"
 aota_1323_desc:0 "No one in Europe believes the Rhine is only a local matter. General staffs, bond markets and newspapers all read the same lesson: if the river frontier breaks, the peace itself may follow."
 aota_1323_a:0 "Mobilise caution."
 aota_1323_b:0 "Pray for restraint."
 aota_1324_title:0 "Shockwaves Through the Danube"
 aota_1324_desc:0 "The weakening of Vienna does not only threaten Austria-Hungary. It threatens every state built on difficult frontiers, mixed populations and disputed inheritances."
 aota_1324_a:0 "Secure our own borders."
 aota_1324_b:0 "Exploit the confusion."
