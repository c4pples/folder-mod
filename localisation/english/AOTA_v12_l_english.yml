l_english:
 aota_1000_title:0 "The Rhine Forum"
 aota_1000_desc:0 "Industrialists, officers, deputies, and newspaper editors descend on Berlin to argue over the future of the western frontier. Every speech about peace sounds like a rehearsal for the next war."
 aota_1000_a:0 "Stabilise the discussion."
 aota_1000_b:0 "Let the sabres rattle."
 aota_1001_title:0 "The Black Front in the Streets"
 aota_1001_desc:0 "In the wards and workshops of Paris, anarchist committees are testing whether they can organize bread, transport, and protection faster than the ministries can."
 aota_1001_a:0 "Give the communes room."
 aota_1001_b:0 "Reassert party discipline."
 aota_1002_title:0 "The Danube Congress"
 aota_1002_desc:0 "Representatives of the crownlands arrive full of grievances, memoranda, and old maps. Some seek a durable federation. Others seek leverage before the empire breaks."
 aota_1002_a:0 "Negotiate another compromise."
 aota_1002_b:0 "Rule by decree."
 aota_1003_title:0 "Emergency Committees in Washington"
 aota_1003_desc:0 "Governors, business associations, labor federations, and patriotic leagues are preparing for the possibility that federal authority may not survive the next constitutional crisis."
 aota_1003_a:0 "Prepare for the worst."
 aota_1003_b:0 "Court the money men."
 aota_1004_title:0 "Imperial Conference of 1936"
 aota_1004_desc:0 "The Empire remains broad, expensive, and nervous. London must choose whether to hold the line with reform, contracts, or coercion."
 aota_1004_a:0 "Standardise imperial preparedness."
 aota_1004_b:0 "Buy a little more time."
 aota_1005_title:0 "Warlords and Patriots"
 aota_1005_desc:0 "From the western borderlands to the interior rail junctions, every Russian faction insists it alone can gather the broken lands."
 aota_1005_a:0 "Build the reunification staff."
 aota_1005_b:0 "Trust the generals."
 aota_1006_title:0 "Marches in Milan"
 aota_1006_desc:0 "Industrialists, futurists, workers, and party organizers all seek to define the meaning of national strength in the streets of the north."
 aota_1006_a:0 "Back the industrial trust."
 aota_1006_b:0 "Back the marching leagues."
 aota_1010_title:0 "Belgrade After Midnight"
 aota_1010_desc:0 "Shots, declarations, and hurried broadcasts ripple through the capital. Nobody agrees what happened first. Everyone agrees the balance has changed."
 aota_1010_a:0 "The region stiffens."
 aota_1010_b:0 "Stabilise what we can."
 aota_1090_title:0 "The Great Crisis Deepens"
 aota_1090_desc:0 "Across the old capitals of Europe and the uneasy republics beyond, the argument of the armistice is becoming the argument of armies."
 aota_1090_a:0 "The peace was only an interlude."
 AOTA_GER_manage_rhine:0 "Manage the Rhine Question"
 AOTA_GER_manage_rhine_desc:0 "Use conferences, pressure, and careful theatrics to control the temperature of the western question."
 AOTA_FRA_red_black_committees:0 "Fund Red and Black Committees"
 AOTA_FRA_red_black_committees_desc:0 "Exploit the rivalry between central socialists and anti-state militants before it explodes on its own terms."
 AOTA_AUS_convene_the_crownlands:0 "Convene the Crownlands"
 AOTA_AUS_convene_the_crownlands_desc:0 "Summon the imperial periphery to Vienna and try once more to make the machine function."
 AOTA_USA_prepare_contingency_governors:0 "Prepare the Governors' Contingency Plans"
 AOTA_USA_prepare_contingency_governors_desc:0 "Quietly coordinate state authorities in case Washington loses the initiative."
 AOTA_GRE_megali_gamble:0 "The Megali Gamble"
 AOTA_GRE_megali_gamble_desc:0 "Take the reckless path and bet the state on a favorable crisis."
 AOTA_LIT_last_bastion:0 "Proclaim the Last Bastion"
 AOTA_LIT_last_bastion_desc:0 "Fortify the republic and dare every larger neighbor to test it."
 AOTA_HUN_revisionist_cells:0 "Organize Revisionist Cells"
 AOTA_HUN_revisionist_cells_desc:0 "Build networks of officers, leagues, and agitators who dream of border revision."
 GER_theodor_heuss_aota:0 "Theodor Heuss"
 GER_theodor_heuss_aota_desc:0 "A liberal constitutional voice for a Germany exhausted by soldiers' myths and armistice bitterness."
