 aota.3012.a:0 "The remnant must now become a state again."
 aota.3013.a:0 "The revolution must decide what kind of freedom it means."
 aota.3014.a:0 "Order will be restored through command."
 aota.3015.a:0 "The west will build its own republic."
 aota.3016.a:0 "Crisis can be managed, priced, and directed."
 aota.3017.a:0 "Root the cause in land, region, and memory."
 aota.3018.a:0 "Conscience must become a commonwealth."
