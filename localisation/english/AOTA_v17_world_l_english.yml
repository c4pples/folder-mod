l_english:
 aota_german_colonial_legacy:0 "German Colonial Legacy"
 aota_german_colonial_legacy_desc:0 "Berlin did not emerge from the Great War with a vast colonial empire, but it retained enough scattered outposts, treaty rights, and colonial prestige to keep overseas revisionism alive."

 aota_imperial_overstretch:0 "Imperial Overstretch"
 aota_imperial_overstretch_desc:0 "The empire survived the war, but only by taking on commitments it can barely afford to maintain. Troops, money, and confidence are stretched thin."

 aota_fraying_colonial_web:0 "Fraying Colonial Web"
 aota_fraying_colonial_web_desc:0 "The colonial empire remains formally intact, yet every province seems to demand more administrators, more soldiers, and more money than Paris can spare."

 aota_weak_congo_grip:0 "Weak Grip on the Congo"
 aota_weak_congo_grip_desc:0 "The Congo remains a source of wealth and anxiety in equal measure. Its revenues are vital, but the machinery of control is brittle."

 aota_precarious_portuguese_empire:0 "Precarious Portuguese Empire"
 aota_precarious_portuguese_empire_desc:0 "Portugal still holds its overseas possessions, but only barely. Distance, underinvestment, and diplomatic weakness haunt the empire."

 aota_ottoman_imperial_shell:0 "Imperial Shell"
 aota_ottoman_imperial_shell_desc:0 "The Ottoman Empire survived the peace, yet its Arab provinces are restless and its institutions weakened. The old shell still stands, but the cracks are widening."

 aota_raj_powder_keg:0 "The Raj as Powder Keg"
 aota_raj_powder_keg_desc:0 "The Raj still flies the imperial flag, but every strike, procession, and mutiny rumor reminds London that the subcontinent is no settled possession."

 aota_japanese_opportunism:0 "Opportunistic Expansionism"
 aota_japanese_opportunism_desc:0 "Japan sees a tired and divided imperial world. Its statesmen and officers increasingly believe that bold moves will go unanswered."

 aota_retreating_hegemon:0 "Retreating Hegemon"
 aota_retreating_hegemon_desc:0 "The United States emerged from the old war without the confidence of a decisive victor. Financial caution and political exhaustion now shape its foreign posture."

 aota_northern_watch:0 "Northern Watch"
 aota_northern_watch_desc:0 "Canada watches the continent with growing unease. Disorder in the United States could become Ottawa's defining crisis."

 aota_asian_treaty_ports:0 "Asian Treaty Port Interests"
 aota_asian_treaty_ports_desc:0 "Old concessions, commercial enclaves, and financial privileges still give outside powers leverage in East Asia, even as that system grows more fragile."

 aota_african_garrison_crisis:0 "African Garrison Crisis"
 aota_african_garrison_crisis_desc:0 "The colonies remain under the flag, but manpower shortages, funding problems, and mounting unrest are eroding imperial confidence."

 aota_canal_under_shadow:0 "The Canal Under Shadow"
 aota_canal_under_shadow_desc:0 "Egypt lives under the shadow of empires. Every troop movement, dockyard order, and political protest raises the question of who truly rules the Nile and the Canal."

 AOTA_V17_WORLD_REPORT_TITLE:0 "Global Settlement Pass"
 AOTA_V17_WORLD_REPORT_TEXT:0 "This update clarifies the wider world of the mod: Germany retains limited colonial possessions, the Ottomans hold major Arab provinces, the Raj survives in unstable form, Africa is barely contained, Japan is poised to exploit imperial fatigue, and America is more withdrawn than triumphant."
