l_english:
 AOTA_china_unification_category:0 "Chinese Unification Framework"
 AOTA_china_unification_category_desc:0 "Legitimacy, coalition bargaining, regional submissions, and staged consolidation now determine who can credibly reunify China."
 AOTA_china_initialize_legitimacy_framework:0 "Launch Legitimacy Framework"
 AOTA_china_initialize_legitimacy_framework_desc:0 "Formally define our claim to national leadership and begin tracking legitimacy as a political resource."
 AOTA_china_convene_national_congress:0 "Convene National Congress"
 AOTA_china_convene_national_congress_desc:0 "Invite regional elites, military commanders, and party blocs to test whether our claim can move beyond coercion."
 AOTA_china_negotiate_regional_submission:0 "Negotiate Regional Submission"
 AOTA_china_negotiate_regional_submission_desc:0 "Offer a rival Chinese authority terms for conditional integration and autonomy guarantees."
 AOTA_china_demand_submission_by_force:0 "Demand Submission Under Pressure"
 AOTA_china_demand_submission_by_force_desc:0 "Use military intimidation to compel holdouts into our state framework."
 AOTA_china_proclaim_national_reunification:0 "Proclaim National Reunification"
 AOTA_china_proclaim_national_reunification_desc:0 "With rivals marginalized and legitimacy consolidated, formalize a reunified Chinese state."
 AOTA_china_launch_reconstruction_compacts:0 "Launch Reconstruction Compacts"
 AOTA_china_launch_reconstruction_compacts_desc:0 "Turn military reunification into sustainable governance through provincial reconstruction and administrative integration."

 AOTA_japan_china_unification_response_category:0 "China Balance Strategy"
 AOTA_japan_china_unification_response_category_desc:0 "Japan can now respond to Chinese consolidation by backing fragmentation, recognizing clients, or preparing for a reunified rival."
 AOTA_japan_support_fragmentation_networks:0 "Support Fragmentation Networks"
 AOTA_japan_offer_recognition_to_collaborationists:0 "Recognize Collaborationist Claimants"
 AOTA_japan_prepare_for_reunified_china:0 "Prepare for a Reunified China"

 AOTA_china_claimant_regime:0 "Claimant Regime"
 AOTA_china_claimant_regime_desc:0 "We hold territory, but not a broadly accepted mandate."
 AOTA_china_provisional_authority:0 "Provisional Authority"
 AOTA_china_provisional_authority_desc:0 "Our government has become a serious national contender, but remains politically fragile."
 AOTA_china_coalition_government:0 "Recognized Coalition Government"
 AOTA_china_coalition_government_desc:0 "Regional and institutional actors now partially accept our leadership."
 AOTA_china_contested_hegemon:0 "Dominant but Contested Core State"
 AOTA_china_contested_hegemon_desc:0 "We are the strongest center in China, though serious rivals and dissidents remain."
 AOTA_china_reunified_unstable:0 "Reunified but Unstable"
 AOTA_china_reunified_unstable_desc:0 "Military reunification outpaced full political consolidation."
 AOTA_china_reconstruction_state:0 "Post-Unification Reconstruction State"
 AOTA_china_reconstruction_state_desc:0 "Administrative rebuilding and negotiated integration are now stabilizing reunification."
 AOTA_china_refragmentation_risk:0 "Refragmentation Risk"
 AOTA_china_refragmentation_risk_desc:0 "Provincial resentments and elite resistance threaten to fracture the state again."
 AOTA_japan_reunified_china_watch:0 "Reunified China Watch"
 AOTA_japan_reunified_china_watch_desc:0 "Tokyo has established a dedicated framework to monitor and counter rising unified Chinese power."

 aota_china_unification.1.t:0 "A Framework for National Legitimacy"
 aota_china_unification.1.d:0 "Our government has moved from improvised authority toward a measurable national legitimacy campaign."
 aota_china_unification.1.a:0 "The contest for China now has structure."

 aota_china_unification.20.t:0 "Congress Bargaining"
 aota_china_unification.20.d:0 "The congress produced openings, but regional blocs insist that authority must remain negotiated."
 aota_china_unification.20.a:0 "Accept a coalition formula."
 aota_china_unification.20.b:0 "Push a harder central line."

 aota_china_unification.30.t:0 "Offer of Conditional Submission"
 aota_china_unification.30.d:0 "A rival Chinese claimant has offered terms: autonomy under their mandate, or continued separation."
 aota_china_unification.30.a:0 "Submit under negotiated autonomy."
 aota_china_unification.30.b:0 "Remain aligned, but independent."

 aota_china_unification.40.t:0 "Ultimatum from a Chinese Claimant"
 aota_china_unification.40.d:0 "A rising central authority is demanding formal submission and military integration."
 aota_china_unification.40.a:0 "Yield before war escalates."
 aota_china_unification.40.b:0 "Reject the ultimatum."

 aota_china_unification.50.t:0 "National Reunification Proclaimed"
 aota_china_unification.50.d:0 "A single Chinese authority has formally claimed national reunification, but provincial integration remains unfinished."
 aota_china_unification.50.a:0 "The struggle enters a new phase."

 aota_china_unification.51.t:0 "The Cost of Victory"
 aota_china_unification.51.d:0 "Rival armies, bureaucracies, and provincial networks now test whether reunification can survive peacetime politics."
 aota_china_unification.51.a:0 "Maintain emergency rule."
 aota_china_unification.51.b:0 "Spend political capital on integration."

 aota_china_unification.60.t:0 "Provincial Reconstruction Compacts"
 aota_china_unification.60.d:0 "Provincial governments and central ministries have begun practical reconstruction bargaining."
 aota_china_unification.60.a:0 "Rebuild the republic by policy, not decree."

 aota_china_unification.200.t:0 "A Reunified China Emerges"
 aota_china_unification.200.d:0 "Chinese political consolidation has reached a dangerous new level. Japan must choose between pressure and adaptation."
 aota_china_unification.200.a:0 "Strengthen contingency planning."
 aota_china_unification.200.b:0 "Test diplomatic containment first."

 aota_china_unification.210.t:0 "Japanese Fragmentation Efforts"
 aota_china_unification.210.d:0 "Japanese support has emboldened our internal rivals and provincial holdouts."
 aota_china_unification.210.a:0 "Double down on internal discipline."

 aota_china_unification.220.t:0 "External Recognition Offer"
 aota_china_unification.220.d:0 "Japan has signaled recognition of our administrative arrangement to secure leverage in China."
 aota_china_unification.220.a:0 "Useful, for now."

 JAP_manage_chinese_claimants:0 "Manage Chinese Claimants"
 JAP_manage_chinese_claimants_desc:0 "Build a flexible policy toolkit toward fragmented Chinese governments and rising claimants alike."
 JAP_recalibrate_against_reunified_china:0 "Recalibrate Against Reunified China"
 JAP_recalibrate_against_reunified_china_desc:0 "Prepare diplomatic and military mechanisms for a scenario where China reunifies under a hostile mandate."
