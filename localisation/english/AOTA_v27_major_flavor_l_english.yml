l_english:
 AOTA_major_intro_ger:0 "The Reich Endures"
 AOTA_major_intro_ger_desc:0 "Germany survived the Great War, but survival proved no verdict. In the ministries of Berlin and the beer halls of the Rhine, the armistice is remembered as triumph, betrayal, reprieve, and theft all at once. The empire still stands, yet every faction within it now argues over what exactly was saved."
 AOTA_major_intro_fra:0 "Victory Denied"
 AOTA_major_intro_fra_desc:0 "France bled, endured, and was told to call exhaustion a peace. The republic lives with clenched teeth: the border is not settled, the debt is not paid, and the street speaks in three tongues—revenge, revolution, and spiritual renewal."
 AOTA_major_intro_eng:0 "Empire Without Confidence"
 AOTA_major_intro_eng_desc:0 "Britain preserved its fleets and held together the imperial frame, but the war settled nothing. London governs a world system that no longer trusts its own permanence. Every reform is shadowed by retrenchment; every display of authority conceals fatigue."
 AOTA_major_intro_aus:0 "The Danubian Burden"
 AOTA_major_intro_aus_desc:0 "Austria-Hungary outlived the funeral speeches written for it, but survival has only magnified the difficulty of rule. The monarchy spans languages, loyalties, and incompatible memories of the same war. Vienna must decide whether the empire can still be governed—or only postponed."
 AOTA_major_intro_sov:0 "The Shattered Giant"
 AOTA_major_intro_sov_desc:0 "Russia did not emerge from the war and revolution as a state so much as a wound with frontiers. Republican hopefuls, soldiers, monarchists, socialists, and anarchists all claim to speak for the future. What reunifies Russia may yet destroy it."
 AOTA_major_intro_tur:0 "The Imperial Shell"
 AOTA_major_intro_tur_desc:0 "The Ottoman state survived what should have ended it. Anatolia still answers to the Porte, Syria and Mesopotamia still fly imperial colors, and yet every province asks a different question about why the empire remains. Reform, coercion, faith, and compromise all promise survival—and all threaten dissolution."
 AOTA_major_intro_usa:0 "A Republic Unwinding"
 AOTA_major_intro_usa_desc:0 "The United States entered the twentieth century with immense promise and exits the Great War era with less certainty than power. Retreat abroad has sharpened conflict at home. Industrial wealth, moral fervor, populist anger, and ideological ambition all crowd the same constitutional shell."
 AOTA_major_intro_ita:0 "Peace Without Reward"
 AOTA_major_intro_ita_desc:0 "Italy came out of the war neither broken nor satisfied. It has enough victory to breed arrogance and enough disappointment to breed radicalism. Every movement in the peninsula insists that the nation was denied its proper future."

 GER_wilhelm_ii_desc:0 "The emperor remains the living symbol of German survival, but also of every unresolved question left behind by the armistice. To his admirers he is the guardian of continuity; to his critics, the crowned face of a war suspended rather than answered."
 FRA_albert_lebrun_desc:0 "A careful republican presiding over an impatient nation, Lebrun governs from the narrow ground between institutional dignity and public fury. His France is orderly on paper and combustible in practice."
 ENG_stanley_baldwin_desc:0 "Baldwin embodies the cautious statecraft of an empire that still rules widely but believes in itself less than it once did. He seeks to quiet the storm through moderation, economy, and delay—qualities that may yet prove either wise or fatal."
 AOTA_SOV_kerensky_desc:0 "Kerensky survives as the human face of an unfinished republic: eloquent, fragile, and permanently outpaced by history. He promises legality to a country increasingly tempted by force."
 AOTA_TUR_abdulmecid_desc:0 "Abdülmecid stands at the meeting point of memory and necessity. He offers dynastic legitimacy to an empire whose provinces, officers, and clerics increasingly disagree on what legitimacy even means."
 USA_franklin_roosevelt_desc:0 "Roosevelt senses that the American crisis is not merely economic but civilizational. He offers energy, improvisation, and confidence, though even he cannot be sure whether reform can still outrun fracture."
 ITA_victor_emmanuel_desc:0 "Victor Emmanuel reigns over a country that wants grandeur, stability, revenge, and transformation all at the same time. The crown still matters, but less as a settled institution than as a prize to be captured by whichever Italy wins the coming struggle."

 AOTA_GER_theodor_wolff_name:0 "Theodor Wolff"
 AOTA_GER_theodor_wolff_advisor:0 "Republican Publicist"
 AOTA_GER_theodor_wolff_advisor_desc:0 "Wolff speaks for the constitutional center of a Germany exhausted by militarized myth. His influence strengthens the language of reform, legality, and civilian government."
 AOTA_GER_franz_seldte_name:0 "Franz Seldte"
 AOTA_GER_franz_seldte_advisor:0 "Veterans' Marshal"
 AOTA_GER_franz_seldte_advisor_desc:0 "Seldte channels the resentments of armed veterans into disciplined political force. He promises order, but always in the shadow of mobilization."
 AOTA_GER_helene_stocker_name:0 "Helene Stöcker"
 AOTA_GER_helene_stocker_advisor:0 "Pacifist Reconciler"
 AOTA_GER_helene_stocker_advisor_desc:0 "Stöcker argues that a nation cannot survive by reliving the trench line forever. Her politics bind peace, reform, and moral reconstruction together."

 AOTA_FRA_edouard_daladier_name:0 "Édouard Daladier"
 AOTA_FRA_edouard_daladier_advisor:0 "Republican Manager"
 AOTA_FRA_edouard_daladier_advisor_desc:0 "Daladier offers discipline without spectacle—an administrator for a republic that knows efficiency may be all that stands between order and catastrophe."
 AOTA_FRA_jacques_doriot_name:0 "Jacques Doriot"
 AOTA_FRA_jacques_doriot_advisor:0 "Street Tribune"
 AOTA_FRA_jacques_doriot_advisor_desc:0 "Doriot speaks to those who believe parliamentary France is already dead and merely waiting for someone bold enough to admit it."
 AOTA_FRA_emmanuel_mounier_name:0 "Emmanuel Mounier"
 AOTA_FRA_emmanuel_mounier_advisor:0 "Personalist Idealist"
 AOTA_FRA_emmanuel_mounier_advisor_desc:0 "Mounier offers a France beyond both sterile parliamentarianism and mechanized collectivism, rooted instead in community, duty, and moral renewal."

 AOTA_AUS_richard_coudenhove_name:0 "Richard Coudenhove-Kalergi"
 AOTA_AUS_richard_coudenhove_advisor:0 "Federal Visionary"
 AOTA_AUS_richard_coudenhove_advisor_desc:0 "Few men believe more strongly that the empire can be transformed rather than merely defended. His federal schemes promise survival through imagination."
 AOTA_AUS_stjepan_sarkotic_name:0 "Stjepan Sarkotić"
 AOTA_AUS_stjepan_sarkotic_advisor:0 "Frontier Custodian"
 AOTA_AUS_stjepan_sarkotic_advisor_desc:0 "Sarkotić views the monarchy as a fortress of necessity. He trusts vigilance, security, and disciplined force over dreams of easy reconciliation."
 AOTA_AUS_hildegard_burjan_name:0 "Hildegard Burjan"
 AOTA_AUS_hildegard_burjan_advisor:0 "Social Catholic Reformer"
 AOTA_AUS_hildegard_burjan_advisor_desc:0 "Burjan represents the humane face of imperial reform: a politics of charity, obligation, and social peace against the temptations of fracture."

 AOTA_USA_fiorello_laguardia_name:0 "Fiorello La Guardia"
 AOTA_USA_fiorello_laguardia_advisor:0 "Urban Fusionist"
 AOTA_USA_fiorello_laguardia_advisor_desc:0 "La Guardia thrives in political chaos and municipal improvisation. He believes the republic may still be rescued by energetic reform and hard practical compromise."
 AOTA_USA_smedley_butler_name:0 "Smedley Butler"
 AOTA_USA_smedley_butler_advisor:0 "Republican Soldier"
 AOTA_USA_smedley_butler_advisor_desc:0 "Butler has seen enough of war and profiteering to distrust both. He offers military seriousness without surrendering the idea that the republic ought to answer to citizens."
 AOTA_USA_charles_coughlin_name:0 "Charles Coughlin"
 AOTA_USA_charles_coughlin_advisor:0 "Radio Firebrand"
 AOTA_USA_charles_coughlin_advisor_desc:0 "Coughlin turns grievance into mass politics through voice alone. His appeal thrives where institutions seem remote, compromised, or already collapsing."

 AOTA_ITA_carlo_rosselli_name:0 "Carlo Rosselli"
 AOTA_ITA_carlo_rosselli_advisor:0 "Liberal Socialist Polemicist"
 AOTA_ITA_carlo_rosselli_advisor_desc:0 "Rosselli speaks for an Italy that must be transformed without becoming enslaved to either reaction or dogma."
 AOTA_ITA_curzio_malaparte_name:0 "Curzio Malaparte"
 AOTA_ITA_curzio_malaparte_advisor:0 "Futurist Publicist"
 AOTA_ITA_curzio_malaparte_advisor_desc:0 "Malaparte exalts danger, irony, and national reinvention. His politics thrive where old respectabilities have already failed."
 AOTA_ITA_italo_balbo_name:0 "Italo Balbo"
 AOTA_ITA_italo_balbo_advisor:0 "Aerial Modernizer"
 AOTA_ITA_italo_balbo_advisor_desc:0 "Balbo sees the air arm as the clearest expression of national vitality—fast, modern, and contemptuous of stale doctrine."
