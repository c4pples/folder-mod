 aota.3000.a:0 "Germany must decide what survival means."
 aota.3001.a:0 "France remembers what peace refused to settle."
 aota.3002.a:0 "Britain still governs, but no longer with innocence."
 aota.3003.a:0 "The monarchy survives by bargaining with time."
 aota.3004.a:0 "Russia is still searching for its final form."
 aota.3005.a:0 "The empire lives, though not in peace."
 aota.3006.a:0 "America bends before it breaks."
 aota.3007.a:0 "Italy demands a future worthy of its grievance."
 aota.3008.a:0 "The imperial question cannot be postponed forever."
 aota.3009.a:0 "Reunification begins as a thought before it becomes a war."
 aota.3010.a:0 "Every province now hears the empire differently."
 aota.3011.a:0 "Too many Americas now compete to inherit one republic."
