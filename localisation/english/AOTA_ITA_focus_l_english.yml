l_english:
 ITA_brittle_pillar_of_rome:0 "Brittle Pillar of Rome"
 ITA_brittle_pillar_of_rome_desc:0 "Italy seeks great-power stature but its institutions, armed services, and colonial commitments pull in different directions. Stabilization must come before escalation."
 ITA_count_the_factions:0 "Count the Factions"
 ITA_count_the_factions_desc:0 "Prestige politics have multiplied internal power centers. Before any grand strategy, the regime must map where loyalty actually resides."
 ITA_service_rivalry_committee:0 "Service Rivalry Committee"
 ITA_service_rivalry_committee_desc:0 "Army, navy, and air force each claim primacy. Formalizing rivalry at least turns sabotage into planning."
 ITA_mediterranean_staff_maps:0 "Mediterranean Staff Maps"
 ITA_mediterranean_staff_maps_desc:0 "The sea is not a backdrop but a constraint system. Ports, chokepoints, and garrisons must be treated as one theater."
 ITA_budgetary_emergency_decree:0 "Budgetary Emergency Decree"
 ITA_budgetary_emergency_decree_desc:0 "Prestige spending outran state capacity. Emergency budgeting buys time for controlled rearmament."
 ITA_regime_conciliation_path:0 "Regime Conciliation Path"
 ITA_regime_conciliation_path_desc:0 "Consensus is slower than coercion, but it lowers the risk of internal fracture during external crises."
 ITA_blackshirt_primacy_path:0 "Blackshirt Primacy Path"
 ITA_blackshirt_primacy_path_desc:0 "A hardline settlement can centralize mobilization quickly, though it deepens long-term political brittleness."
 ITA_crown_arbitration_path:0 "Crown Arbitration Path"
 ITA_crown_arbitration_path_desc:0 "Royal mediation can calm rival blocs and restore hierarchy without total party capture."
 ITA_military_procurement_board:0 "Military Procurement Board"
 ITA_military_procurement_board_desc:0 "Fragmented contracting wastes scarce resources. Central oversight links procurement to strategy."
 ITA_industrial_rationalization_office:0 "Industrial Rationalization Office"
 ITA_industrial_rationalization_office_desc:0 "Italy cannot outproduce everyone; it must out-coordinate them."
 ITA_northern_industrial_triangle:0 "Northern Industrial Triangle"
 ITA_northern_industrial_triangle_desc:0 "The northern core anchors sustainable output for both civilian resilience and military supply."
 ITA_integrated_war_accounts:0 "Integrated War Accounts"
 ITA_integrated_war_accounts_desc:0 "Mobilization plans, credit lines, and production quotas are merged into a single wartime ledger."
 ITA_army_priority_program:0 "Army Priority Program"
 ITA_army_priority_program_desc:0 "The army argues that continental commitments are the decisive burden."
 ITA_navy_priority_program:0 "Navy Priority Program"
 ITA_navy_priority_program_desc:0 "The navy insists Mediterranean control is the prerequisite for every other ambition."
 ITA_air_priority_program:0 "Air Priority Program"
 ITA_air_priority_program_desc:0 "The air arm claims only modern aviation can offset structural weakness elsewhere."
 ITA_officer_merit_commissions:0 "Officer Merit Commissions"
 ITA_officer_merit_commissions_desc:0 "Patronage cannot substitute for competence forever. Command quality must be audited."
 ITA_mountain_and_motor_balance:0 "Mountain and Motor Balance"
 ITA_mountain_and_motor_balance_desc:0 "Terrain and tempo both matter. Forces must be shaped for realistic fronts, not fantasy offensives."
 ITA_army_reform_charter:0 "Army Reform Charter"
 ITA_army_reform_charter_desc:0 "Army modernization is formalized as doctrine and staffing, not merely slogans."
 ITA_port_command_unification:0 "Port Command Unification"
 ITA_port_command_unification_desc:0 "Split harbor authorities waste operational windows. Unified command improves fleet readiness."
 ITA_convoy_protection_grid:0 "Convoy Protection Grid"
 ITA_convoy_protection_grid_desc:0 "Trade and troop movement collapse without protected sea lanes."
 ITA_littoral_strike_groups:0 "Littoral Strike Groups"
 ITA_littoral_strike_groups_desc:0 "Compact strike formations are tailored for contested coasts and short-notice operations."
 ITA_air_staff_reorganization:0 "Air Staff Reorganization"
 ITA_air_staff_reorganization_desc:0 "A coherent staff structure is the foundation of any modern air force."
 ITA_coastal_air_interdiction:0 "Coastal Air Interdiction"
 ITA_coastal_air_interdiction_desc:0 "Air power is tasked to disrupt hostile movement across Mediterranean approaches."
 ITA_regia_aeronautica_modernization:0 "Regia Aeronautica Modernization"
 ITA_regia_aeronautica_modernization_desc:0 "Modern aircraft and pilot pipelines are expanded to support sustained operations."
 ITA_secure_the_central_med:0 "Secure the Central Mediterranean"
 ITA_secure_the_central_med_desc:0 "Italy must first secure the center before projecting influence to the edges."
 ITA_balanced_colonial_garrisons:0 "Balanced Colonial Garrisons"
 ITA_balanced_colonial_garrisons_desc:0 "Over-garrisoning drains the core; under-garrisoning invites collapse. Balance is survival."
 ITA_colonial_overextension_review:0 "Colonial Overextension Review"
 ITA_colonial_overextension_review_desc:0 "Imperial commitments are measured against logistics, manpower, and strategic payoff."
 ITA_mediterranean_logistics_cordons:0 "Mediterranean Logistics Cordons"
 ITA_mediterranean_logistics_cordons_desc:0 "Sustainment networks are tightened to prevent crisis cascades across distant holdings."
 ITA_marine_trade_lifelines:0 "Marine Trade Lifelines"
 ITA_marine_trade_lifelines_desc:0 "Commercial routes are treated as national security arteries."
 ITA_forward_basing_assertion:0 "Forward Basing Assertion"
 ITA_forward_basing_assertion_desc:0 "A tougher posture can deter rivals, but it risks escalating before Italy is fully ready."
 ITA_diplomacy_of_prestige:0 "Diplomacy of Prestige"
 ITA_diplomacy_of_prestige_desc:0 "Status must be negotiated as much as displayed."
 ITA_show_the_flag:0 "Show the Flag"
 ITA_show_the_flag_desc:0 "Demonstrations of force are calibrated to project resolve without automatic overcommitment."
 ITA_compromise_of_the_elites:0 "Compromise of the Elites"
 ITA_compromise_of_the_elites_desc:0 "Elite factions accept a shared framework to avoid self-sabotage in wartime."
 ITA_party_control_directives:0 "Party Control Directives"
 ITA_party_control_directives_desc:0 "Party authority is formalized as the central command principle of the state."
 ITA_royal_counterweights:0 "Royal Counterweights"
 ITA_royal_counterweights_desc:0 "The crown builds balancing institutions to prevent single-faction capture."
 ITA_state_above_factions:0 "State Above Factions"
 ITA_state_above_factions_desc:0 "Whatever settlement wins, the state must outlast factional cycles."
 ITA_mediterranean_power_without_illusion:0 "Mediterranean Power Without Illusion"
 ITA_mediterranean_power_without_illusion_desc:0 "Italy can be consequential without pretending to be omnipotent: disciplined strategy over reckless myth."
 ITA_conciliation_governance_01:0 "Conciliation Governance 01"
