l_english:
 aota.206.t:0 "The Seven Banners"
 aota.206.d:0 "The American collapse has crossed from civil conflict into national disintegration. Governors, companies, militias, churches and unions now claim whole regions as their own. The old Union still lives on paper, but in practice the continent marches under seven banners."
 aota.206.a:0 "History breaks in public."
 aota.300.t:0 "The Rhine Crisis Deepens"
 aota.300.d:0 "A fresh diplomatic confrontation along the Rhine has shaken the fragile armistice order. Europe once more speaks in the language of guarantees, mobilisations and wounded pride."
 aota.300.a:0 "A bad omen."
 aota.301.t:0 "Danubia Trembles"
 aota.301.d:0 "The Habsburg world has not fallen, but it has begun to sway. National agitation, court intrigue and military alarm are once again threatening the cohesion of the Danube."
 aota.301.a:0 "The old empire still lives."
 aota.312.t:0 "A Crisis on the Rhine"
 aota.312.d:0 "French patrols, German speeches and nervous British mediation have turned a routine border incident into a continental test of will. In Berlin, hard men whisper that the armistice only delayed justice."
 aota.312.a:0 "Stand firm."
 aota.312.b:0 "Buy time."
 aota.311.t:0 "The Danubian Knot"
 aota.311.d:0 "Every compromise in Vienna now seems temporary. Budapest bargains, Prague watches, the South Slavs mutter, and the officer corps warns that a multinational empire cannot survive hesitation forever."
 aota.311.a:0 "Tighten the imperial fist."
 aota.311.b:0 "Placate the crownlands."
 aota.321.t:0 "The Last Commonwealth"
 aota.321.d:0 "Polish radicals and officers have embraced a near-impossible ambition: to stand between all empires and somehow outlive them. It is a gamble fit for a nation that remembers being partitioned and refuses to stay small."
 aota.321.a:0 "A magnificent madness."
 aota.331.t:0 "The Burgundian Gamble"
 aota.331.d:0 "Belgium has abandoned the safety of brokerage and embraced a grand design of its own. Merchants, officers and patriots alike now speak openly of a Low Countries state able to dominate the rivers and ports between Paris and Berlin."
 aota.331.a:0 "A lion with sharp teeth."
 aota.340.t:0 "The Black March"
 aota.340.d:0 "In Belgrade, hard men whisper that compromise has only humiliated the South Slavs. Secret circles now call for a brutal march up the Danube and across the mountains, whatever the human price."
 aota.340.a:0 "The Balkans arm again."
 aota.350.t:0 "The Iberian Cauldron"
 aota.350.d:0 "Spain has not chosen peace between left, right and regional loyalties. It has chosen all of them at once. The result is a country of militias, manifestos and knives sharpened in back rooms."
 aota.350.a:0 "A furnace for ideologies."
 POL_the_last_commonwealth:0 "The Last Commonwealth"
 POL_the_last_commonwealth_desc:0 "A nearly impossible path: a Poland that rejects protectorates, suppresses defeatism and builds a desperate commonwealth from the borderlands."
 POL_the_intermarium_staff:0 "The Intermarium Staff"
 POL_the_intermarium_staff_desc:0 "Build the officer corps for a war that everyone says cannot be won."
 POL_crusade_of_the_borderlands:0 "Crusade of the Borderlands"
 POL_crusade_of_the_borderlands_desc:0 "Turn the frontier into a sacred military mission."
 POL_a_mad_victory:0 "A Mad Victory"
 POL_a_mad_victory_desc:0 "Those who survive this path will command a state remade by impossible discipline."
 BEL_the_flemish_walloon_compromise:0 "The Flemish-Walloon Compromise"
 BEL_the_flemish_walloon_compromise_desc:0 "Buy breathing room through internal settlement."
 BEL_arm_the_ports:0 "Arm the Ports"
 BEL_arm_the_ports_desc:0 "Fortify Belgium's wealth and vulnerability at once."
 BEL_the_burgundian_gamble:0 "The Burgundian Gamble"
 BEL_the_burgundian_gamble_desc:0 "An insanely difficult path: Belgium ceases to be a buffer and instead tries to become a state of rivers, ports and steel between the blocs."
 BEL_reclaim_the_corridors:0 "Reclaim the Corridors"
 BEL_reclaim_the_corridors_desc:0 "Claim the transport arteries that make the Low Countries matter."
 BEL_merchant_empire_on_the_scheldt:0 "Merchant Empire on the Scheldt"
 BEL_merchant_empire_on_the_scheldt_desc:0 "Transform strategic commerce into state power."
 BEL_lion_of_the_lowlands:0 "Lion of the Lowlands"
 BEL_lion_of_the_lowlands_desc:0 "A Belgium that survives this gamble will no longer be ignored."
 YUG_the_secret_officers:0 "The Secret Officers"
 YUG_the_secret_officers_desc:0 "The officers are done pretending the old wounds are closed."
 YUG_black_march:0 "The Black March"
 YUG_black_march_desc:0 "An extremely difficult route: secret networks, irregular warfare and a ferocious gamble for South Slav supremacy."
 YUG_forge_the_chetnik_state:0 "Forge the Chetnik State"
 YUG_forge_the_chetnik_state_desc:0 "Bind the countryside, militias and veterans into a single war machine."
 YUG_storm_the_danube:0 "Storm the Danube"
 YUG_storm_the_danube_desc:0 "Go north before the empire does."
 YUG_a_bloody_rebirth:0 "A Bloody Rebirth"
 YUG_a_bloody_rebirth_desc:0 "If it survives, this path turns Yugoslavia into a terrifying regional power."
 SPR_the_red_hinterland:0 "The Red Hinterland"
 SPR_the_red_hinterland_desc:0 "The villages and workshops are again full of clandestine pamphlets and rifles."
 SPR_the_ibero_cauldron:0 "The Iberian Cauldron"
 SPR_the_ibero_cauldron_desc:0 "An insanely difficult path that embraces instability in exchange for a massive eventual payoff."
 SPR_raise_the_militias:0 "Raise the Militias"
 SPR_raise_the_militias_desc:0 "Only armed movements can master the furnace now."
 SPR_iberian_redemption:0 "Iberian Redemption"
 SPR_iberian_redemption_desc:0 "Forge a stronger state from chaos, or vanish inside it."
 USA_deadlocked_convention:0 "Deadlocked Convention"
 USA_deadlocked_convention_desc:0 "No bloc can command legitimacy, and every one of them claims the republic."
 USA_the_army_questions_washington:0 "The Army Questions Washington"
 USA_the_army_questions_washington_desc:0 "Once the officer corps begins to doubt civilian authority, the center cannot hold for long."
 USA_the_seven_banners:0 "The Seven Banners"
 USA_the_seven_banners_desc:0 "The catastrophic route: a total federal breakdown into seven armed Americas."
 aota_polish_intermarium_dream:0 "Intermarium Dream"
 aota_polish_intermarium_dream_desc:0 "The state survives on urgency, sacrifice and strategic imagination."
 aota_belgian_burgundian_gamble:0 "Burgundian Gamble"
 aota_belgian_burgundian_gamble_desc:0 "Belgium has traded safety for ambition."
 aota_serbian_black_march:0 "Black March"
 aota_serbian_black_march_desc:0 "A hard state forged by conspiracy, veterans and mountain warfare."
 aota_spanish_cauldron:0 "Spanish Cauldron"
 aota_spanish_cauldron_desc:0 "Instability has become a source of military and political energy."
 aota_minor_messianic_path:0 "Messianic Path"
 aota_minor_messianic_path_desc:0 "This country has embraced an absurdly dangerous national mission."
 aota_rhine_powder_keg:0 "Rhine Powder Keg"
 aota_rhine_powder_keg_desc:0 "The frontier has become a psychological battlefield."
 aota_danubian_overstretch:0 "Danubian Overstretch"
 aota_danubian_overstretch_desc:0 "The empire holds together by exhausting itself."
 aota_american_shatterstate:0 "Shatterstate America"
 aota_american_shatterstate_desc:0 "Even collapse can be mobilised."
 aota_threat_interwar_crusade:0 "Borderland Crusade"
