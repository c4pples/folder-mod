l_english:
 aota_ire_civic_republic_networks:0 "Civic Republican Networks"
 aota_ire_civic_republic_networks_desc:0 "County councils, veterans' associations, and cooperative credit societies form the Irish Republic's informal state. Their local legitimacy keeps Dublin afloat when formal institutions stall."
 aota_fin_white_guard_compact:0 "White Guard Compact"
 aota_fin_white_guard_compact_desc:0 "Finland's reserve system is not merely military planning; it is a social contract between officers, municipalities, and civil society built on readiness and suspicion."
 aota_ukr_frontier_atamanates:0 "Frontier Atamanates"
 aota_ukr_frontier_atamanates_desc:0 "Regional commanders and partisan circles hold real influence across the Ukrainian countryside, giving the republic grit in war but fragility in politics."
 aota_alg_colonial_dual_state:0 "Colonial Dual State"
 aota_alg_colonial_dual_state_desc:0 "French Algeria operates as two political orders layered over one territory: a metropolitan republic for settlers and a securitized exception for most of the colonized population."
 aota_cog_concessionary_regime:0 "Concessionary Regime"
 aota_cog_concessionary_regime_desc:0 "In the Congo, chartered firms and river syndicates often wield more practical power than civil administrators. Extraction is efficient; governance is not."

 AOTA_IRE_sean_lemass_name:0 "Seán Lemass"
 AOTA_IRE_sean_lemass_advisor:0 "Industrial Republican Modernizer"
 AOTA_IRE_sean_lemass_advisor_desc:0 "Lemass argues that sovereignty without factories is only poetry. He pushes tariffs, technical schools, and disciplined state credit to build a modern Irish economy."
 AOTA_IRE_frank_aiken_name:0 "Frank Aiken"
 AOTA_IRE_frank_aiken_advisor:0 "Border Security Organizer"
 AOTA_IRE_frank_aiken_advisor_desc:0 "Aiken treats border defence as political theatre as much as military duty, binding local volunteers to the republic's strategic posture."
 AOTA_IRE_hanna_sheehy_name:0 "Hanna Sheehy Skeffington"
 AOTA_IRE_hanna_sheehy_advisor:0 "Republican Civil Rights Tribune"
 AOTA_IRE_hanna_sheehy_advisor_desc:0 "She insists the republic's legitimacy rests on more than independence alone, pressing ministers toward civic rights, social reform, and democratic accountability."

 AOTA_FIN_juho_paasikivi_name:0 "Juho Kusti Paasikivi"
 AOTA_FIN_juho_paasikivi_advisor:0 "Pragmatic Eastern Negotiator"
 AOTA_FIN_juho_paasikivi_advisor_desc:0 "Paasikivi views diplomacy as strategic delay: every month bought at the conference table is another month to fortify Finland's northern frontier."
 AOTA_FIN_valo_nihtila_name:0 "Valo Nihtilä"
 AOTA_FIN_valo_nihtila_advisor:0 "Logistics of the Snowfront"
 AOTA_FIN_valo_nihtila_advisor_desc:0 "Nihtilä's doctrine is simple—who controls roads, depots, and winter transport controls the campaign."
 AOTA_FIN_vaino_tanner_name:0 "Väinö Tanner"
 AOTA_FIN_vaino_tanner_advisor:0 "Labor-Republic Broker"
 AOTA_FIN_vaino_tanner_advisor_desc:0 "Tanner keeps the social democrats and the conservative republic in tense cooperation, trading cabinet influence for social stability."

 AOTA_UKR_volodymyr_vynnychenko_name:0 "Volodymyr Vynnychenko"
 AOTA_UKR_volodymyr_vynnychenko_advisor:0 "Council Socialist Agitator"
 AOTA_UKR_volodymyr_vynnychenko_advisor_desc:0 "Vynnychenko seeks a disciplined workers' republic that can survive encirclement without surrendering Ukrainian political autonomy."
 AOTA_UKR_omelianovych_pavlenko_name:0 "Mykhailo Omelianovych-Pavlenko"
 AOTA_UKR_omelianovych_pavlenko_advisor:0 "Frontier Staff Commander"
 AOTA_UKR_omelianovych_pavlenko_advisor_desc:0 "A veteran of retreat and improvisation, Pavlenko believes mobile staffs and local initiative can outlast better-equipped enemies."
 AOTA_UKR_nina_strokata_name:0 "Nina Strokata"
 AOTA_UKR_nina_strokata_advisor:0 "Black Banner Organizer"
 AOTA_UKR_nina_strokata_advisor_desc:0 "Strokata links peasant communes, urban radicals, and underground print networks into a loose anarchist political machine."

 AOTA_ALG_marcel_regnier_name:0 "Marcel Régnier"
 AOTA_ALG_marcel_regnier_advisor:0 "Colonial Administrative Bloc"
 AOTA_ALG_marcel_regnier_advisor_desc:0 "Régnier represents the officeholders who believe Algeria can be held through meticulous bureaucracy, selective patronage, and relentless policing."
 AOTA_ALG_messali_hadj_name:0 "Messali Hadj"
 AOTA_ALG_messali_hadj_advisor:0 "National Workers' Tribune"
 AOTA_ALG_messali_hadj_advisor_desc:0 "Hadj gives urban workers and migrant networks a political vocabulary that links anti-colonialism with social revolution."
 AOTA_ALG_hocine_ait_name:0 "Hocine Aït Ahmed"
 AOTA_ALG_hocine_ait_advisor:0 "Cadre Militia Instructor"
 AOTA_ALG_hocine_ait_advisor_desc:0 "Aït Ahmed develops decentralized militia doctrine suited to mountain warfare and clandestine logistics."

 AOTA_COG_albert_nyssens_name:0 "Albert Nyssens"
 AOTA_COG_albert_nyssens_advisor:0 "Concessionary Syndicate Liaison"
 AOTA_COG_albert_nyssens_advisor_desc:0 "Nyssens mediates between officials and chartered companies, turning private extraction networks into semi-official instruments of state policy."
 AOTA_COG_simon_kimbangu_name:0 "Simon Kimbangu"
 AOTA_COG_simon_kimbangu_advisor:0 "Congregational Mobilizer"
 AOTA_COG_simon_kimbangu_advisor_desc:0 "Kimbangu's religious movement has become a social force capable of organizing relief, labor discipline, and passive resistance beyond the colonial state's reach."
 AOTA_COG_leon_bobozo_name:0 "Léon Bobozo"
 AOTA_COG_leon_bobozo_advisor:0 "Force Publique Stabilizer"
 AOTA_COG_leon_bobozo_advisor_desc:0 "Bobozo's authority rests on hard drill and personal patronage within the Force Publique, making him indispensable whenever the interior flares."

 aota_1314_title:0 "Algeria's Double Sovereignty"
 aota_1314_desc:0 "In Algiers, administrators speak the language of republican legality while security officers govern by decree. Settler councils demand privilege; reformists demand inclusion; workers demand a future. The colony is held together by contradiction."
 aota_1314_a:0 "Fortify the administration."
 aota_1314_b:0 "Co-opt the urban notables."
 aota_1315_title:0 "The Congo Company State"
 aota_1315_desc:0 "River ports, mining concessions, and missionary compounds have become parallel capitals. The governor can issue decrees, but in the interior, authority is negotiated daily between officers, company agents, and local intermediaries."
 aota_1315_a:0 "Back the concessionary boards."
 aota_1315_b:0 "Recentralize through the Force Publique."

 aota_serbian_client_administration:0 "Danubian Client Administration"
 aota_serbian_client_administration_desc:0 "Belgrade governs under Vienna's shadow. Serbia retains a crown, an army, and a bureaucracy, but fiscal leverage, rail dependencies, and diplomatic vetoes keep it within the Danubian imperial system. The central political question is no longer whether Serbia survives, but whether it can reclaim full sovereignty."
