 aota_unfinished_peace:0 "The Unfinished Peace"
 aota_unfinished_peace_desc:0 "The Great War ended not in triumph, but in mutual exhaustion. No power accepts the settlement as permanent."
 aota_veteran_disillusionment:0 "Veteran Disillusionment"
 aota_veteran_disillusionment_desc:0 "A generation came home from the trenches convinced that the old order is morally bankrupt."
 aota_danubian_compromise:0 "Danubian Compromise"
 aota_danubian_compromise_desc:0 "The Habsburg lands still stand, but every nationality expects a new bargain."
 aota_british_exhaustion:0 "Imperial Exhaustion"
 aota_british_exhaustion_desc:0 "Britain preserved its empire but spent treasure, confidence and social peace to do it."
 aota_italian_mutilated_pride:0 "Mutilated Pride"
 aota_italian_mutilated_pride_desc:0 "Italy emerged from the war resentful, divided and hungry for vindication."
 aota_russian_fragility:0 "Russian Fragility"
 aota_russian_fragility_desc:0 "Russia survived revolution and collapse, but its institutions remain brittle."
 aota_french_revanchism:0 "Revanchist Current"
 aota_french_revanchism_desc:0 "Many in France see the armistice as a robbery that must one day be reversed."
 aota_german_ascendancy:0 "German Ascendancy"
 aota_german_ascendancy_desc:0 "Berlin remains the strongest capital on the continent, though its victory tastes unfinished."
 aota_christian_anarchist_movement:0 "Christian Anarchist Movement"
 aota_christian_anarchist_movement_desc:0 "Radicals preach that state violence and industrial greed are fundamentally un-Christian."
 aota_pagan_revival:0 "Pagan Revival"
 aota_pagan_revival_desc:0 "Mythic and volkisch circles promise rebirth through blood, memory and sacred landscape."
 aota_american_collapse:0 "American Collapse"
 aota_american_collapse_desc:0 "The federal center is weak, regional elites are armed, and millions now treat politics as a last test of force."
 aota_polish_borderland_state:0 "Borderland State"
 aota_polish_borderland_state_desc:0 "Poland survives between larger neighbors and every border is still an argument."
 aota_balkan_powderkeg:0 "Balkan Powderkeg"
 aota_balkan_powderkeg_desc:0 "The southern frontier of Europe remains a corridor of grudges, dynasties, and unfinished wars."
 aota_spanish_neutral_brittleness:0 "Hollow Neutrality"
 aota_spanish_neutral_brittleness_desc:0 "Spain avoided the Great War, but not the bitterness and polarization it left behind."
 aota.1.t:0 "A World Without Victory"
 aota.1.d:0 "The war ended in a draw and left every cabinet arguing over what was saved and what was betrayed. Across Europe and the Atlantic world, radicals, monarchists, reformers and revanchists prepare for a second struggle of ideas."
 aota.1.a:0 "The peace is only an intermission."
 aota.10.t:0 "The Rhine Guarantees"
 aota.10.d:0 "Berlin debates whether the armistice guarantees along the Rhine can be tightened into a permanent settlement or leveraged into a new strategic advantage."
 aota.10.a:0 "Press our advantage."
 aota.10.b:0 "Caution suits an empire."
 aota.11.t:0 "Test the Rhine"
 aota.11.d:0 "French ministers argue over whether diplomatic pressure can reopen the territorial question without triggering another continental war."
 aota.11.a:0 "Press the issue."
 aota.11.b:0 "Rearm first."
 aota.12.t:0 "The Danubian Question"
 aota.12.d:0 "Vienna must decide whether the empire survives through reform, coercion, or some uneasy mixture of both."
 aota.12.a:0 "Promise reform."
 aota.12.b:0 "Order before liberty."
 aota.13.t:0 "The Alpine Question"
 aota.13.d:0 "Italian nationalists insist that the armistice left the Alpine frontier unfinished and humiliating."
 aota.13.a:0 "Our claims remain alive."
 aota.13.b:0 "We have other priorities."
 aota.20.t:0 "The Strike Chapels"
 aota.20.d:0 "In France, parish halls and labor clubs alike are sheltering radicals who preach that the old parliamentary class has lost both God and the nation."
 aota.20.a:0 "The center is weakening."
 aota.30.t:0 "Mediterranean Commitments"
 aota.30.d:0 "The Admiralty and the Foreign Office agree on one thing: if Britain retreats too far from the Mediterranean, the whole armistice order may begin to unravel."
 aota.30.a:0 "We must remain engaged."
 aota.40.t:0 "National Salvation Committees"
 aota.40.d:0 "Russian officers and provincial notables are building emergency committees in the name of reunification, discipline, and the end of political drift."
 aota.40.a:0 "The center will harden."
 aota.100.b:0 "The Silver Legions march."
 aota.100.c:0 "The market warlords seize the interior."
 aota.101.t:0 "The Federal Cause"
 aota.101.d:0 "Washington claims to remain the lawful republic, but legality alone will not hold a continent together. Every arsenal, governor, and rail line now matters."
 aota.101.a:0 "Hold the Union together."
 aota.111.t:0 "The Balkan Frontier"
 aota.111.d:0 "Belgrade and Vienna continue to read the same frontier in different ways. Peace holds, but only in the way thin ice holds."
 aota.111.a:0 "For now, no one fires."
