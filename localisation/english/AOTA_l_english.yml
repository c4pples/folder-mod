 aota_anarcho_capitalist_networks:0 "Anarcho-Capitalist Networks"
 aota_anarcho_capitalist_networks_desc:0 "A loose alliance of financiers, anti-statists and market radicals argues that monopolistic states caused both the war and the depression."
 aota_american_powder_keg:0 "American Powder Keg"
 aota_american_powder_keg_desc:0 "The United States has wealth, industry and pride, but its politics are fragmenting faster than Washington can manage."
 aota_minor_exposed_frontier:0 "Exposed Frontier"
 aota_minor_exposed_frontier_desc:0 "This state lies between larger powers and must prepare for sudden diplomatic or military shocks."
 aota_armed_neutrality:0 "Armed Neutrality"
 aota_armed_neutrality_desc:0 "Neutrality is only credible when the frontier can bite."
 aota_danubian_claimant:0 "Danubian Claimant"
 aota_danubian_claimant_desc:0 "The postwar order left many questions unresolved, and this government intends to exploit them."
 aota_continental_broker:0 "Continental Broker"
 aota_continental_broker_desc:0 "By balancing the rival capitals of Europe, this government seeks leverage out of instability."
 aota.100.t:0 "The American Powder Keg"
 aota.100.d:0 "Factories hum, markets tremble, and the old constitutional language now competes with militia sermons, market prophets and class agitators. America remains rich, but no longer calm."
 aota.100.a:0 "The republic is under strain."
 aota.110.t:0 "Street Movements Harden"
 aota.110.d:0 "The collapse of trust in Congress has pushed Americans toward movements that promise either radical local autonomy or total class mobilisation."
 aota.110.a:0 "The market radicals grow louder."
 aota.110.b:0 "The workers answer in kind."
 aota.120.t:0 "The Union Fractures"
 aota.120.d:0 "The constitutional crisis has burst into open war. Governors mobilise against Washington, militias seize armories, and railroad junctions become front lines overnight. America enters its second great civil war."
 aota.120.a:0 "Then let the continent decide its future."
 aota.121.t:0 "A Continent at War"
 aota.121.d:0 "No foreign observer can tell where the lines will finally settle. Industrial belts, farm states and market cities each claim to speak for the nation. The world watches in dread as America tears itself apart."
 aota.121.a:0 "The old union is gone."
 aota.130.t:0 "The Peace That Solved Nothing"
 aota.130.d:0 "Seventeen years after the Great War ended in negotiated exhaustion, no cabinet in Europe truly accepts the armistice order. Every capital is rearming, every ideology sharpening its knives."
 aota.130.a:0 "The next crisis will not stay local."
 USA_a_house_divided:0 "A House Divided"
 USA_a_house_divided_desc:0 "The old republic still stands, but no one agrees on what it exists to defend."
 USA_manage_the_depression:0 "Manage the Depression"
 USA_manage_the_depression_desc:0 "If Washington cannot calm the economy, demagogues of every stripe will do it instead."
 USA_marches_in_the_streets:0 "Marches in the Streets"
 USA_marches_in_the_streets_desc:0 "Politics now speaks in columns and uniforms."
 USA_hold_the_constitution:0 "Hold the Constitution"
 USA_hold_the_constitution_desc:0 "The center must prove it still governs."
 USA_empower_state_guards:0 "Empower State Guards"
 USA_empower_state_guards_desc:0 "The regular army cannot be everywhere at once."
 USA_the_american_market:0 "The American Market"
 USA_the_american_market_desc:0 "Market radicals promise prosperity without Washington's dead hand."
 USA_union_of_counties:0 "Union of Counties"
 USA_union_of_counties_desc:0 "Localist radicals preach community, faith and armed self-rule."
 USA_the_union_fractures:0 "The Union Fractures"
 USA_the_union_fractures_desc:0 "At some point, rhetoric becomes artillery."
 USA_rebuild_federal_authority:0 "Rebuild Federal Authority"
 USA_rebuild_federal_authority_desc:0 "If the center is to survive, it must return stronger than before."
 USA_arsenal_of_the_second_peace:0 "Arsenal of the Second Peace"
 USA_arsenal_of_the_second_peace_desc:0 "The continent will be reunited through industry and iron."
 USA_new_constitutional_congress:0 "A New Constitutional Congress"
 USA_new_constitutional_congress_desc:0 "Victory must end in a settlement strong enough to avoid another fracture."
 USA_market_commonwealth:0 "Market Commonwealth"
 USA_market_commonwealth_desc:0 "The postwar republic can be remade around contract, commerce and local power."
 BEL_between_the_blocks:0 "Between the Blocks"
 BEL_between_the_blocks_desc:0 "Belgium sits between unfinished empires and unfinished revenges."
 BEL_armed_neutrality:0 "Armed Neutrality"
 BEL_armed_neutrality_desc:0 "Only a prepared frontier can keep Belgium sovereign."
 BEL_trade_the_corridors:0 "Trade the Corridors"
 BEL_trade_the_corridors_desc:0 "Ports and railways are Belgium's greatest leverage."
 BEL_fortify_the_meuse:0 "Fortify the Meuse"
 BEL_fortify_the_meuse_desc:0 "Any new war in the west will cross the same old rivers."
 BEL_balance_berlin_and_paris:0 "Balance Berlin and Paris"
 BEL_balance_berlin_and_paris_desc:0 "Belgium survives by ensuring neither rival can dominate it without cost."
 POL_between_empires:0 "Between Empires"
 POL_between_empires_desc:0 "Poland has returned to the map, but not to safety."
 POL_strengthen_the_sejm:0 "Strengthen the Sejm"
 POL_strengthen_the_sejm_desc:0 "A stronger parliament may prevent another coup."
 POL_national_mobilisation:0 "National Mobilisation"
 POL_national_mobilisation_desc:0 "Every frontier question demands men under arms."
 POL_borderland_militias:0 "Borderland Militias"
 POL_borderland_militias_desc:0 "Where state power is thin, local rifles must make the difference."
 POL_seek_guarantees:0 "Seek Guarantees"
 POL_seek_guarantees_desc:0 "If Poland cannot dominate its neighbors, it must bind them."
 SER_the_balkan_wound:0 "The Balkan Wound"
 SER_the_balkan_wound_desc:0 "The war began in the Balkans and ended without resolving them."
 SER_rebuild_the_army:0 "Rebuild the Army"
 SER_rebuild_the_army_desc:0 "Serbia's army remains the core of its state."
 SER_seek_the_little_entente:0 "Seek the Little Entente"
 SER_seek_the_little_entente_desc:0 "If the great powers will not settle the region, the minors must."
 SER_claim_the_south_slavs:0 "Claim the South Slavs"
 SER_claim_the_south_slavs_desc:0 "Belgrade can either dream of union or suffer permanent encirclement."
 SER_guard_the_morava:0 "Guard the Morava"
 SER_guard_the_morava_desc:0 "A defensible valley is worth a dozen speeches."
 GER_parliamentary_settlement:0 "Parliamentary Settlement"
 GER_parliamentary_settlement_desc:0 "The empire can survive, but only by sharing authority."
 FRA_committee_of_public_safety:0 "Committee of Public Safety"
 FRA_committee_of_public_safety_desc:0 "If the republic cannot secure justice, the streets will appoint sterner guardians."
 AUS_federal_compromise:0 "Federal Compromise"
 AUS_federal_compromise_desc:0 "The Habsburg monarchy may yet survive by becoming something looser and fairer."
 AUS_dual_monarchy_holds:0 "The Dual Monarchy Holds"
 AUS_dual_monarchy_holds_desc:0 "The old compromise may be flawed, but Vienna still prefers it to dismemberment."
 AUS_danubian_missions:0 "Danubian Missions"
 AUS_danubian_missions_desc:0 "Influence, officers and subsidies can preserve the crownlands better than speeches."
 AUS_crush_separatists:0 "Crush the Separatists"
 AUS_crush_separatists_desc:0 "A weak empire invites dissolution."
 AUS_crownland_diets:0 "Crownland Diets"
 AUS_crownland_diets_desc:0 "Representation may buy another decade of peace."
 AUS_the_danubian_question:0 "The Danubian Question"
 AUS_the_danubian_question_desc:0 "Europe's chancelleries wait to see whether Vienna reforms or implodes."
 SOV_republican_restoration:0 "Republican Restoration"
 SOV_republican_restoration_desc:0 "The provisional order must become a real republic or collapse into another adventure."
 SOV_army_and_zemstvo_union:0 "Army and Zemstvo Union"
 SOV_army_and_zemstvo_union_desc:0 "The state can be held together by officers, provincial elites and emergency rule."
 SOV_peasant_free_territories:0 "Peasant Free Territories"
 SOV_peasant_free_territories_desc:0 "Rural Russia remains fertile ground for localist and anti-state movements."
 SOV_red_reconstruction:0 "Red Reconstruction"
 SOV_red_reconstruction_desc:0 "Only revolutionary discipline, argue the socialists, can reunify the ruins."
 SOV_reclaim_the_borderlands:0 "Reclaim the Borderlands"
 SOV_reclaim_the_borderlands_desc:0 "The center cannot remain secure while the old frontier lies open."
 SOV_russian_reunification:0 "Russian Reunification"
 SOV_russian_reunification_desc:0 "No Russian regime can claim legitimacy if it accepts permanent fragmentation."
 ITA_royal_catholic_union:0 "Royal Catholic Union"
 ITA_royal_catholic_union_desc:0 "Crown and altar can still be the backbone of the state."
 ITA_futurist_leagues:0 "Futurist Leagues"
 ITA_futurist_leagues_desc:0 "Italy's angriest modernists demand speed, steel and a politics worthy of the age."
 ITA_syndicalist_cells:0 "Syndicalist Cells"
 ITA_syndicalist_cells_desc:0 "Factory politics sharpen into revolutionary organisation."
 ITA_the_alpine_question:0 "The Alpine Question"
 ITA_the_alpine_question_desc:0 "South Tyrol remains an open wound in Italian politics."
 ITA_corporate_rearmament:0 "Corporate Rearmament"
 ITA_corporate_rearmament_desc:0 "Industry and nationalism can fuse into a new war machine."
 ITA_municipal_republics:0 "Municipal Republics"
 ITA_municipal_republics_desc:0 "Italy may escape deadlock by devolving power downward."
 USA_let_the_republic_break:0 "Let the Republic Break"
 USA_let_the_republic_break_desc:0 "Every faction now believes it can survive alone. A final rupture will shatter the continent into rival American successor states."
 aota.200.t:0 "The Union Breaks"
 aota.200.d:0 "Washington no longer commands obedience. Militias, party machines, industrial syndicates and regional governors are moving openly. The question is no longer whether the Union will break, but how completely."
 aota.200.a:0 "America enters the storm."
 aota.201.t:0 "The Seven Banners of America"
 aota.201.d:0 "The crisis has gone beyond a conventional civil war. The republic has shattered into a maze of competing authorities: constitutional loyalists, syndicalists, nationalists, Pacific federalists, corporate magnates, agrarian leagues, and Christian communalists all claim the mantle of America."
 aota.201.a:0 "There is no Union anymore."
 aota.202.t:0 "The Four-Way American Civil War"
 aota.202.d:0 "The country splits along four armed lines: the federal government, a workers' revolt in the industrial belt, a nationalist insurrection in the South and Plains, and a Pacific breakaway on the coast. The old constitution survives only as a memory."
 aota.202.a:0 "The Second American Collapse begins."
 aota.205.t:0 "No Going Back"
 aota.205.d:0 "Moderation is dead. Financiers, revivalists, radicals and county leagues all prepare for the final dismemberment of the republic."
 aota.205.a:0 "Then let the map be rewritten."
 aota.230.t:0 "America Descends into Civil War"
 aota.230.d:0 "The United States has disintegrated into open war. What began as deadlock and street violence has become the greatest political collapse of the interwar world."
 aota.230.a:0 "A continent in flames."
