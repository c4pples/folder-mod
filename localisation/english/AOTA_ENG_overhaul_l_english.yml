 ENG_neville_chamberlain_desc:0 "A cautious manager of imperial decline who still believes Britain can arbitrate Europe."
 aota_eng_1000_desc:0 "The guild movement cannot avoid the deeper argument: should Britain be rebuilt by councils or by communes?"
 aota_eng_1001_desc:0 "Parish mutualists, Christian radicals, and dockside anarchists gather to decide whether Britain needs defence or purity."
 aota_eng_1002_desc:0 "Britain attempts to preserve the peace once more by turning panic into conference."
 aota_britain_imperial_management_desc:0 "Britain governs through conference, paper, and reserve formations as much as through decrees."
 ENG_hold_commonwealth_conference_desc:0 "Bring ministers and dominion representatives together before the imperial fabric frays further."
 ENG_issue_white_paper_desc:0 "Define government policy before rumor and faction do it for us."
 ENG_raise_territorials_desc:0 "Expand local formations to reassure the public and deter adventurism."
 aota_commonwealth_reform_program_desc:0 "A program of managed devolution and imperial consultation seeks to preserve Britain through flexibility."
 aota_imperial_restoration_mandate_desc:0 "Britain must harden the imperial frame if it is to survive another decade."
 aota_guild_settlement_desc:0 "Britain experiments with a hybrid order of unions, guilds, and public authority."
 aota_atlantic_shareholders_desc:0 "The state increasingly defers to directors, creditors, and imperial contract networks."
 aota_english_communalism_desc:0 "Parish life, mutual aid, and local federation become the language of national recovery."
 aota_boardroom_realm:0 "The Boardroom Realm"
 aota_boardroom_realm_desc:0 "Britain steadies itself through a hard alliance of finance, shipping, and disciplined commercial power."
 aota_atlantic_market_league:0 "Atlantic Market League"
 aota_atlantic_market_league_desc:0 "A new trading order binds Britain to a network of market-facing Atlantic partners and imperial entrepots."

