 aota_china.320.t:0 "Canton Claims a Federal Mandate"
 aota_china.320.d:0 "Guangxi notables and officer blocs endorse a federal project rooted in southern commerce and negotiated provincial authority."
 aota_china.320.a:0 "Liangguang will speak for itself."
 aota_china.321.t:0 "Kunming Declares Salvation Governance"
 aota_china.321.d:0 "Yunnan command circles frame their rule as disciplined emergency stewardship for the southwest and beyond."
 aota_china.321.a:0 "Hold the passes and the roads."
 aota_china.322.t:0 "Taiyuan Announces Northern Discipline"
 aota_china.322.d:0 "Shanxi claims that rail order, arsenals, and strict administration are the only viable basis for reunification."
 aota_china.322.a:0 "Industry and order first."
 aota_china.323.t:0 "The Ma Commands Take a Wider Mandate"
 aota_china.323.d:0 "The northwest commanderies now coordinate under a common pacification doctrine meant to project power past their traditional frontier."
 aota_china.323.a:0 "Secure every corridor."
 aota_china.324.t:0 "Urumqi Brokers the Western Compact"
 aota_china.324.d:0 "Xinjiang administrators codify a reunification formula based on corridor control, treaty discipline, and provincial safeguards."
 aota_china.324.a:0 "Govern through the routes."
 aota_china.325.t:0 "Banner Authorities Centralize Command"
 aota_china.325.d:0 "Mengkukuo reorganizes banner and civil institutions into a single autonomous command architecture."
 aota_china.325.a:0 "Stabilize the steppe."
 aota_china.326.t:0 "Northeast Reorganization Proclaimed"
 aota_china.326.d:0 "Manchukuo planners and security officials unveil a new authority that seeks to convert dependency into structured regional power."
 aota_china.326.a:0 "Administer first, proclaim later."

 AOTA_china_japan_ladder_category:0 "China-Japan Strategic Ladder"
 AOTA_china_japan_ladder_category_desc:0 "The struggle in East Asia unfolds through pressure, accommodation, insurgency, and sudden escalations rather than a single binary war switch."
 AOTA_china_form_emergency_defense_council:0 "Form Emergency Defense Council"
 AOTA_china_form_emergency_defense_council_desc:0 "Unify military commands, provincial administrations, and party organs into a shared anti-Japanese emergency framework."
 AOTA_china_authorize_local_accommodation:0 "Authorize Local Accommodation"
 AOTA_china_authorize_local_accommodation_desc:0 "Permit controlled local deals with Japanese agents to buy time for rearmament and internal consolidation."
 AOTA_china_purge_collaboration_brokers:0 "Purge Collaboration Brokers"
 AOTA_china_purge_collaboration_brokers_desc:0 "Break comprador networks and local security brokers whose influence now threatens national legitimacy."
 AOTA_japan_issue_incremental_demands:0 "Issue Incremental Demands"
 AOTA_japan_issue_incremental_demands_desc:0 "Escalate pressure in measured stages, testing Chinese resolve before full-scale intervention."
 AOTA_japan_offer_compartmentalized_settlements:0 "Offer Compartmentalized Settlements"
 AOTA_japan_offer_compartmentalized_settlements_desc:0 "Split Chinese actors with selective concessions, trade guarantees, and local non-aggression arrangements."
 AOTA_japan_sponsor_regional_security_committees:0 "Sponsor Regional Security Committees"
 AOTA_japan_sponsor_regional_security_committees_desc:0 "Build influence through local police liaison boards, rail-security councils, and elite intermediary networks."

 AOTA_china_japan_emergency_council:0 "Emergency Defense Council"
 AOTA_china_japan_emergency_council_desc:0 "Crisis rule has centralized emergency mobilization and given anti-Japanese forces a common command frame."
 AOTA_china_local_accommodation:0 "Local Accommodation Network"
 AOTA_china_local_accommodation_desc:0 "Provincial administrators maintain tactical understandings with Japanese intermediaries while attempting to preserve sovereignty."
 AOTA_china_collaboration_backlash:0 "Collaboration Backlash"
 AOTA_china_collaboration_backlash_desc:0 "Public outrage over accommodation has energized resistance but destabilized internal governance."
 AOTA_japan_china_pressure_apparatus:0 "China Pressure Apparatus"
 AOTA_japan_china_pressure_apparatus_desc:0 "Tokyo has activated an integrated pressure system of agents, commercial coercion, and regional clients."

 aota_china.401.t:0 "Tokyo Demands Security Guarantees"
 aota_china.401.d:0 "Japanese envoys demand transit guarantees, rail access, and 'temporary' security concessions around treaty-port corridors. Our response will define whether this crisis hardens into war, freezes into uneasy bargaining, or splinters into local accommodations."
 aota_china.401.a:0 "Reject the demands and mobilize."
 aota_china.401.b:0 "Delay with procedural negotiations."
 aota_china.401.c:0 "Allow temporary local arrangements."

 aota_china.402.t:0 "Japan Tests the Revolutionary Frontier"
 aota_china.402.d:0 "Tokyo has moved from rhetoric to structured pressure: intelligence probes, emissary missions, and veiled threats of intervention against our frontier bases and rail chokepoints."
 aota_china.402.a:0 "Turn this into a national resistance campaign."
 aota_china.402.b:0 "Stall while we fortify and reorganize."
 aota_china.402.c:0 "Accept tactical detente in selected zones."

 aota_china.403.t:0 "Regional Command Under External Pressure"
 aota_china.403.d:0 "Japanese intermediaries are courting local officers and merchant syndicates. Provincial leadership must choose between hard resistance and temporary accommodation to survive the next phase."
 aota_china.403.a:0 "Stand firm and prepare to resist."
 aota_china.403.b:0 "Buy time with limited contacts."

 aota_china.411.t:0 "Japanese Settlement Proposal"
 aota_china.411.d:0 "Tokyo proposes segmented agreements: non-interference in selected zones in exchange for transport guarantees and anti-radical policing commitments."
 aota_china.411.a:0 "Accept exploratory talks."
 aota_china.411.b:0 "These talks are a trap."

 aota_china.412.t:0 "Offer of Compartmentalized Detente"
 aota_china.412.d:0 "Japanese diplomats offer transactional trade and local ceasefire channels designed to isolate the revolutionary command from potential partners."
 aota_china.412.a:0 "Use talks to gain breathing space."
 aota_china.412.b:0 "Denounce this and prepare the masses."

 aota_china.420.t:0 "Backlash Against Accommodation"
 aota_china.420.d:0 "Student unions, militia veterans, and labor organizers denounce the local accommodation line as collaboration. Street actions and sabotage campaigns are spreading beyond state control."
 aota_china.420.a:0 "Redirect backlash into organized resistance."
 aota_china.420.b:0 "Contain unrest and keep the deals alive."

 aota_china.430.t:0 "Review of the China Policy"
 aota_china.430.d:0 "Our ministries disagree on pace: army hardliners want sharpened demands, commercial blocs prefer segmented settlements, and intelligence bureaus seek deeper client-state penetration."
 aota_china.430.a:0 "Escalate the pressure ladder."
