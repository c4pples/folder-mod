 aota_china.112.d:0 "The balance of power in China shifts again as regional authorities, military factions, and foreign interests test the limits of legitimacy. The choice made now will echo through the next phase of the crisis."
 aota_china.112.a:0 "We will proceed."
 aota_china.112.b:0 "Take the alternative line."
 aota_china.113.t:0 "Commercial Envoys Return"
 aota_china.113.d:0 "The balance of power in China shifts again as regional authorities, military factions, and foreign interests test the limits of legitimacy. The choice made now will echo through the next phase of the crisis."
 aota_china.113.a:0 "We will proceed."
 aota_china.113.b:0 "Take the alternative line."
 aota_china.200.t:0 "A New China Settlement Emerges"
 aota_china.200.d:0 "The balance of power in China shifts again as regional authorities, military factions, and foreign interests test the limits of legitimacy. The choice made now will echo through the next phase of the crisis."
 aota_china.200.a:0 "We will proceed."
 aota_china.201.t:0 "The Fate of the Revolution"
 aota_china.201.d:0 "The balance of power in China shifts again as regional authorities, military factions, and foreign interests test the limits of legitimacy. The choice made now will echo through the next phase of the crisis."
 aota_china.201.a:0 "We will proceed."

 AOTA_warlord_foundations_of_rule:0 "Foundations of Regional Rule"
 AOTA_warlord_foundations_of_rule_desc:0 "Before proclamations of national destiny, every provincial regime must secure the loyalties that keep its offices open: paymasters, officers, magistrates, and transport guilds."
 AOTA_warlord_provincial_council_sessions:0 "Provincial Council Sessions"
 AOTA_warlord_provincial_council_sessions_desc:0 "Merchants, gentry, militia patrons, and county commissioners are summoned to formalize the bargains that hold the province together."
 AOTA_warlord_army_patronage_networks:0 "Army Patronage Networks"
 AOTA_warlord_army_patronage_networks_desc:0 "Our command rests on relationships as much as doctrine. Promotion boards, quartermaster contracts, and local sponsors must be brought into one chain."
 AOTA_warlord_revenue_and_grain_bureau:0 "Revenue and Grain Bureau"
 AOTA_warlord_revenue_and_grain_bureau_desc:0 "Without grain accounting and tax collection discipline, a warlord state is only a camp with a flag."
 AOTA_warlord_regional_identity_doctrine:0 "Doctrine of Regional Legitimacy"
 AOTA_warlord_regional_identity_doctrine_desc:0 "Our regime must speak in a voice rooted in local institutions and memory, not borrowed slogans from distant capitals."
 AOTA_warlord_militia_screening_drives:0 "Militia Screening Drives"
 AOTA_warlord_militia_screening_drives_desc:0 "Village levies and county guards are reviewed, registered, and integrated into a layered defensive order."
 AOTA_warlord_local_officer_academies:0 "Local Officer Academies"
 AOTA_warlord_local_officer_academies_desc:0 "Provincial military schools will train commanders loyal to this administration rather than to wandering cliques."
 AOTA_warlord_arsenal_patronage_contracts:0 "Arsenal Patronage Contracts"
 AOTA_warlord_arsenal_patronage_contracts_desc:0 "Workshops and arsenals receive guaranteed contracts tied to performance and patron accountability."
 AOTA_warlord_transport_syndicate_concessions:0 "Transport Syndicate Concessions"
 AOTA_warlord_transport_syndicate_concessions_desc:0 "Railway brokers, river companies, and truck cooperatives are folded into state-supervised logistics syndicates."
 AOTA_warlord_frontier_security_bureaus:0 "Frontier Security Bureaus"
 AOTA_warlord_frontier_security_bureaus_desc:0 "Smuggling routes, bandit corridors, and border agents are monitored through new regional security offices."
 AOTA_warlord_local_survival_compact:0 "Local Survival Compact"
 AOTA_warlord_local_survival_compact_desc:0 "Our first duty is to keep the province intact. We will prioritize autonomy, food security, and civic order over grand adventures."
 AOTA_warlord_regional_unification_conference:0 "Regional Unification Conference"
 AOTA_warlord_regional_unification_conference_desc:0 "Neighboring commands are invited to a conference that frames unification as negotiated hierarchy rather than immediate annexation."
 AOTA_warlord_foreign_accommodation_channel:0 "Foreign Accommodation Channel"
 AOTA_warlord_foreign_accommodation_channel_desc:0 "External pressure cannot be ignored. We will pursue a controlled accommodation that preserves room for local governance."
 AOTA_warlord_negotiated_autonomy_statute:0 "Negotiated Autonomy Statute"
 AOTA_warlord_negotiated_autonomy_statute_desc:0 "Our administrators draft a constitutional formula for coexistence with any larger Chinese authority."
 AOTA_warlord_county_reconstruction_commissions:0 "County Reconstruction Commissions"
 AOTA_warlord_county_reconstruction_commissions_desc:0 "County-level commissions direct irrigation repair, depots, and post-conflict reconstruction projects."
 AOTA_warlord_declare_regional_mandate:0 "Declare a Regional Mandate"
 AOTA_warlord_declare_regional_mandate_desc:0 "We publicly claim the right to lead a wider reordering, turning provincial power into a national political project."
 AOTA_warlord_integrate_neighboring_commands:0 "Integrate Neighboring Commands"
 AOTA_warlord_integrate_neighboring_commands_desc:0 "Rival battalions and local armies are absorbed through rank guarantees and selective purges."
 AOTA_warlord_protect_concession_economy:0 "Protect the Concession Economy"
 AOTA_warlord_protect_concession_economy_desc:0 "Commercial enclaves and foreign-linked firms are managed as instruments of recovery rather than symbols of surrender."
 AOTA_warlord_bargained_security_protocols:0 "Bargained Security Protocols"
 AOTA_warlord_bargained_security_protocols_desc:0 "Security arrangements with external actors are formalized with strict local oversight and expiration clauses."
 AOTA_warlord_emergency_anti_bandit_zones:0 "Emergency Anti-Bandit Zones"
 AOTA_warlord_emergency_anti_bandit_zones_desc:0 "Emergency jurisdictions allow rapid anti-bandit operations and anti-smuggling patrols across weak counties."
 AOTA_warlord_political_guard_formations:0 "Political Guard Formations"
 AOTA_warlord_political_guard_formations_desc:0 "Dedicated guard units are established to protect arsenals, rail depots, and strategic administration nodes."
 AOTA_warlord_regulated_collaboration_framework:0 "Regulated Collaboration Framework"
 AOTA_warlord_regulated_collaboration_framework_desc:0 "Any collaboration with foreign power is subordinated to provincial law, tax rights, and command sovereignty."
 AOTA_warlord_china_without_submission:0 "China Without Submission"
 AOTA_warlord_china_without_submission_desc:0 "Whether autonomous, federal, unifying, or accommodationist, our regime insists that China will not be reduced to a passive object of outside design."

 AOTA_GXC_southern_federal_machine:0 "Southern Federal Machine"
 AOTA_GXC_southern_federal_machine_desc:0 "Guangxi's command relies on provincial bargaining, military professionalism, and southern commercial pragmatism."
 AOTA_YUN_mountain_arsenal_compacts:0 "Mountain Arsenal Compacts"
 AOTA_YUN_mountain_arsenal_compacts_desc:0 "Yunnan's authority rests on mountain logistics, local arsenals, and tightly negotiated military patronage."
 AOTA_SHX_railway_garrison_state:0 "Railway Garrison State"
 AOTA_SHX_railway_garrison_state_desc:0 "Shanxi combines industrial corridors with disciplined garrison governance and strategic rail control."
 AOTA_XSM_frontier_commanderies:0 "Frontier Commanderies"
 AOTA_XSM_frontier_commanderies_desc:0 "The Ma regime governs through mobile commanderies balancing cavalry warfare, frontier order, and local pacts."
 AOTA_SIK_governorate_of_corridors:0 "Governorate of Corridors"
 AOTA_SIK_governorate_of_corridors_desc:0 "Xinjiang's rulers survive by controlling mountain corridors, caravan taxation, and carefully brokered external ties."
 AOTA_MEN_steppe_banner_administration:0 "Steppe Banner Administration"
 AOTA_MEN_steppe_banner_administration_desc:0 "Mengkukuo's institutions combine banner hierarchy, frontier policing, and negotiated dependence."
 AOTA_MAN_concessionary_statecraft:0 "Concessionary Statecraft"
 AOTA_MAN_concessionary_statecraft_desc:0 "Manchukuo's technocratic facade conceals a constant balancing act between external patrons and local command interests."
 AOTA_warlord_local_survival_compact_idea:0 "Local Survival Compact"
 AOTA_warlord_local_survival_compact_idea_desc:0 "The regime commits to survival through food security, county alliances, and controlled mobilization."
 AOTA_warlord_brokered_accommodation:0 "Brokered Accommodation"
 AOTA_warlord_brokered_accommodation_desc:0 "Foreign accommodation is pursued as managed pragmatism rather than surrender of local sovereignty."

 AOTA_china_warlord_statecraft_category:0 "Regional Statecraft"
 AOTA_china_warlord_statecraft_category_desc:0 "Provincial regimes manage councils, patronage, logistics crises, and unification bargaining while balancing foreign pressure and local legitimacy."
 AOTA_warlord_host_provincial_assembly:0 "Host a Provincial Assembly"
 AOTA_warlord_host_provincial_assembly_desc:0 "Convene county delegates, officer patrons, and commercial syndicates to negotiate emergency governance terms."
 AOTA_warlord_conduct_patronage_reshuffle:0 "Conduct a Patronage Reshuffle"
 AOTA_warlord_conduct_patronage_reshuffle_desc:0 "Rotate sensitive command posts before rival cliques can harden their own networks."
 AOTA_warlord_grain_transport_emergency:0 "Declare Grain Transport Emergency"
 AOTA_warlord_grain_transport_emergency_desc:0 "Temporary powers redirect cart, rail, and river traffic to stabilize urban provisioning."
 AOTA_warlord_border_incident_commission:0 "Border Incident Commission"
 AOTA_warlord_border_incident_commission_desc:0 "Deploy mixed military-civil teams to document incidents and prevent escalation along regional frontiers."
 AOTA_warlord_unification_backchannel:0 "Open a Unification Backchannel"
 AOTA_warlord_unification_backchannel_desc:0 "Initiate secret talks with larger Chinese claimants while preserving the appearance of strategic autonomy."

 aota_china.300.t:0 "A Province Defines Its Mandate"
 aota_china.300.d:0 "Regional officers and civilian brokers now agree on one principle: this regime is not temporary improvisation but a political order with its own institutions, obligations, and future."
 aota_china.300.a:0 "Then we govern as a state, not a camp."
 aota_china.301.t:0 "Conference of Commands"
 aota_china.301.d:0 "Delegates from neighboring commands arrive with maps, grievances, and private demands. Even rivals now recognize that the regional question can no longer be resolved by raids alone."
 aota_china.301.a:0 "Open the hall and lock the doors."
 aota_china.302.t:0 "Accommodation Under Watch"
 aota_china.302.d:0 "Foreign envoys propose credits, advisors, and security clauses. Our ministers insist every concession be written in terms that preserve provincial command authority."
 aota_china.302.a:0 "Pragmatism without surrender."
 aota_china.303.t:0 "China Without Submission"
 aota_china.303.d:0 "From mountain corridors to river ports, our administration now speaks with a harder confidence: local regimes can endure, negotiate, and shape reunification without dissolving themselves."
 aota_china.303.a:0 "We have survived long enough to matter."
 aota_china.310.t:0 "Provincial Assembly in Session"
 aota_china.310.d:0 "County magistrates, officers, and merchants debate budgets, militia quotas, and grain policy. The assembly can either legitimize emergency rule or expose factional fractures."
 aota_china.310.a:0 "Secure consensus at all costs."
 aota_china.310.b:0 "Force the agenda through."
 aota_china.311.t:0 "Patronage Struggle in the Garrisons"
 aota_china.311.d:0 "Competing patrons push for command appointments in key brigades. A careful reshuffle may restore discipline, but wounded factions will remember."
 aota_china.311.a:0 "Prioritize military cohesion."
 aota_china.311.b:0 "Buy off the offended networks."
 aota_china.312.t:0 "Backchannel to the National Claimants"
 aota_china.312.d:0 "Messengers return from discreet talks with national claimants. Terms for autonomy, military integration, and future constitutional status are now on the table."
 aota_china.312.a:0 "Keep negotiations alive."
 aota_china.312.b:0 "Leverage talks for mobilization."

