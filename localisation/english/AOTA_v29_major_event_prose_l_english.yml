l_english:
 aota_1000_title:0 "The Rhine Forum"
 aota_1000_desc:0 "Berlin's statesmen present the frontier question as a matter for conferences, guarantees, and legal phrasing. Yet everyone in the room understands that the Rhine is not being discussed because Europe is calm, but because it is not. The unfinished peace survives only so long as each power believes words still purchase time."
 aota_1000_a:0 "Let the diplomats speak."
 aota_1000_b:0 "Prepare for sterner arguments."

 aota_1001_title:0 "Paris Between Red and Black"
 aota_1001_desc:0 "The streets of Paris do not move in one rhythm. Syndicalists demand discipline and direction; anarchists answer that every disciplined revolution becomes a new prison. The strike has therefore become more than a labor crisis—it is a referendum on what kind of future France imagines when it says the old order must die."
 aota_1001_a:0 "Trust the communes."
 aota_1001_b:0 "Strengthen the organized left."

 aota_1002_title:0 "The Danube Congress"
 aota_1002_desc:0 "Vienna has called the notables, ministers, and petitioners of the monarchy together in the hope that procedure may accomplish what force no longer can. Every delegation speaks in the name of stability; every delegation means a different arrangement of burdens, languages, and loyalties."
 aota_1002_a:0 "Compromise is still possible."
 aota_1002_b:0 "Unity must be imposed."

 aota_1003_title:0 "American Deadlock"
 aota_1003_desc:0 "Washington can still legislate, appoint, and proclaim, yet every action now occurs under the shadow of a republic that no longer trusts its own continuity. Business interests, labor federations, moral crusaders, regional machines, and would-be saviors all read the same paralysis as proof that only their enemies still believe in constitutional delay."
 aota_1003_a:0 "Draft contingency plans."
 aota_1003_b:0 "Let private initiative fill the vacuum."

 aota_1004_title:0 "The Imperial Conference Reopens"
 aota_1004_desc:0 "Britain summons the imperial system to conference because consultation is cheaper than panic and more dignified than confession. The dominions arrive with requests, warnings, and quiet calculations of how much longer London can ask for loyalty as though it were still effortless."
 aota_1004_a:0 "Reinforce imperial preparedness."
 aota_1004_b:0 "Reassure and delay."

 aota_1005_title:0 "The Warlords of the Russian Future"
 aota_1005_desc:0 "Every report from the Russian interior tells the same story with different flags. Generals, committees, peasant leagues, clerics, and exiles all recruit in the name of reunification, while each imagines a different Russia standing at the end of the march."
 aota_1005_a:0 "Organize the staff for reunification."
 aota_1005_b:0 "Drive the country harder."

 aota_1006_title:0 "Marches in Milan"
 aota_1006_desc:0 "The industrial north speaks in processions, uniforms, and manifestos. Some march for speed, steel, and national renewal; others for order against chaos; others simply because postwar Italy has made spectatorship feel like surrender."
 aota_1006_a:0 "Bind industry closer to the state."
 aota_1006_b:0 "Turn momentum into power."

 aota_1010_title:0 "Belgrade in the Balance"
 aota_1010_desc:0 "The South Slav question has not been answered, only deferred under pressure and resentment. Now Belgrade seethes with officers, parliamentarians, and conspirators who all claim to speak for national honor and all suspect that delay will only strengthen their rivals."
 aota_1010_a:0 "The crisis sharpens."
 aota_1010_b:0 "Hold the center together."

 aota_1090_title:0 "The General Crisis"
 aota_1090_desc:0 "Across Europe and beyond it, the old peace ceases to function even as its treaties remain in force. Cabinets still meet, currencies still circulate, and trains still depart on schedule—but beneath these continuities the political imagination of the age has changed. The world has begun to move faster than the order built to contain it."
 aota_1090_a:0 "The age turns."

 aota_1300_title:0 "The American Union Shatters"
 aota_1300_desc:0 "The United States has ceased to be a single political fact. What once appeared to be polarization has now become geography, sovereignty, and war. Every faction claims continuity with the republic and every faction now marches under a different understanding of what America was meant to be."
 aota_1300_a:0 "The continent trembles."

 aota_1301_title:0 "The Rhine Crisis"
 aota_1301_desc:0 "The frontier question returns because it never truly left. Conferences, guarantees, and demilitarized formulas have all begun to give way before suspicion, mobilization, and national memory. What now unfolds on the Rhine is not merely a border dispute, but a struggle over whether the postwar peace was ever real."
 aota_1301_a:0 "Europe watches the river."

 aota_1302_title:0 "The Danubian Collapse"
 aota_1302_desc:0 "Austria-Hungary survived the war by outliving predictions of its death. It may yet perish by outliving its own ability to govern. As the monarchy's internal bargains fail, every crownland, neighbor, and opportunist senses that the center has become negotiable."
 aota_1302_a:0 "The Danube is no longer calm."

 aota_1303_title:0 "Russia Reunifies by Fire"
 aota_1303_desc:0 "The Russian question has entered a new phase. What was once fragmentation, improvisation, and local coercion now hardens into a single bid for restored scale. Europe must now decide whether reunification means stabilization—or merely the return of a giant grievance to history."
 aota_1303_a:0 "The giant stands again."

 aota_1304_title:0 "The Ottoman Empire in Flames"
 aota_1304_desc:0 "The Porte still governs on paper, but paper no longer silences provinces. Revolt, intrigue, religious tension, and foreign interference now mingle in the Levant and Mesopotamia. The Ottoman state survives, but survival has become indistinguishable from permanent crisis."
 aota_1304_a:0 "The provinces burn."

 aota_1305_title:0 "The Peace Dies in Europe"
 aota_1305_desc:0 "It is now impossible to pretend that the armistice order remains merely strained. Across chancelleries, barracks, and factories the central illusion has broken: that exhaustion could substitute for settlement. Europe again becomes a continent in search of decision."
 aota_1305_a:0 "The second reckoning begins."

 aota_1310_title:0 "Ireland's Dangerous Opportunity"
 aota_1310_desc:0 "For a small nation at the edge of an exhausted empire, instability elsewhere can look like providence. Ireland's political class now faces the old dilemma in a new age: whether to gamble on audacity, prudence, or some dangerous combination of both."
 aota_1310_a:0 "Chance favors the bold."
 aota_1310_b:0 "Better to endure than overreach."

 aota_1311_title:0 "Finland Hardens"
 aota_1311_desc:0 "Every frontier state teaches itself a morality of weather and warning. Finland reads the new era as one in which weakness invites history to return in uniform. Its politics become sterner accordingly."
 aota_1311_a:0 "Stand like stone."
 aota_1311_b:0 "Preserve internal calm."

 aota_1312_title:0 "Portugal at the Edge"
 aota_1312_desc:0 "Portugal is old enough to remember greatness and poor enough to measure every ambition twice. Yet an age of imperial fatigue and commercial rearrangement may allow lesser powers to act above their apparent weight—if they dare the cost."
 aota_1312_a:0 "Make the Atlantic our argument."
 aota_1312_b:0 "Husband strength carefully."

 aota_1313_title:0 "Ukraine and the Open Steppe"
 aota_1313_desc:0 "Ukraine remains suspended between the ambitions of larger neighbors and the internal argument over what kind of polity its land can sustain. Every route forward promises sovereignty; every route also invites predation."
 aota_1313_a:0 "Claim destiny while there is time."
 aota_1313_b:0 "Stability before grandeur."

 aota_1320_title:0 "Foreign Offices Consider America"
 aota_1320_desc:0 "The collapse of American political unity has become a matter for every foreign ministry with ships, creditors, or ideology to spare. Recognition, caution, opportunism, and fear now contend behind closed doors."
 aota_1320_a:0 "Observe and prepare."
 aota_1320_b:0 "Move while the field is open."

 aota_1321_title:0 "Cabinets Debate the Rhine"
 aota_1321_desc:0 "The Rhine crisis has forced every neighboring government to decide what it really values: legality, advantage, deterrence, or time. No one now believes the question is local."
 aota_1321_a:0 "Defend the balance."
 aota_1321_b:0 "Exploit the uncertainty."

 aota_1322_title:0 "The Danube and the Opportunists"
 aota_1322_desc:0 "As Habsburg authority falters, nearby states begin to read the Danubian basin not as a partner but as a field of inheritance. The problem, as always, is that too many heirs arrive at once."
 aota_1322_a:0 "Intervene cautiously."
 aota_1322_b:0 "Let the monarchy bleed first."

 aota_1323_title:0 "The Russian Question Returns"
 aota_1323_desc:0 "For years Europe treated Russian disunity as background noise. Reunification ends that indulgence. Every government now wonders whether it preferred a broken neighbor only because it had forgotten what an ambitious Russia looks like."
 aota_1323_a:0 "Contain the resurgence."
 aota_1323_b:0 "Seek terms before it is too late."

 aota_1324_title:0 "The East Reopens"
 aota_1324_desc:0 "Crisis in the Ottoman sphere has revived old habits of intervention, strategic dreaming, and moral pretext. The powers again speak of routes, guarantees, minorities, and obligations—the classic vocabulary of great-power appetite."
 aota_1324_a:0 "We have interests to protect."
 aota_1324_b:0 "Do not be drawn in too quickly."

 aota.2100.t:0 "The Provincial Question"
 aota.2100.d:0 "The Porte can no longer rely on habit alone to hold together provinces that endured war, shortage, and disillusionment. Governors ask for latitude, local notables ask for guarantees, and Arab elites ask whether continued loyalty will ever be answered by more than ceremony."
 aota.2100.a:0 "Negotiate with the provinces."
 aota.2100.b:0 "Tighten imperial discipline."

 aota.2101.t:0 "Arab Unrest Spreads"
 aota.2101.d:0 "What begins as petition and complaint now takes on the posture of movement. In coffeehouses, barracks, and administrative offices alike, the imperial center is discussed less as a destiny than as a question."
 aota.2101.a:0 "Endure the agitation."
 aota.2101.b:0 "Spend influence to calm it."

 aota.2102.t:0 "A Constitutional Settlement"
 aota.2102.d:0 "There are men in the empire who believe the Ottoman state can still survive by becoming legible to its own subjects: more parliament, more law, less arbitrary command. Their opponents call this weakness; their supporters call it the last serious alternative to decay."
 aota.2102.a:0 "Bind the empire through law."
 aota.2102.b:0 "Reform will provoke resistance."

 aota.2103.t:0 "The Military Porte"
 aota.2103.d:0 "The officer corps does not mistake consultation for strength. If the empire is to survive, it argues, ministries must answer to discipline, provinces to garrisons, and politics to command."
 aota.2103.a:0 "Let the army govern."

 aota.2104.t:0 "The Sacred Imperium"
 aota.2104.d:0 "Some in the capital now insist that the Ottoman state will not be saved by imitation, but by renewed civilizational certainty. They seek to fuse imperial survival with sacred legitimacy and make obedience a moral duty once again."
 aota.2104.a:0 "Consecrate authority."

 aota.2105.t:0 "The Arab Federal Compromise"
 aota.2105.d:0 "The empire may no longer be governable as a single vertical command. A looser federation promises to trade absolute authority for continued allegiance, preserving the Ottoman frame by admitting its provinces are no longer the same country in spirit."
 aota.2105.a:0 "A federation may preserve what command cannot."

 aota.2106.t:0 "Red Crescent, Black Banner"
 aota.2106.d:0 "Where the imperial state weakens, radical alternatives multiply. Some call for councils, planning, and workers' authority; others for communes, federations, and the destruction of command itself. The crisis of empire is becoming an argument over what replaces it."
 aota.2106.a:0 "Let the black standard rise."
 aota.2106.b:0 "Build the councils."

 aota.2107.t:0 "Imperial Industry and Imperial Need"
 aota.2107.d:0 "Every program of reconstruction begins with the same complaint: the empire is too large to administer cheaply and too poor to administer well. Industry must therefore become political—a matter of rails, arsenals, debt, and provincial confidence."
 aota.2107.a:0 "Rebuild what we can."

 aota.2108.t:0 "Railways of the Empire"
 aota.2108.d:0 "Rail binds more than markets. In a fragile imperial state it binds provinces to the capital, soldiers to the frontier, and the idea of unity to something other than rhetoric."
 aota.2108.a:0 "Lay the rails."

 aota.2109.t:0 "The Arsenal Question"
 aota.2109.d:0 "The Ottoman armed forces cannot remain a political instrument if they are also to survive as a military one. Factories, depots, and procurement have therefore become arguments over what kind of empire the army will defend."
 aota.2109.a:0 "Strengthen the arsenals."

 aota.2110.t:0 "Preparations in Anatolia"
 aota.2110.d:0 "The general staff studies the map with the weariness of men who know every frontier is also a political verdict. To prepare the army is to choose which frontiers still matter."
 aota.2110.a:0 "Ready the formations."

 aota.2111.t:0 "Voices from Damascus and Baghdad"
 aota.2111.d:0 "Syria and Mesopotamia do not rebel in the same language, but they increasingly speak with the same impatience. The empire may still command, though it no longer compels belief as easily as it once did."
 aota.2111.a:0 "Accommodate local realities."
 aota.2111.b:0 "Recentre authority."

 aota.2112.t:0 "Conference in the East"
 aota.2112.d:0 "The foreign powers arrive wrapped in courtesy and appetite. Every guarantee they offer has a route, a creditor, or a minority attached to it."
 aota.2112.a:0 "We will hear them out."

 aota.2113.t:0 "German Mission, British Pressure"
 aota.2113.d:0 "Berlin offers technicians, arms, and the flattering language of partnership. Britain offers caution, pressure, and reminders of geography. The empire must decide which patronage can be used without becoming dependence."
 aota.2113.a:0 "Choose with care."

 aota.2114.t:0 "The House and the State"
 aota.2114.d:0 "Dynasty, army, ministry, and province now all claim to be carrying the empire through the storm. The danger is not merely that one will triumph, but that each has a different answer to what triumph means."
 aota.2114.a:0 "The dynasty must remain visible."
 aota.2114.t:0 "The state must be more than lineage."

 aota.2115.t:0 "The House of Osman Redeemed"
 aota.2115.d:0 "Against expectation, the dynasty has not merely endured but reclaimed initiative. What was once spoken of as a remnant again presents itself as an imperial future."
 aota.2115.a:0 "The House stands vindicated."

 AOTA_SOV_2200_title:0 "The Republic's Last Language"
 AOTA_SOV_2200_desc:0 "Republican politicians still speak as if legality can be restored by insistence alone, yet their very persistence reveals how little Russia has settled. Every speech in defense of law now sounds like both a warning and an elegy."
 AOTA_SOV_2200_a:0 "The republic still has a voice."

 AOTA_SOV_2201_title:0 "The Promise of Order"
 AOTA_SOV_2201_desc:0 "After years of improvisation and ruin, even modest order acquires an almost mystical authority. Administrators, officers, and civilians alike begin to act as though stability were already legitimacy."
 AOTA_SOV_2201_a:0 "Let order speak for itself."

 AOTA_SOV_2202_title:0 "The General Staff Returns"
 AOTA_SOV_2202_desc:0 "Russia's officer corps has learned many lessons from defeat, though not all of them are humane. It now approaches politics as a branch of military preparation."
 AOTA_SOV_2202_a:0 "The army remembers."

 AOTA_SOV_2203_title:0 "A Throne Reimagined"
 AOTA_SOV_2203_desc:0 "Restoration is not merely nostalgia. For its advocates, monarchy offers a principle of unity vast enough to contain the country's competing classes, regions, and griefs."
 AOTA_SOV_2203_a:0 "The symbol still matters."

 AOTA_SOV_2204_title:0 "Commune Momentum"
 AOTA_SOV_2204_desc:0 "In factory districts and improvised councils, the communal left begins to behave as though history has briefly reopened in its favor."
 AOTA_SOV_2204_a:0 "The communes gather force."

 AOTA_SOV_2205_title:0 "The Red-Black Schism"
 AOTA_SOV_2205_desc:0 "The Russian revolutionary movement has ceased pretending it speaks with one doctrine. Centralists and anti-statists now argue as bitterly over the future as either does with the old order."
 AOTA_SOV_2205_a:0 "The split can no longer be concealed."

 AOTA_SOV_2206_title:0 "National Union"
 AOTA_SOV_2206_desc:0 "Where others see ideology, the unionists see dismemberment. Their answer is a Russian state conceived as mission, discipline, and historical correction."
 AOTA_SOV_2206_a:0 "The nation must be made whole."

 AOTA_SOV_2210_title:0 "The Reunification Question"
 AOTA_SOV_2210_desc:0 "Sooner or later, every Russian government must ask whether it rules a state or merely a prelude. The answer determines everything that follows."
 AOTA_SOV_2210_a:0 "Russia cannot remain unfinished."
 AOTA_SOV_2211_title:0 "The Borderlands Study the Map"
 AOTA_SOV_2211_desc:0 "Neighboring states know that Russian reunification is not an abstract future but a set of rail lines, rivers, and marching timetables."
 AOTA_SOV_2211_a:0 "They will have heard us."
 AOTA_SOV_2212_title:0 "The Caucasus in Calculation"
 AOTA_SOV_2212_desc:0 "The south offers oil, mountains, and endless reasons for intervention. It also offers the possibility of overreach before the center is truly secured."
 AOTA_SOV_2212_a:0 "Consider the southern road."
 AOTA_SOV_2213_title:0 "Toward the West"
 AOTA_SOV_2213_desc:0 "To look west is to see every humiliation Russia has not forgotten, and every foreign power that mistook Russian weakness for a permanent condition."
 AOTA_SOV_2213_a:0 "The western frontier matters most."
 AOTA_SOV_2214_title:0 "Pressure Builds"
 AOTA_SOV_2214_desc:0 "What was once a project becomes a pressure. Every success makes the next claim feel necessary; every pause begins to look like betrayal."
 AOTA_SOV_2214_a:0 "The pressure cannot be ignored."
 SOV_reunification:0 "Russian Reunification"

 aota_eng_1000_title:0 "The Strike and the Standard"
 aota_eng_1000_desc:0 "What begins as industrial unrest quickly becomes an ideological struggle over who gets to name Britain's future. Organizers of the guild left and the anti-state radicals each claim to speak for labor against a dying imperial order."
 aota_eng_1000_a:0 "The socialist current grows."
 aota_eng_1000_b:0 "The anarchist current grows."

 aota_eng_1001_title:0 "An Imperial Debate"
 aota_eng_1001_desc:0 "The empire remains too large to abandon casually and too expensive to preserve thoughtlessly. Reformers and hardliners therefore argue over whether imperial survival requires adaptation or display."
 aota_eng_1001_a:0 "Seek a workable settlement."
 aota_eng_1001_b:0 "Project confidence abroad."

 aota_eng_1002_title:0 "Letters from the Dominions"
 aota_eng_1002_desc:0 "Messages from across the imperial world arrive in tones of politeness sharpened by self-interest. The dominions still consult London, but increasingly as partners who know they have options."
 aota_eng_1002_a:0 "Keep the correspondence close."
