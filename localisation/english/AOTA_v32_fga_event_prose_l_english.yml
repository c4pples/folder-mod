l_english:
 aota.310.t:0 "The German Reckoning"
 aota.310.d:0 "The armistice saved the Reich from collapse and denied it the clarity of victory. In Berlin, that ambiguity has become the central fact of politics. Constitutionalists call for a disciplined national recovery under law; radicals insist that a nation kept waiting at the edge of triumph was in truth betrayed. Germany must now decide whether it will master the unfinished peace—or be mastered by the resentments it has preserved."
 aota.310.a:0 "Stabilize the Reich and turn survival into strength."
 aota.310.b:0 "A nation denied must harden itself."
 aota.320.t:0 "France and the Refused Settlement"
 aota.320.d:0 "France endured the war and emerged without the psychological relief of decision. The republic's factions therefore speak not only about policy, but about meaning. Republicans insist France must defend civilization through patience and institutions; national conservatives demand a sterner state; the revolutionary left argues that a peace without justice exposed the bankruptcy of the entire order. France does not ask what happened at the armistice so much as what kind of country it must become because of it."
 aota.320.a:0 "Recommit to the republic."
 aota.320.b:0 "Discipline the nation and prepare it."
 aota.320.c:0 "Let the social crisis become a spiritual and political one."
 aota.330.t:0 "The Danubian Choice"
 aota.330.d:0 "Austria-Hungary survived the Great War by refusing to die on schedule. Yet survival has multiplied its problems rather than resolved them. Every people of the monarchy now asks whether Vienna still governs a state, an arrangement, or merely a postponement. Federalists argue that the empire must be remade if it is to endure; hardliners answer that concession invites only appetite. The Danubian world cannot remain suspended forever."
 aota.330.a:0 "Preserve the monarchy through compromise."
 aota.330.b:0 "Hold the empire together by force of will."
 aota.10.t:0 "The Rhine Statute Reopened"
 aota.10.d:0 "What had been written as a technical frontier arrangement now returns to politics with all the force of memory. Berlin and Paris each claim moderation, yet both read the same statute as proof that the other side means to revise the peace in its own image. The question before Europe is no longer whether the Rhine matters, but whether any legal phrasing can still restrain what it symbolizes."
 aota.10.a:0 "Revise the statute in our favor."
 aota.10.b:0 "Preserve the form of the peace."
 aota.11.t:0 "Arms Behind the Curtain"
 aota.11.d:0 "German rearmament is discussed in half-truths, private memoranda, and the polite dishonesty of international observers who prefer suspicion to confrontation. The Reich now weighs whether secrecy remains useful or whether controlled boldness would better teach Europe to accept new facts."
 aota.11.a:0 "Accelerate the hidden programs."
 aota.11.b:0 "Advance carefully under cover."
 aota.12.t:0 "The Imperial Constitution Reconsidered"
 aota.12.d:0 "No Habsburg ministry can now avoid the same question: is the monarchy a living political order or an inheritance temporarily defended by habit? Reformers seek to renew imperial legitimacy by widening representation and bargaining honestly with the crownlands. Their enemies reply that too much negotiation will reveal that everyone already knows how much the center has weakened."
 aota.12.a:0 "Reform is the empire's last serious chance."
 aota.12.b:0 "Authority must remain visibly indivisible."
