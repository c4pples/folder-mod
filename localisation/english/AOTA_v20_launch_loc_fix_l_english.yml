 UKR_between_empires_desc:0 "The republic stands between Berlin and the shattered Russian space, forced to defend sovereignty while every neighbor treats Ukraine as negotiable frontier terrain."
 UKR_harvest_and_rifles_desc:0 "Food security and local armament are fused into one doctrine: no foreign patron can dictate Kyiv's future if villages can feed armies and militias can hold the line."
 UKR_impossible_republic_desc:0 "To remain independent in this settlement is to attempt state-building under siege conditions: legitimacy, logistics, and armed cohesion must all be built at once."
 UKR_peasant_militias_desc:0 "Local defense committees and veteran cadres become the backbone of a sovereignty strategy meant to outlast pressure from both eastern reconquest projects and western protectorate schemes."
 UKR_revive_the_free_territory_desc:0 "Anarchist and communal currents promise a sovereign order rooted in local councils rather than foreign guarantees or imperial patronage."
 UKR_seek_the_black_banner_desc:0 "Radical organizers argue that only a social revolution can prevent Ukraine from being reduced to a client buffer between greater powers."
