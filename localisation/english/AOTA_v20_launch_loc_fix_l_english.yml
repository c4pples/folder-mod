 UKR_reject_foreign_protectorates_desc:0 "Kyiv will not trade formal sovereignty for security treaties that become chains. German and Russian influence networks alike must be pushed out of state command."
 UKR_borderland_sovereignty_commission_desc:0 "A permanent commission will map disputed jurisdictions, codify emergency powers, and turn improvised frontier governance into durable republican law."
 UKR_independence_or_ruin_desc:0 "The republic declares its strategic doctrine without euphemism: independent statehood, however costly, or eventual partition by stronger neighbors."
