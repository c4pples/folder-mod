 aota_minor_miracle_paths:0 "Minor Miracle Paths"
 aota_minor_miracle_paths_desc:0 "Extraordinary decisions for precarious states seeking outsized rewards through risky national gambles."
 AOTA_super_crises_category:0 "Super Crises"
 AOTA_super_crises_category_desc:0 "The international order is fraying. These crises can reshape continents if mishandled."
