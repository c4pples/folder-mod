l_english:
 AOTA_major_intro_eng_deep:0 "The Imperial Argument"
 AOTA_major_intro_eng_deep_desc:0 "Britain's crisis is not merely one of balance sheets or cabinet numbers. It is an argument over what the empire was for and whether its remaining strength should be spent preserving a hierarchy, transforming it into a commonwealth, handing it to planners and financiers, or letting the old imperial machine dissolve into something humbler and stranger."
 AOTA_major_intro_sov_deep:0 "The Question of Reunification"
 AOTA_major_intro_sov_deep_desc:0 "Every Russian government now begins with the same temptation: to call force destiny. Yet each claimant to reunification means something different by Russia. To some it is law, to others the barracks; to some the commune, to others the throne; to others still it is a people that must be made whole by terror before it can ever be made free."
 AOTA_major_intro_tur_deep:0 "The Provinces Listen"
 AOTA_major_intro_tur_deep_desc:0 "The Ottoman state still speaks with imperial authority, but the provinces now listen conditionally. Damascus listens for reform, Baghdad for security, Jerusalem for legitimacy, Anatolia for endurance. The Porte survives only by persuading regions that no longer share the same reasons for remaining within it."
 AOTA_major_intro_usa_split:0 "Seven Americas in Waiting"
 AOTA_major_intro_usa_split_desc:0 "The American crisis has grown too large for one political language. Constitutional loyalists, labor federations, generals, financiers, agrarians, Pacific regionalists, and Christian communalists all claim to defend the republic by remaking it. Civil peace now depends on whether these rival Americas can be reconciled before one decides to march."

 ENG_stanley_baldwin_desc:0 "Baldwin governs with the instincts of a caretaker, seeking to preserve imperial dignity through caution and restraint. Yet in a Britain haunted by exhaustion, caution itself has become a political wager: one more delay, one more compromise, one more attempt to keep the world manageable without admitting how much has already slipped away."
 ENG_neville_chamberlain_desc:0 "Chamberlain understands the empire as an administrative problem that may still be solved by method, thrift, and orderly negotiation. His strengths are precision and patience; his danger is that history may no longer reward either."
 ENG_oswald_mosley_alt_desc:0 "Mosley offers Britain not merely a new cabinet but a new rhythm—faster, harder, more centralized, and contemptuous of inherited hesitations. To his followers he is the apostle of national energy; to his enemies, a warning that exhaustion can turn discipline into worship."
 ENG_beatrice_webb_desc:0 "Webb reads the British crisis as a failure of institutions to keep pace with modern social obligation. She offers planning, expertise, and collective provision as a way of sparing Britain from both oligarchic stagnation and revolutionary collapse."
 ENG_r_h_tawney_desc:0 "Tawney speaks in the language of ethics rather than panic. He insists Britain may still be reconstructed through social justice, fellowship, and the moral reform of economic life."
 AOTA_ENG_clement_attlee_name:0 "Clement Attlee"
 AOTA_ENG_clement_attlee_advisor:0 "Quiet Labour Statesman"
 AOTA_ENG_clement_attlee_advisor_desc:0 "Attlee's strength lies in his refusal to dramatize what he already means to transform. He offers discipline without spectacle and reform without delirium."
 AOTA_ENG_john_maynard_keynes_name:0 "John Maynard Keynes"
 AOTA_ENG_john_maynard_keynes_advisor:0 "Treasury Heretic"
 AOTA_ENG_john_maynard_keynes_advisor_desc:0 "Keynes understands that imperial decline and domestic stagnation are not separate crises. His proposals promise recovery through managed ambition rather than deflationary surrender."
 AOTA_ENG_george_orwell_name:0 "George Orwell"
 AOTA_ENG_george_orwell_advisor:0 "Moral Witness"
 AOTA_ENG_george_orwell_advisor_desc:0 "Orwell distrusts both cant and coercion. His influence strengthens those who would rebuild Britain without sanctifying either empire or bureaucracy."
 AOTA_ENG_horatio_nelsonite_name:0 "Sir Reginald Tyrwhitt"
 AOTA_ENG_horatio_nelsonite_advisor:0 "Imperial Sea Traditionalist"
 AOTA_ENG_horatio_nelsonite_advisor_desc:0 "For the old school of imperial command, Britain's salvation lies in discipline, sea power, and unquestioned prestige. They believe that hesitation invites decline more surely than overreach."

 SOV_alexander_kerensky_desc:0 "Kerensky survives not because Russia forgave the republic but because it never fully found a stable successor. He remains the spokesman for legality in a political landscape increasingly convinced that legality is a luxury."
 SOV_kerensky_aota_desc:0 "Kerensky's continued relevance is itself evidence of how unfinished the Russian collapse remains. He is the memory of a future once promised and never delivered."
 AOTA_SOV_wrangel_deeper_name:0 "Pyotr Wrangel"
 AOTA_SOV_wrangel_deeper_advisor:0 "Exile General"
 AOTA_SOV_wrangel_deeper_advisor_desc:0 "Wrangel represents the militarized conscience of the anti-revolutionary camp: disciplined, proud, and convinced that Russia can only be restored by command."
 AOTA_SOV_kollontai_deeper_name:0 "Alexandra Kollontai"
 AOTA_SOV_kollontai_deeper_advisor:0 "Revolutionary Tribune"
 AOTA_SOV_kollontai_deeper_advisor_desc:0 "Kollontai speaks for a social revolution that will not be reduced to barracks socialism. Her presence sharpens the revolutionary edge of policy."
 AOTA_SOV_makhno_deeper_name:0 "Nestor Makhno"
 AOTA_SOV_makhno_deeper_advisor:0 "Black Banner Agitator"
 AOTA_SOV_makhno_deeper_advisor_desc:0 "Makhno reminds every would-be centralizer that peasants and workers can fight for freedom without bowing to a committee, ministry, or throne."
 AOTA_SOV_ilin_name:0 "Ivan Ilyin"
 AOTA_SOV_ilin_advisor:0 "National Philosopher"
 AOTA_SOV_ilin_advisor_desc:0 "Ilyin's politics translate dislocation into destiny. He offers unity through civilizational purpose rather than constitutional settlement."

 AOTA_TUR_abdulmecid_desc:0 "Abdülmecid embodies the ambiguity of Ottoman survival: dynastic continuity without settled authority, reverence without consensus, and legitimacy that must be constantly renegotiated with soldiers, notables, and believers."
 AOTA_TUR_fevzi_cakmak_name:0 "Fevzi Çakmak"
 AOTA_TUR_fevzi_cakmak_advisor:0 "Imperial General Staff Custodian"
 AOTA_TUR_fevzi_cakmak_advisor_desc:0 "Çakmak belongs to the school that believes the empire may still be saved by professional severity and exact administration of force."
 AOTA_TUR_halit_edib_name:0 "Halide Edib"
 AOTA_TUR_halit_edib_advisor:0 "Constitutional Public Moralist"
 AOTA_TUR_halit_edib_advisor_desc:0 "Edib sees Ottoman survival as inseparable from civic reform, public education, and a broader moral renewal of imperial society."
 AOTA_TUR_mahmud_sevketist_name:0 "Mahmud Şevket Circle"
 AOTA_TUR_mahmud_sevketist_advisor:0 "Porte Hardliner"
 AOTA_TUR_mahmud_sevketist_advisor_desc:0 "The hardline military-bureaucratic current around the Porte trusts command more than persuasion and order more than compromise."
 AOTA_TUR_mehmed_akif_name:0 "Mehmed Âkif"
 AOTA_TUR_mehmed_akif_advisor:0 "Poet of Renewal"
 AOTA_TUR_mehmed_akif_advisor_desc:0 "Âkif gives voice to an Islamic and moral regeneration that seeks to restore dignity without simply retreating into nostalgia."

 USA_franklin_roosevelt_desc:0 "Roosevelt senses that the American problem is larger than depression. He sees a republic losing faith in its own institutions and seeks to restore motion before panic hardens into rupture."
 USA_huey_long_aota_desc:0 "Long speaks with the dangerous confidence of a man who believes the republic is already owned by enemies and merely awaiting repossession."
 USA_norman_thomas_aota_desc:0 "Thomas represents the democratic socialist hope that the American crisis can still be resolved without surrendering liberty to fear or force."
 USA_dorothy_day_aota_desc:0 "Day speaks to those who believe that both capitalism and the centralized state have exhausted their moral claims. Her politics bind mercy, poverty, and revolt together."
 USA_william_dudley_pelley_aota_desc:0 "Pelley treats national humiliation as a spiritual emergency. His followers seek salvation in hierarchy, revelation, and the cleansing violence of certainty."

 AOTA_ACC_joseph_kennedy_name:0 "Joseph P. Kennedy"
 AOTA_ACC_joseph_kennedy_advisor:0 "Constitutional Broker"
 AOTA_ACC_joseph_kennedy_advisor_desc:0 "Kennedy sees civil order as something to be negotiated, financed, and preserved among elites before the country falls completely out of human management."
 AOTA_AWU_john_reed_name:0 "John Reed"
 AOTA_AWU_john_reed_advisor:0 "Martyr of the Workers"
 AOTA_AWU_john_reed_advisor_desc:0 "In the AWU imagination, Reed is less a man than a revolutionary inheritance: journalism turned into insurrectionary memory."
 AOTA_AWU_dorothy_day_name:0 "Dorothy Day"
 AOTA_AWU_dorothy_day_advisor:0 "Christian Radical"
 AOTA_AWU_dorothy_day_advisor_desc:0 "Day ensures the workers' movement must answer not only how it will seize power, but what kind of human being it means to create once power is seized."
 AOTA_ANA_douglas_macarthur_name:0 "Douglas MacArthur"
 AOTA_ANA_douglas_macarthur_advisor:0 "American Caesarist"
 AOTA_ANA_douglas_macarthur_advisor_desc:0 "MacArthur gives form to the dream that a collapsing republic might yet be rescued by will, spectacle, and command."
 AOTA_APF_hiram_johnson_name:0 "Hiram Johnson"
 AOTA_APF_hiram_johnson_advisor:0 "Pacific Republican"
 AOTA_APF_hiram_johnson_advisor_desc:0 "Johnson imagines the Pacific not as a retreat from America but as the place where a saner America might be rebuilt."
 AOTA_ACG_henry_luce_name:0 "Henry Luce"
 AOTA_ACG_henry_luce_advisor:0 "Media Capital Strategist"
 AOTA_ACG_henry_luce_advisor_desc:0 "Luce understands power as the marriage of money, narrative, and disciplined optimism. In a corporate commonwealth, that combination becomes doctrine."
 AOTA_ASL_richard_russell_name:0 "Richard Russell Jr."
 AOTA_ASL_richard_russell_advisor:0 "Agrarian Parliamentarian"
 AOTA_ASL_richard_russell_advisor_desc:0 "Russell gives the Southern cause a veneer of procedural seriousness, blending regional grievance with the language of constitutional stewardship."
 AOTA_CCW_ammon_hennacy_name:0 "Ammon Hennacy"
 AOTA_CCW_ammon_hennacy_advisor:0 "Christian Anarchist Pilgrim"
 AOTA_CCW_ammon_hennacy_advisor_desc:0 "Hennacy's politics reject both empire and bureaucracy. He speaks for an America redeemed through conscience, community, and refusal."

 AOTA_ACC_intro:0 "The Constitutional Remnant"
 AOTA_ACC_intro_desc:0 "The ACC claims to be America reduced to legality, but law stripped of confidence must soon borrow power from somewhere else. Its politics are those of triage—stitching together a nation with procedure, patronage, and whatever fragments of legitimacy remain."
 AOTA_AWU_intro:0 "The Red and Black Republic"
 AOTA_AWU_intro_desc:0 "The AWU is not a single movement but a crowded revolution. Union discipline, socialist planning, communal radicalism, and Christian dissent all collide within it. Whether it becomes a workers' state or a federation of insurgent liberties remains undecided."
 AOTA_ANA_intro:0 "The Command State"
 AOTA_ANA_intro_desc:0 "The ANA believes the republic collapsed because it tolerated ambiguity too long. Its answer is command, discipline, and reunification through force. For its loyalists, that is national rescue; for its enemies, the birth of an American authoritarianism."
 AOTA_APF_intro:0 "The Western Republic"
 AOTA_APF_intro_desc:0 "The Pacific Federation represents the possibility that America may survive by becoming less continental, less imperial, and more regional. But distance from the eastern collapse may prove only temporary."
 AOTA_ACG_intro:0 "The Boardroom State"
 AOTA_ACG_intro_desc:0 "The ACG treats crisis as a market of power. It does not deny collapse; it means to manage it, price it, and turn efficiency into sovereignty."
 AOTA_ASL_intro:0 "The Agrarian League"
 AOTA_ASL_intro_desc:0 "The ASL speaks for a countryside that has learned to distrust both northern finance and metropolitan ideology. Its politics are slower, more local, and no less dangerous for that."
 AOTA_CCW_intro:0 "The Christian Commonwealth"
 AOTA_CCW_intro_desc:0 "The CCW insists that both capitalist America and statist revolution lead only to spiritual ruin. It seeks a politics of communes, mercy, and moral discipline—though even mercy may need defending with rifles."
