l_english:
 aota_rhine_tension_stage_1:0 "Rhine Tension"
 aota_rhine_tension_stage_1_desc:0 "The frontier question is no longer dormant. Staff talks, press campaigns, and nervous diplomacy have turned the Rhine back into a permanent political pressure."
 aota_rhine_tension_stage_2:0 "Rhine Tension Acute"
 aota_rhine_tension_stage_2_desc:0 "What was once a legal argument now behaves like a crisis. Military planning and national emotion increasingly reinforce one another."
 aota_french_social_breakdown_stage_1:0 "Social Breakdown"
 aota_french_social_breakdown_stage_1_desc:0 "France still functions, but the republic has begun to feel every strain as a test of legitimacy."
 aota_french_social_breakdown_stage_2:0 "Social Breakdown Acute"
 aota_french_social_breakdown_stage_2_desc:0 "Political violence, factional panic, and social distrust are now shaping state policy in real time."
 aota_danubian_strain_stage_1:0 "Danubian Strain"
 aota_danubian_strain_stage_1_desc:0 "The monarchy remains intact, but every province now interprets imperial survival through its own interests."
 aota_danubian_strain_stage_2:0 "Danubian Strain Acute"
 aota_danubian_strain_stage_2_desc:0 "Administrative fatigue has become political vulnerability. Every compromise now risks signaling weakness."
 aota_british_imperial_fatigue_stage_1:0 "Imperial Fatigue"
 aota_british_imperial_fatigue_stage_1_desc:0 "Britain still commands a world system, but more and more of that command must be argued for rather than assumed."
 aota_british_imperial_fatigue_stage_2:0 "Imperial Fatigue Acute"
 aota_british_imperial_fatigue_stage_2_desc:0 "Consultation, retrenchment, and coercion now compete openly inside imperial policy."
 aota_russian_reunification_pressure_stage_1:0 "Reunification Pressure"
 aota_russian_reunification_pressure_stage_1_desc:0 "Every Russian government feels the expectation that fragmentation must someday end."
 aota_russian_reunification_pressure_stage_2:0 "Reunification Pressure Acute"
 aota_russian_reunification_pressure_stage_2_desc:0 "The state is now under mounting pressure to turn rhetoric of reunification into actual campaigns."
 aota_ottoman_provincial_pressure_stage_1:0 "Provincial Pressure"
 aota_ottoman_provincial_pressure_stage_1_desc:0 "Imperial authority still exists, but the provinces increasingly negotiate with it rather than simply obeying."
 aota_ottoman_provincial_pressure_stage_2:0 "Provincial Pressure Acute"
 aota_ottoman_provincial_pressure_stage_2_desc:0 "The empire's center is now obliged to answer multiple regional crises at once."
 aota_usa_constitutional_breakdown_stage_1:0 "Constitutional Breakdown"
 aota_usa_constitutional_breakdown_stage_1_desc:0 "The American constitutional order still functions, but every institution now operates under deep suspicion."
 aota_usa_constitutional_breakdown_stage_2:0 "Constitutional Breakdown Acute"
 aota_usa_constitutional_breakdown_stage_2_desc:0 "Regional and ideological defiance have hardened into a crisis of state continuity."
 aota_italian_overheat_stage_1:0 "Italian Overheat"
 aota_italian_overheat_stage_1_desc:0 "The postwar mood in Italy grows hotter each month, feeding grievance into spectacle and politics into agitation."
 aota_italian_overheat_stage_2:0 "Italian Overheat Acute"
 aota_italian_overheat_stage_2_desc:0 "Italy's disappointed peace has become a permanent argument for radical action."
 aota_minor_breathing_room:0 "Breathing Room"
 aota_minor_breathing_room_desc:0 "By avoiding premature escalation, the state gains a little time to consolidate its position."
 GER_measure_the_rhine_temperature:0 "Measure the Rhine Temperature"
 GER_measure_the_rhine_temperature_desc:0 "Before a crisis can be managed, it must be admitted as one."
 FRA_count_the_barricades:0 "Count the Barricades"
 FRA_count_the_barricades_desc:0 "The state should know how much of the street still belongs to it."
 AUS_take_stock_of_the_crownlands:0 "Take Stock of the Crownlands"
 AUS_take_stock_of_the_crownlands_desc:0 "The monarchy cannot govern by assumption alone."
 USA_count_the_statehouses:0 "Count the Statehouses"
 USA_count_the_statehouses_desc:0 "Every governor, legislature, and emergency committee is now a clue to the republic's real condition."
 ITA_measure_the_unfinished_peace:0 "Measure the Unfinished Peace"
 ITA_measure_the_unfinished_peace_desc:0 "Italy's crisis is not abstract; it has names, clubs, newspapers, and constituencies."
 aota.3400.t:0 "The Rhine Runs Hot"
 aota.3400.d:0 "In Germany, the frontier question is no longer confined to diplomats and memoranda. Officers, newspapers, and political societies now speak of the Rhine as though delay itself were a national injury."
 aota.3400.a:0 "Contain the fever."
 aota.3400.b:0 "Prepare the public for harder times."
 aota.3401.t:0 "The Republic Frays"
 aota.3401.d:0 "France's internal camps now read every strike, scandal, and border rumor as confirmation of their deepest suspicions. The republic remains standing, but more and more of public life treats it as provisional."
 aota.3401.a:0 "Steady the center."
 aota.3401.b:0 "Arm conviction with policy."
 aota.3402.t:0 "The Monarchy Under Strain"
 aota.3402.d:0 "In Vienna, governance increasingly means balancing incompatible demands without ever admitting how narrow the margin has become. The crownlands are still inside the imperial structure; the question is whether they still think of themselves as within the same political future."
 aota.3402.a:0 "Preserve the bargain."
 aota.3402.b:0 "Reassert the center."
 aota.3403.t:0 "The Pressure to Reunify"
 aota.3403.d:0 "Russia's factions have begun to share one assumption even while they disagree on everything else: that fragmentation cannot be allowed to become normal. Each success therefore intensifies the expectation of another."
 aota.3403.a:0 "Consolidate first."
 aota.3403.b:0 "History favors the bold."
 aota.3404.t:0 "The Provinces Speak More Loudly"
 aota.3404.d:0 "Ottoman survival has given every province time to develop its own interpretation of why the empire remains. That plurality now becomes a governance crisis, for each region expects a different answer from the Porte."
 aota.3404.a:0 "Negotiate again."
 aota.3404.b:0 "Show resolve."
 aota.3405.t:0 "The Constitution Under Load"
 aota.3405.d:0 "In America, what once seemed like harsh partisanship now starts to resemble rival sovereignties learning to speak through the same institutions. Procedure still exists; belief in procedure diminishes."
 aota.3405.a:0 "Buy more time."
 aota.3405.b:0 "Brace for rupture."
 aota.3406.t:0 "Italy Heats Beyond Ceremony"
 aota.3406.d:0 "Postwar Italy is increasingly governed by tempo: processions, clubs, manifestos, and the emotional acceleration of a country convinced it was denied its proper historical reward."
 aota.3406.a:0 "Cool the atmosphere."
 aota.3406.b:0 "Harness the energy."
 aota.3407.t:0 "Imperial Fatigue Deepens"
 aota.3407.d:0 "Britain's empire has not collapsed, but it now requires constant maintenance of confidence—among dominions, creditors, ministries, and the public. Fatigue has become a constitutional fact of imperial rule."
 aota.3407.a:0 "Manage the decline carefully."
 aota.3407.b:0 "Project steadiness through action."
