
l_english:
 AOTA_cuban_secret_path:0 "Foreign Capital at the Gates"
 AOTA_cuban_secret_path_desc:0 "A strange stream of American corporate personnel, lobbyists, fixers, security men, and legal schemers has begun to reach Havana. They speak of crisis in the north and opportunity in the Caribbean."

 CUB_meet_the_corporate_exiles:0 "Meet the Corporate Exiles"
 CUB_meet_the_corporate_exiles_desc:0 "American boardroom operatives and their retainers want safe harbor, exemptions, and freedom to build private enclaves on Cuban soil. Their money is real. So is the danger."

 aota.3600.t:0 "The Men from the Boardrooms"
 aota.3600.d:0 "They arrive in tailored linen and guarded convoys, carrying legal drafts instead of manifestos. Some are bankers, some are industrial middlemen, some are private-security brokers already speaking as if the island were an empty ledger waiting to be reorganized. They promise hard currency, chartered ports, private infrastructure, and a shield against the coming storms of the hemisphere. Their critics warn that Cuba will not be hosting guests, but inviting in a parallel sovereignty."
 aota.3600.a:0 "Let them in. Cuba will become the island of contracts."
 aota.3600.b:0 "No. Cuba will not be auctioned to expatriate vultures."

 aota_cub_american_corporate_influx:0 "American Corporate Influx"
 aota_cub_american_corporate_influx_desc:0 "Foreign corporate personnel and their retainers are pouring into the island with hard currency, legal drafts, and ambitions far beyond ordinary trade."
 aota_cub_open_island:0 "The Open Island"
 aota_cub_open_island_desc:0 "Cuba has begun marketing sovereignty itself as a service."
 aota_cub_executive_refugees:0 "Executive Refugees"
 aota_cub_executive_refugees_desc:0 "The island now shelters a class of foreign executives who treat political breakdown as an investment climate."
 aota_cub_rent_a_guard_state:0 "A Rented Guard State"
 aota_cub_rent_a_guard_state_desc:0 "Security on the island increasingly belongs to payrolls, concessions, and contract law."
 aota_cub_extraterritorial_enclaves:0 "Extraterritorial Enclaves"
 aota_cub_extraterritorial_enclaves_desc:0 "Sections of the island now behave less like Cuban jurisdiction and more like licensed private compounds."
 aota_cub_franchised_state:0 "The Franchised State"
 aota_cub_franchised_state_desc:0 "Public authority is increasingly sold off in pieces to those able to monetize it."
 aota_cub_charter_havana:0 "Charter Havana"
 aota_cub_charter_havana_desc:0 "Havana is being remade into a charter city of foreign cash, private police, and licensed exception."
 aota_cub_private_arbitration:0 "Private Arbitration"
 aota_cub_private_arbitration_desc:0 "On the island, disputes are now settled increasingly by contract and fee rather than by public law."
 aota_cub_boardroom_council:0 "Boardroom Council"
 aota_cub_boardroom_council_desc:0 "The state is now effectively advised, pressured, and at times directed by a rotating caucus of foreign corporate interests."
 aota_cub_payroll_battalions:0 "Payroll Battalions"
 aota_cub_payroll_battalions_desc:0 "Some of Cuba's most reliable armed formations now owe more to payroll discipline than national duty."
 aota_cub_insurance_state:0 "The Insurance State"
 aota_cub_insurance_state_desc:0 "Risk has become the island's constitutional principle."
 aota_cub_nightmare_of_contracts:0 "A Nightmare of Contracts"
 aota_cub_nightmare_of_contracts_desc:0 "Cuba has achieved a grotesque sort of efficiency: profitable, heavily guarded, legally fragmented, and politically hollow."

 CUB_crossroads_of_the_caribbean:0 "Crossroads of the Caribbean"
 CUB_crossroads_of_the_caribbean_desc:0 "Cuba sits at the hinge between empires, markets, revolutions, and shipping lanes."
 CUB_guard_the_republic:0 "Guard the Republic"
 CUB_guard_the_republic_desc:0 "The old state still has institutions worth defending."
 CUB_sugar_and_customhouses:0 "Sugar and Customhouses"
 CUB_sugar_and_customhouses_desc:0 "If Cuba is to survive, it must at least govern its own commerce."
 CUB_watch_the_florida_strait:0 "Watch the Florida Strait"
 CUB_watch_the_florida_strait_desc:0 "Whatever comes out of the American crisis will reach the island by sea, rumor, or money."

 CUB_the_open_island:0 "The Open Island"
 CUB_the_open_island_desc:0 "The first step is to stop asking whether sovereignty should be sold and start asking at what price."
 CUB_harbor_the_executives:0 "Harbor the Executives"
 CUB_harbor_the_executives_desc:0 "The self-exiled men of American capital need a safe island and a willing government."
 CUB_import_the_security_consultants:0 "Import the Security Consultants"
 CUB_import_the_security_consultants_desc:0 "Where capital goes in fear, armed consultants soon follow."
 CUB_free_port_charters:0 "Free-Port Charters"
 CUB_free_port_charters_desc:0 "Open the docks, lower the barriers, and let enclave law become the new geography."
 CUB_write_the_extraterritorial_clauses:0 "Write the Extraterritorial Clauses"
 CUB_write_the_extraterritorial_clauses_desc:0 "The contracts must say plainly where Cuba ends and the concession begins."
 CUB_sell_the_wireless_spectrum:0 "Sell the Wireless Spectrum"
 CUB_sell_the_wireless_spectrum_desc:0 "Even the airwaves can be partitioned, licensed, and securitized."
 CUB_auction_the_docks:0 "Auction the Docks"
 CUB_auction_the_docks_desc:0 "Port authority is too valuable to remain public."
 CUB_franchise_the_customs_service:0 "Franchise the Customs Service"
 CUB_franchise_the_customs_service_desc:0 "Tariffs, inspections, and fees can all be privatized in the name of efficiency."
 CUB_contract_the_shantytowns:0 "Contract the Shantytowns"
 CUB_contract_the_shantytowns_desc:0 "Urban poverty will not be solved, only fenced, priced, and policed."
 CUB_the_malecon_market:0 "The Malecón Market"
 CUB_the_malecon_market_desc:0 "Havana becomes a showroom for every vice and innovation money can rent."
 CUB_charter_city_havana:0 "Charter City Havana"
 CUB_charter_city_havana_desc:0 "The capital will become the first and greatest experiment in private urban sovereignty."
 CUB_charter_city_santiago:0 "Charter City Santiago"
 CUB_charter_city_santiago_desc:0 "The east, too, will be partitioned into concession and license."
 CUB_dispute_resolution_for_a_fee:0 "Dispute Resolution for a Fee"
 CUB_dispute_resolution_for_a_fee_desc:0 "Justice becomes a premium service for those able to pay."
 CUB_tourism_of_excess:0 "Tourism of Excess"
 CUB_tourism_of_excess_desc:0 "The island's new prosperity will come wrapped in spectacle, permissiveness, and guarded luxury."
 CUB_boardroom_council:0 "The Boardroom Council"
 CUB_boardroom_council_desc:0 "The executives no longer lobby the state. They sit beside it."
 CUB_the_right_to_exit:0 "The Right to Exit"
 CUB_the_right_to_exit_desc:0 "If law displeases you, simply cross into another franchise zone more suited to your account."
 CUB_payroll_battalions:0 "Payroll Battalions"
 CUB_payroll_battalions_desc:0 "Armed force, too, can be subcontracted."
 CUB_licensed_sovereignty:0 "Licensed Sovereignty"
 CUB_licensed_sovereignty_desc:0 "The state survives in name while authority is leased one portfolio at a time."
 CUB_insurance_state:0 "The Insurance State"
 CUB_insurance_state_desc:0 "In the new Cuba, every risk becomes a market and every market a constitutional interest."
 CUB_monetize_the_shoreline:0 "Monetize the Shoreline"
 CUB_monetize_the_shoreline_desc:0 "Every bay, strand, and harborfront becomes a ledger entry."
 CUB_bring_the_gulf_to_heel:0 "Bring the Gulf to Heel"
 CUB_bring_the_gulf_to_heel_desc:0 "The island's new masters require sea lanes as disciplined as their contracts."
 CUB_antillean_non_compete_zone:0 "Antillean Non-Compete Zone"
 CUB_antillean_non_compete_zone_desc:0 "Nearby islands and ports must be pressured not to undercut Cuba's new order."
 CUB_the_shareholder_republic:0 "The Shareholder Republic"
 CUB_the_shareholder_republic_desc:0 "The old republic is still invoked, but the new constitution is written in equity, concession, and private guarantee."
 CUB_a_nightmare_of_contracts:0 "A Nightmare of Contracts"
 CUB_a_nightmare_of_contracts_desc:0 "Cuba becomes an efficient horror: glittering enclaves, paid battalions, private law, and a population living in the shadow of rentable sovereignty."
 CUB_the_caribbean_exit_option:0 "The Caribbean Exit Option"
 CUB_the_caribbean_exit_option_desc:0 "If the hemisphere burns, Cuba will offer the wealthy and ruthless an island refuge from public life itself."
